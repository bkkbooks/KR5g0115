  - {type: variant, offset: 7373, length: 707, content: 不差更應服之又方針大槌旁一寸五分又刺其下停針之又方礬石桂末綿裏如棗内舌下有唾出之又方燒馬勒銜鐵令赤内一升苦酒中破一鷄子合和飲之若卒中冷聲嘶啞者甘草一兩桂二兩五味子二兩杏人三十枚生薑八兩切以水七升煑取二升爲二服服之附方經驗後方治中風不語獨活一兩剉酒二升煎一升大豆五合炒有聲將藥酒熱投蓋良乆温服三合未差再服又方治中風不語喉中如拽鋸聲口中涎沫取藜蘆一分天南星一個去浮皮却臍子上陷一個坑子内入陳醋一橡斗子四面用火逼令黄色同一處搗再研極細用生蜜爲丸如赤豆大每服三丸温酒下聖惠方治中風以大聲咽喉不利以蘘荷根二兩研絞取汁酒一大盞相利令匀不計時候温服半盞治風毒脚弱痹滿上氣方第二十一脚氣之病先起嶺南稍來江東得之無漸或微覺疼痹或兩脛小滿或行起忽弱或小腹不仁或時冷時熱皆其候也不即治轉上入腹便發氣則殺人治之多用湯酒摩膏種效既多不但一劑今只取單效用兼灸法取好豉一升三蒸三曝乾以好酒三斗漬之三宿可飲隨人多少欲預防不必待時便與酒煑豉服之脚弱其得小愈及更營諸方服之并及炎之次服獨活酒方獨活五兩附子五兩生用切以酒一斗漬經三宿服從一合始以微痹爲度又方白礬石二斤亦可用鐘乳末附子三兩豉三升酒三斗漬四五日稍飲之若此有氣加蘇子二升也又方好硫黄三兩末之牛乳五升先煑乳水五升仍内硫黄煎取三升一服三合亦可直以乳煎硫黄不用水也卒無牛乳羊乳亦得又方法先煎牛乳三升令減半以五合輒服硫黄末一兩服畢厚蓋取汗勿令得風中間更一服暮又一服若己得汗不復更取但好將息將護之若未差愈後數日中亦可更作若長將亦可煎爲丸北人服此治脚多效但須極好硫黄耳可預備之若脛己滿捏之没指者但勒飲烏犢牛溺二三升使小便利息漸漸消當以銅器尿取新者爲佳無烏牛純黄者亦可用之又方取牽牛子搗蜜丸如小豆大五丸取令, CK-KZ: ''}
