front:
  text: 葛仙翁肘後備急方卷之八陛八
  hash: sha256:0a8b9267719c99e36c02e172ef4bd467acbaa1993a2bf2e64b672f1eeec8e51a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0115_HFL_008-001a, image: hfl/1015/1015-252.png}
body:
  text: 治百病備急丸散膏諸要方第七十二裴氏五毒神膏療中惡暴百病方雄黄朱砂當歸椒各二兩烏頭一升以苦酒漬一宿猪脂五斤東面陳蘆煎五上五下絞去滓内雄黄朱砂末攪令相得畢諸卒百病温酒服如棗核一枚不差更服得下即除四肢有病可摩癰腫諸病瘡皆摩傅之夜行及病冒霧露皆以塗人身中佳效方并療時行温疫諸毒氣毒惡核金瘡等蒼梧道士陳元膏療百病方當歸天雄烏頭各三兩細辛芎藭朱砂各二兩乾薑附子雄黄各二兩半桂心白芷各一兩松脂八兩生地黄二斤搗絞取汁十三物别搗雄黄朱砂爲末餘㕮咀以釅苦酒三升合地黄漬藥一宿取猪脂八斤微火煎十五沸白芷黄爲度絞去滓内雄黄朱砂末攪令稠和宻器貯之腹内病皆對火摩病上日兩三度從十日乃至二十日取病出差止四肢肥肉風瘴亦可酒温服之如杏子大一枚主心腹積聚四肢痹躄舉體風殘百病效方華佗虎骨膏療百病虎骨野葛各三兩附子十五枚重九兩椒三升杏仁巴豆去心皮芎藭切各一升甘草細辛各一兩雄黄二兩十物苦酒漬周時猪脂六斤微煎三上三下完附子一枚視黄爲度絞去滓乃内雄黄攪使稠和宻器貯之百病皆摩傅上唯不得入眼若服之可如棗大内一合熱酒中須臾後拔白髮以傅處即生烏猪瘡毒風腫及馬鞍瘡等洗即差牛領亦然莽草膏療諸賊風腫痹風入五藏恍惚方莽草一斤烏頭附子躑躅各三兩四物切以水苦酒一升漬一宿猪脂四斤煎三上三下絞去滓向火以手摩病上三百度應手即差耳鼻病可以綿裹塞之療諸疥癬雜瘡隱居效驗方云并療手脚攣不得舉動及頭惡風背脇卒痛等蛇銜膏療癰腫金瘡瘀血産後血積耳目諸病牛領馬鞍瘡蛇銜大黄附子當歸芍藥細辛黄芩椒莽草獨活各一兩薤白十四莖十一物苦酒淹漬一宿猪脂三斤合煎於七星火上各沸絞去滓温酒服如彈丸一枚日再病在外摩傅之耳以綿裹塞之目病如黍米注眥中其色緗黄一名緗膏人又用龍銜藤一兩合煎名爲龍銜膏神黄膏療諸惡瘡頭瘡百雜瘡方黄連黄檗附子雄黄水銀藜蘆各一兩胡粉二兩七物細篩以臘月猪脂一斤和藥調器中急宻塞口蒸五斗米下熟出内水銀又研令調宻藏之有諸瘡先以塩湯洗乃傅上無不差者隱居效驗方云此膏塗瘡一度即瘥時人爲聖青龍五生膏療天下雜瘡方丹砂雄黄芎藭椒防己各五分龍膽梧桐皮柏皮青竹茹桑白皮蜂房猬皮各四兩蛇蛻皮一具十三物切以苦酒浸半月微火煎少時乃内臘月猪脂三斤煎三上三下去滓以傅瘡上并服如棗核大神良隱居效驗方云主癰疽痔惡瘡等以前備急諸方故是要驗此來積用效者亦次於後云扁鵲陷氷丸療内脹病并蠱疰中惡等及蜂百毒溪毒射工雄黄眞丹砂别研礬石熬各一兩將生礬石三兩半燒之鬼臼一兩半蜈蚣一枚赤足者小炙斑猫去翅足龍膽附子炮各七枚藜蘆七分炙杏仁四十枚去尖皮熬搗篩蜜和搗千杵腹内脹病中惡邪氣飛尸游走皆服二丸如小豆若積聚堅結服四丸取痢泄下蟲蛇五色若蟲注病中惡邪飛尸游走皆服二三丸以二丸摩痛上若蛇蜂百病若中溪毒射工其服者視强弱大小及病輕重加減服之丹參膏療傷寒時行賊風惡氣在外即支節麻痛喉咽痹寒入腹則心急脹滿胷脇痞塞内則服之外則摩之并癱緩不隨風濕痹不仁偏枯拘屈口喎耳聾齒痛頭風痹腫腦中風動且痛若癰結核漏瘰癧堅腫未潰傅之取消及丹𤺋諸腫無頭欲狀骨疽者摩之令消及惡結核走身中者風水游腫亦摩之其服者如棗核大小兒以意減之日五服數用之悉效丹參蒴藋各三兩莽草葉躑躅花各一兩秦膠獨活烏頭川椒連翹桑白皮牛膝各二兩十二物以苦酒五升油麻七升煎令苦酒盡去滓用如前法亦用猪脂同煎之若是風寒冷毒可用酒服若毒熱病但單服牙齒痛單服之仍用綿裹嚼之比常用猪脂煎藥有小兒耳後癧子其堅如骨已經數月不盡以帛塗膏貼之二十日消盡神效無比此方出小品神明白膏療百病中風惡氣頭面諸病青盲風爛眥鼻耳聾寒齒痛癰腫疽痔金瘡癬疥悉主之當歸細辛各三兩吴茱萸芎藭蜀椒术前胡白芷各一兩附子三十枚九物切煎猪脂十斤炭火煎一沸即下三上三下白芷黄膏成去滓宻貯看病在内酒服如彈丸一枚日三在外皆摩傅之目病如黍米内兩眥中以目向天風可扇之瘡蟲齒亦得傅之耳内底着亦療之緩風冷者宜用之成膏清麻油十三兩菜油亦得黄丹七兩二物鐵鐺文火煎粗濕柳批篦攪不停至色黑加武火仍以扇扇之攪不停烟斷絶盡看漸稠膏成煎須淨處勿令鷄犬見齒瘡帖藥子一物方婆羅門胡名船疏樹子國人名藥療病唯須細研勿令粗皆取其中人去皮用之療諸疾病方卒得吐瀉霍亂蠱毒臍下絞痛赤痢心腹脹滿宿食不消蛇螫毒入腹被毒箭入腹并服二枚取藥子中人暖水二合研碎服之疽瘡附骨疽腫丁瘡癰腫此四病量瘡腫大小用藥子中人煖水碎和猪膽封上癤腫冷游腫癬瘡此五病用醋研封上蛇螫惡毛蝎蜈蚣等螫沙虱射工此六病用暖水研赤莧和封之婦人難産後腹中絞痛及惡露不止痛中瘀血下此六病以一枚一杯酒研温服之帶下暴下此二病以栗汁研温服之齲蟲食齒細削内孔中立愈其擣末篩着瘡上甚主肌肉此法出支家大醫本方服塩方療暴得熱病頭痛目眩并卒心腹痛及欲霍亂痰飲宿食及氣滿喘息久下赤白及積聚吐逆乏氣少力顔色痿黄瘴瘧諸風其服法取上好塩先以大豆許口中含勿咽須臾水當滿口水近齒更用方寸匕抄塩内口中與水一時嚥不爾或令消盡喉若久病長服者至二三月每旦先服或吐或安擊卒病可服三方寸七取即吐痢不吐病痢更加服新患瘧者即差心腹痛及滿得吐下亦佳久病每上以心中熱爲善三五日亦服佳加服取吐痢痢不損人久服大補補豚腎氣五石無不差之病但恨人不服不能久取此療方不一小品云卒心痛鬼氣宿食不消霍亂氣滿中毒鹹作湯服一二升刺便吐之良葛氏常備藥大黄桂心甘草乾薑黄連椒术吴茱萸熟艾雄黄犀角麝香菖蒲人參芍藥附子巴豆半夏麻黄柴胡杏仁葛根黄苓烏頭秦膠等此等藥并應各少許以前諸藥固以大要嶺南使用仍開者今復䟽之衆藥并成劑藥自常和合貯此之備最先於衣食耳常山十四兩蜀漆石膏一斤阿膠七兩牡蠣朱砂大青各七兩鱉三枚鯪鯉甲一斤烏賊魚骨馬藺子一大升蜀升麻十四兩檳榔五十枚龍骨赤石脂羚羊角三枚橘皮獨活其不注兩數者各四兩用芒硝一升良成劑藥金牙散玉壺黄丸三物備急藥紫雪丹參菵草膏玉黄丸度瘴散末散理中散痢藥丁腫藥其有側注者隨得一種爲佳老君神眀白散术附子炮各二兩烏頭炮桔梗二兩細辛一兩搗篩旦服五方寸七若一家有藥則一里無病帶行者所遇病氣皆削若他人得病者温酒服一方寸七若已四五日者以散三七水三升煑三沸服一升取汗即愈云常用辟病散眞珠桂肉各一分貝母三分杏仁二分熬鷄子白熬令黄黑三分五物擣篩歲旦服方寸七若歲中多病可月月朔望服單行方南向社中柏東向枝取曝乾末服方寸姚云疾疫流行預備之名爲柏枝散服神良删煩方云旦南行見社中柏即便收取之斷温病令不相染方熬豉新米酒漬常服之小品正朝屠蘇酒法令人不病温疫大黄五分川椒五分术桂各三分桔梗四分烏頭一分拔楔二分七物細切以絹囊貯之十二月晦日正中時懸置井中至泥正曉拜慶前出之正旦取藥置酒中屠蘇飲之於東向藥置井中能迎歲可世無此病此華佗法武帝有方驗中從小至大少隨所堪一人飲一家無患飲藥三朝一方有防風一兩姚大夫辟温病粉身方芎藭白芷藁本三物等分下篩内粉中以塗粉於身大良附方張仲景三物備急方司空裴秀爲散用療心腹諸疾卒暴百病用大黄乾薑巴豆各一兩須精新好者擣篩蜜和更搗一千杵丸如小豆服三丸老小斟量之爲散不及丸也若中惡客忤心腹脹滿卒痛如錐刀刺痛氣急口噤停尸卒死者以暖水若酒服之若不下捧頭起灌令下喉須臾差未知更與三丸腹當鳴轉即吐下便愈若口已噤亦須折齒灌之藥入喉即瘥崔氏海上方云威靈仙去衆風通十二經脉此藥朝服暮效踈宣五臟冷膿宿水變病微利不瀉人服此四肢輕健手足温暖并得清凉時商州有人患重足不履地經十年不瘥忽遇新羅僧見云此疾有藥可理遂入山求之遣服數日平復後留此藥名而去此藥治丈夫婦人中風不語手足不隨口眼喎斜筋骨節風胎風頭風暗風心風風狂人傷寒頭痛鼻清涕服經二度傷寒即止頭旋目眩白癜風極治大風皮膚風癢大毒熱毒風瘡深治勞疾連腰骨節風繞腕風言語澁滯痰積宣通五臟腹内宿滯心頭痰水膀胱宿膿口中涎水好吃茶漬手足頑痹冷熱氣壅腰膝疼痛久立不得浮氣瘴氣憎寒壯熱頭痛尤甚攻耳成膿而聾又衝眼赤大小腸祕服此立通飲食即住黄疸黑疸面無顔色瘰癧遍項産後祕澁暨腰痛曾經損墜心痛注氣膈氣冷氣攻衝腎臟風壅腹肚脹滿頭面浮腫注毒脾肺氣痰熱咳嗽氣急坐卧不安疥癬等瘡婦人月水不來動經多日血氣衝心隂汗盜汗鵶臭穢甚氣息不堪勤服威靈仙更用熱湯盡日頻洗朝塗若唾若治鵶臭藥自塗身上内外塗之當得平愈孩子無辜令母含藥灌之痔疾秘澁氣痢絞結并皆治之威靈仙一味洗焙爲末以好酒和令微濕入在竹筒内牢塞口九蒸丸曝如乾添酒重灑之以白蜜和爲丸如桐子大每服二十至三十丸湯酒下千金方當以五月五日午時附地刈取葈耳葉洗曝燥搗下篩酒若漿水服方寸七日三夜三散若吐逆可蜜和爲丸準計一方七數也風輕易治者日再服若身體有風處皆作粟肌出或如麻豆粒此爲風毒出也可以針刺潰去之皆黄汁出乃止五月五日多取隂乾著大瓮中稍取用之此草辟惡若欲省病省疾者便服之令人無所畏若時氣不和舉家服之若病胃脹滿心悶發熱即服之并殺三蟲腸痔能進食一周年服之佳七月七九月九可採用治牛馬六畜水穀疫癘諸病方第七十三治馬熱蚛顙黑汗鼻有膿啌啌有膿水草不進方黄瓜蔞根貝母桔梗小青栀子仁吴藍款冬花大黄白鮮皮黄芩鬱金各二大兩黄檗馬牙硝各四大兩擣篩患相當灰常要啖重者藥三大兩地黄半斤豉二合蔓菁油四合合齋前啖至晩飼大效馬遠行到歇處良久與空草熟刷刷罷飲飲竟當飼困時與料必病及水穀六畜瘡焦痂以麵膠封之即落馬急黄黑汗右割取上斷訖取陳久靴爪頭水漬汁灌口如不定用大黄當歸各一兩塩半升以水三升煎取半升分兩度灌口如不定破尾尖鑱血出即止立效馬起卧胞轉及腸結此方並主之細辛防風芍藥各一兩以塩一升水五升煑取二升半分爲二度灌後灌前用芒硝鬱金寒水石大青各一兩水五升煑取二升半以酒油各半升和攪分二度灌口中馬羯骨脹取四十九根羊蹄燒之熨骨上冷易之如無羊蹄楊柳枝指麤者炙熨之不論數飲馬以寅午二時晩少飲之啖塩法塩須乾天須晴七日大馬一啗一升小馬半升用長柄杓子深内咽中令下肥而强水草也治馬後冷豉葱薑各一兩水五升煑取半升和酒灌之即瘥蟲顙十年者醬清如膽者半合分兩度灌鼻每灌一兩日將息不得多多即損馬也蟲顙重者葶藶子一合熬令紫色搗如泥桑根白皮一大握大棗二十枚擘水二升煑藥取一升去滓入葶藶擣令調匀適寒温灌口中隔一日又灌重者不過再瘥蟲顙馬鼻沫出梁腫起者不可治也驢馬胞轉欲死擣蒜内小便孔中深五寸立瘥又用小兒屎和水灌口立瘥又方騎馬走上坂用木腹下來去擦以手内大孔探却糞大效探法剪却指甲以油塗手恐損破馬腸脊瘡以黄丹傅之避風立瘥疥以大豆熬焦和生油麻搗傅醋泔淨洗目暈以霜後楮葉細末一日兩度管吹眼中即瘥馬蛆蹄槽下立處掘一尺埋雞子許大圓石子令常立上一兩日永差啖大麻子淨擇一升飼之治啌及毛焦大效疥以樗根末和油麻塗先以皂莢或米泔淨洗之洗了塗令中間空少許放蟲出下得多塗恐瘡大祕療疥以巴豆膩粉研油麻塗定洗之塗數日後看更驗葛仙翁肘後備急仙方卷之八
