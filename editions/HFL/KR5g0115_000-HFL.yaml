body:
  text: 上卷三十五首治内病中卷三十五首治外發病下卷三十一首治爲物所苦病鹿鳴山續古序觀夫古方藥品分兩灸穴分寸不類者蓋古今人體大小或異藏府血脉亦有差焉請以意酌量藥品分兩古序己明取所服多少配之或一分爲兩或二銖爲兩以盞當升可也如中卷末紫丸方代赭赤石脂各一兩巴豆四十杏仁五十枚小兒服一麻子百日者一小豆且多矣若兩用二銖四絫巴豆四杏仁五枚可療十數小兒此其類也炙之分寸取其人左右中指中節可也其使有毒狼虎性藥乃急救性命者也或遇發毒急掘地作小坑以水令滿熟攪稍澄飲水自解名爲地漿特加是說於品題之後爾附廣肘後方序昔伊尹著湯液之論周公設醫師之屬皆所以拯救民疾俾得以全生而盡年也然則古之賢臣愛其君以及其民者蓋非特生者遂之而己人有疾病坐視其危苦而無以救𤻲之亦其心有所不忍也仰惟國家受天成命統一四海主上以仁覆天下輕稅損役約法省刑蠲積負柔遠服專務以德養民故人臣奉承於下亦莫不以體國愛民爲心惟政府内外宗公恊同輔翼以共固天保無疆之業其心則又甚焉於斯時也蓋民罹兵火獲見太平邊境寧而盜賊息矣則人無死於鋒鏑之慮刑罰清而狴犴空矣則人無死於桎梏之憂年穀豐而畜積富矣則人無死於溝壑之患其所可虞者獨民之有疾病夭傷而已思亦有以救之其不在於方書矣乎然方之行於世者多矣大編廣集竒藥群品自名醫貴胄或不能以兼通而卒具況可以施於民庶哉於是行省乃得乾統間所刊肘後方善本即葛洪所謂皆單行徑易約而己驗籬陌之間顧眄皆藥家有此方可不用醫者也其書經陶隱居增修而益完矣既又得唐愼微證類本草其所附方皆洽見精取切於救治而卷帙尤爲繁重且方隨藥著檢用卒難乃復摘録其方分以類例而附於肘後隨證之下目之曰附廣肘後方下監俾更加讎次且爲之序而刊行之方雖簡要而該病則衆藥多易求而論效則遠將使家自能醫人無夭横以溥濟斯民於仁壽之域以上廣國家博施愛物之德其爲利豈小補哉皇統四年十月戊子儒林郞汴京國子監博士楊用道謹序葛仙翁肘後備急方目録卷之一救卒中惡死方第一救卒尸蹷死方第二救卒客忤死方第三治卒得鬼擊方第四治卒魘寐不寤方第五治卒中五尸方第六治尸注鬼注方第七治卒心痛方第八治卒腹痛方第九治心腹俱痛方第十治卒心腹煩滿方第十一卷之二治卒霍亂諸急方第十二治傷寒時氣温病方第十三治時氣病起諸勞復方第十四治瘴氣疫癘温毒諸方第十五卷之三治寒熱諸瘧方第十六治卒發癲狂病方第十七治卒得驚邪恍惚方第十八治卒中風諸急方第十九治卒風瘖不得語方第二十治風毒脚弱痹滿上氣方第二十一治服散卒發動困篤方第二十二治卒上氣咳嗽方第二十三治卒身面腫滿方第二十四卷之四治卒大腹水病方第二十五治卒心腹癥堅方第二十六治心腹寒冷食飲積聚結癖方第二十七治胷膈上痰癊諸方第二十八治卒患胷痹痛方第二十九治卒胃反嘔啘方第三十治卒發黄疸諸黃病方第三十一治卒患腰脇痛諸方第三十二治虚損羸瘦不堪勞動方第三十三治脾胃虚弱不能飲食方第三十四治卒絶糧失食飢憊欲死方第三十五卷之五治癰疽妬乳諸毒腫方第三十六治腸癰肺癰方第三十七治卒發丹火惡毒瘡方第三十八治瘑癬疥漆瘡諸惡瘡方第三十九治卒得癩皮毛變黑方第四十治卒得蟲鼠諸瘻方第四十一治卒隂腫痛頽卵方第四十二卷之六治目赤痛暗昧刺諸病方治卒耳聾諸病方治耳爲百蟲雜物所入方治卒食噎不下方治卒諸雜物鯁不下方治卒誤吞諸物及患方治面疱髮秃身臭心惛鄙醜方卷之七治爲熊虎爪牙所傷毒痛方治卒爲猘犬所咬毒方治卒毒及狐溺棘所毒痛方治卒青蛙蝮虺衆蛇所螫方治蛇瘡敗蛇骨刺人入口繞身諸方治卒入山草禁辟衆蛇藥術方治卒蜈蚣蜘蛛所螫方治卒蠆螫方治卒蜂所螫方治卒蝎所螫方治中蠱毒方治卒中溪毒方治卒中射工水弩毒方治卒中沙虱毒方治卒服藥過劑煩悶方治卒中諸藥毒救解方治食中諸毒方治防避飲食諸毒方治卒飲酒大醉諸病方卷之八治百病備急丸散膏諸要方治牛馬六畜水穀疫癘諸病方葛仙翁肘後備急方目録
