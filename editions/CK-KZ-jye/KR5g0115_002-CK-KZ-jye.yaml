canonical_identifier: bkk:krp/KR5g0115/CK-KZ-jye/v1/juan/2
seq: 2
front:
  text: 食梅師方治腹滿不能服藥煨生薑綿裹內下部中冷卽易之聖惠方治肺藏壅熱煩悶新百合四兩蜜半盞和蒸令軟時時含一棗大嚥津
  hash: sha256:daea0910092481c2e9eec6f04a64d736ac62bf409ce90a5de6c1948fa1d47cc5
body:
  text: 凡所以得霍亂者多起飲食或飲食生冷雜物以肥膩酒鱠而當風履濕薄衣露坐或夜卧失覆之所致初得之便務令暖以炭火布其所臥下大熱減之又並蒸被絮若衣絮自苞冷易熱者亦可燒地令熱水沃敷薄布席臥其上厚覆之亦可作灼灼爾熱湯著瓮中漬足令至膝并銅器貯湯以著腹上衣藉之冷復易亦可以熨斗貯火著腹上如此而不淨者便急灸之但明案次第莫爲亂灸須有其病乃隨病灸之未有病莫預灸灸之雖未卽愈要萬不復死矣莫以灸不卽愈而止灸霍亂艾丸若不大壯數亦不多本方言七壯爲可四五十無不便火下得活服舊方用理中丸及厚朴大豆豉通脈半夏湯先輩所用藥者難得今但疏良灸之法及單行數方用之有效不減於貴藥已死未久者猶可灸餘藥乃可難備而理中丸四順厚朴諸湯可不預合每向秋月常買自隨卒得霍亂先腹痛者灸臍上十四壯名太倉在心厭下四寸更度之先洞下者灸臍邊一寸男左女右十四壯甚者至三十四十壯名大腸募洞者宜瀉先吐者灸心下二寸十四壯又并治下痢不止上氣灸五十壯名巨闕正心厭尖頭下一寸是也先手足逆冷者灸兩足內踝上一尖骨是也兩足各七壯不愈加數名三陰交在內踝尖上三寸是也轉筋者灸蹶心當拇指大聚筋上六七壯名涌泉又灸足大指下約中一壯神驗又方灸大指上爪甲際七壯轉筋入腹痛者令四人捉手足灸臍左二寸十四灸股中大筋上去陰一寸若啘者灸手腕第一約理中七壯名心主當中指下利不止者灸足大指本節內側寸白肉際左右各七壯名大都乾嘔者灸手腕後三寸兩筋間是左右各七壯名間使若正厥嘔絶灸之便通小品方起死吐且下利者灸兩乳連黑外近腹白肉際各七壯亦可至二七壯若吐止而利不止者灸臍一夫納中七壯又云臍下一寸二七壯若煩悶凑滿者灸心厭下三寸七壯名胃管又方以鹽內臍中上灸二七壯若繞臍痛急者灸臍下三寸三七壯名關元良治霍亂神秘起死灸法以物橫度病人人中屈之從心鳩尾飛度以下灸先灸中央畢更橫灸左右也又灸脊上以物圍令正當心厭又夾脊左右一寸各七壯是腹背各灸三處也華佗治霍亂已死上屋喚魂又以諸治皆至而猶不差者捧病人腹卧之伸臂對以繩度兩頭肘尖頭依繩下夾背脊大骨肉中去脊各一寸灸之百壯不治者可灸肘椎已試數百人皆灸畢卽起坐佗以此術傳子孫代代皆祕之右此前并是灸法治霍亂心腹脹痛煩滿短氣未得吐下方鹽二升以水五升煮取二升頓服得吐愈又方生薑若乾薑一二升㕮咀以水六升煮三沸頓服若不卽愈更可作無新藥煮滓亦得又方飲好苦酒三升小老羸者可飲一二升又方温酒一二升以蠟如彈丸一枚置酒中消乃飲無蠟以鹽二方寸匕代亦得又方桂屑半升以暖飲二升和之盡服之又方濃煮竹葉湯五六升令灼已轉筋處又方取楠若樟木大如掌者削之以水三升煮三沸去滓令灼之也又方服乾薑屑三方寸匕又方取蓼若葉細切二升水五升煮三沸頓服之煮乾蘇若生蘇汁卽亦佳又方小蒜一升㕮咀以水三升煮取一升頓服之又方以暖湯漬小蒜五升許取汁服之亦可又方以人血合丹服如梧子大二丸又方生薑一斤切以水七升煮取一升分爲三服又方取賣解家機上垢如雞子大温酒服之差又方飲竹𤃉少許亦差又方乾薑二兩甘草二兩附子一兩水三升煮取一升內猪膽一合相和分爲三服又方蘆蓬茸一大把濃煮飲二升差若轉筋方燒鐵令赤以灼踵白肉際上近後當縱鐵以隨足爲留停令成瘡兩足皆爾須臾間熱入腹不復轉筋便愈可脫刀燒蝦尾用之卽差又方煮苦酒三沸以摩之合少粉尤佳以絮胎縛從當膝下至足又方燒梔子二七枚研末服之又方桂半夏等分末方寸匕水一升和服之差又方生大豆屑酒和服方寸匕又方燒蜈蚣膏傅之卽差苦轉筋入腸中如欲轉者取雞矢白一寸水六合煮三沸頓服之勿令病者知之又方苦酒煮衣絮絮中令温從轉筋處裏之又方燒編薦索三撮仍酒服之卽差又方釜底黑末酒服之差若腹中已轉筋者當倒擔病人頭在下勿使及也腹中平乃止若兩臂脚及胸脇轉筋取鹽一升半水一斗煮令熱灼灼爾漬手足在胸脅者湯洗轉筋入腹中倒擔病人令頭在下腹中平乃止若極者手引陰陰縮必死猶在倒擔之可活耳若注痢不止而轉筋入腹欲死生薑一兩累擘破以酒升半煮合三四沸頓服之差治霍亂吐下後心腹煩滿方梔子十四枚水三升煮取二升內豉七合煮取一升頓服之嘔者加橘皮二兩若煩悶加豉一升甘草一兩蜜一升增水二升分爲五服治霍亂煩躁臥不安穩方葱白二十莖大棗二十枚水三升煮取二升頓服之治霍亂吐下後大渴多飲則煞人方以黃米五升水一斗煮之令得三升清澄稍稍飲之莫飲余物也崔氏云理中丸方甘草三兩乾薑人參白术各一兩搗下篩蜜丸如彈丸覺不住更服一枚須臾不差仍温湯一斗以麋肉中服之頻頻三五度令差亦可用酒服四順湯治吐下腹乾嘔手足冷不止乾薑甘草人參附子各二兩水六升煮取三升半分爲三服若下不止加龍骨一兩腹痛甚加當歸二兩胡洽用附子一枚桂一兩人霍亂亦不吐痢但四支脉沉肉冷汗出渴者卽差厚朴湯治煩嘔腹脹厚朴四兩炙桂二兩枳實五枚炙生薑三兩以水六升煮取二升分爲三服凡此湯四種是霍亂諸患皆治之不可不合也霍亂若心痛尤甚者此爲挾毒兼用中惡方治之附方孫眞人治霍亂以胡椒三四十粒以飲吞之斗門方治霍亂用黃杉木劈開作片一握以水濃煎一盞服之外臺秘要治霍亂煩躁燒亂髮如鷄子大鹽湯三升和服之不吐再服又方治霍亂腹痛吐痢取桃葉三升切以水五升煮取一升三合分温二服梅師方治霍亂心痛利無汗取梨葉枝一大握水三升煎取一升服又方治霍亂後煩躁卧不安穩葱白二十莖大棗二十枚以水三升煎取二升分服兵部手集救人霍亂頗有神效漿水稍酸味者煎乾薑屑呷之夏月腹肚不調煎呷之差孫用和治大瀉霍亂不止附子一枚重七錢炮去皮臍爲末每服四錢水兩盞鹽半錢煎取一盞温服立止集效方治吐瀉不止或取轉多四肢發厥虛風不省人事服此四肢漸暖神識便省回陽散天南星爲末每服三錢入京棗三枚水一盞半同煎至八分温服未省再服聖惠方治霍亂轉筋垂死敗蒲席一握細切漿水一盞煮汁温温頓服又方治肝虛轉筋用赤蓼莖葉切三合水一盞酒三合煎至四合去滓温分二服又方治肝風虛轉筋入腹以鹽半斤水煮少時熱漬之佳孫尚藥治脚轉筋疼痛攣急者松節一兩細剉如米粒乳香一錢右件藥用銀石器內慢火炒令焦只留三分性出火毒研細每服一錢至二錢熱木瓜酒調下應時筋病皆治之古今錄驗方治霍亂轉筋取蓼一手把去兩頭以水二升半煮取一升半頓服之治傷寒及時氣瘟病及頭痛壯熱脉大始得一日方取旨兌根葉合搗三升許和之真丹一兩水一升合煮絞取汁頓服之得吐便差若重一升盡服厚覆取汗差又方小蒜一升搗取汁二合頓服之不過再作便差又方烏梅二七枚鹽五合以水三升煮取一升去滓頓服之又方取生杍木削去黑皮細切裏白一升以水二升五合煎去滓一服八合三服差又方取朮丸子二七枚以水五升挼之令熟去滓盡服汁當吐下愈又方雞子一枚著冷水半升攪與合乃復煮三升水極令沸以向所和水投湯中急攪令相得適寒温頓服取汗又方以眞丹塗身令遍面向火坐令汗出差又方取生蘘荷根葉合搗絞取汁服三四升又方取乾艾三斤以水一斗煮取一升去滓頓服取汗又方鹽一升食之以湯送之腹中當絞吐便覆取汗便差又方取比輪錢一百五十七枚以水一斗煮取七升服汁盡之須臾復以五升水更煮令得一升以水二升投中合令得三升出錢飲汁當吐毒出也又方取猪膏如彈丸者温服之日三服三日九服又方烏梅三十枚去核以豉一升苦酒三升煮取一升半去滓頓服又傷寒有數種人不能别令一藥盡治之者若初覺頭痛肉熱脉洪起一二日便作葱豉湯用葱白一虎口豉一升以水三升煮取一升頓服取汗不汗復更作加葛根二兩升麻三兩五升水煎取二升分再服必得汗若不汗更加麻黃二兩又用葱湯研米二合水一升煮之少時下鹽豉後內葱白四物令火煎取三升分服取汗也又方豉一升小男溺三升煎取一升分爲再服取汗又方葛根四兩水一斗煎取三升乃內豉一升煎取升半一服搗生葛汁服一二升亦爲佳也若汗出不歇已三四日胸中惡欲令吐者豉三升水七升煮取二升半去滓內蜜一兩又煮三沸頓服安臥當得吐不差更服取差祕法傳於子孫也又方生地黃三斤細切水一斗煮取三升分三服亦可服藜蘆吐散及苦參龍膽散若已五六日以上者可多作青竹瀝少煎令減爲數數飲之厚覆取汗又方大黃黃連黃檗栀子各半兩水八升煮六七沸內豉一升葱白七莖煮取三升分服宜老少又方苦參二兩黃芩二兩生地黃半斤水八升煮取一升分再服或吐下毒則愈若已六七日熱極心下煩悶狂言見鬼欲起走用乾茱萸三升水二升煮取一升後去滓寒温服之得汗便愈此方恐不失必可用也祕之又方大蚓一升破去以人溺煮令熟去滓服之直生絞汁及水煎之并善又絞糞汁飲數合至一二升謂之黃龍湯陳久者佳又方取白犬從背破取血破之多多爲佳當及熱以薄胸上冷乃去之此治垂死者活無白犬諸純色者亦可用之又方取桐皮削去上黑者細擘之長斷令四寸一束以酒五合以水一升煮取一升去滓頓服之當吐下青黃汁數升卽差又方雞子三枚芒消方寸匕酒三合合攪散消盡服之又方黃連三兩黃檗黃芩各二兩梔子十四枚水六升煎取二升分再服治煩嘔不得眠治時氣行垂死破棺千金煮湯苦參一兩㕮咀以酒二升半舊方用苦參酒煮令得一升半去滓適寒温盡服之當間苦寒吐毒如溶膠便愈又方大錢百文水一斗煮取八升內麝香當門子李子大末稍稍與飲至盡或汗或吐之治温毒發斑大疫難救黑膏生地黃半斤切碎好豉一升猪脂二斤合煎五六沸令至三分減一絞去滓末雄黃麝香如大豆者內中攪和盡服之毒從皮中出卽愈又方用生蝦蟆正爾破腹去腸乃搗吞食之得五月五日乾者燒末亦佳矣黑奴丸胡洽小品同一名水解丸又一方加小麥黑勃一兩名爲麥奴丸支同此注麻黃二兩大黃二兩黃芩一兩芒消一兩釜底墨一兩竈突墨二兩梁上塵二兩搗蜜丸如彈丸新汲水五合末一丸頓服之若渴但與水須臾寒寒了汗出便解日移五赤不覺更服一丸此治五六日胸中大熱口噤名爲壞病不可醫治用此黑奴丸又方大青四兩甘草膠各二兩豉八合以水一斗煮二物取三升半去滓內豉煮三沸去滓乃內膠分作四服盡又合此治得至七八日發汗不解及吐下大熱甚佳又方大黃三兩甘草二兩麻黃二兩杏人三十枚芒消五合黃芩一兩巴豆二十粒熬搗蜜丸和如大豆服三丸當利毒利不止米飲止之家人視病者亦可先服取利則不相染易也此丸亦可預合置麻黃解肌一二日便服之麻黃甘草升麻芍藥石膏各一兩杏人三十枚貝齒三枚末之以水三升煮取一升頓服覆取汗出卽愈便食豉粥補虛卽宜也又方麻黃二兩芩桂各一兩生薑三兩以水六升煮取二升分爲四服亦可服葛根解肌湯葛根四兩芍藥二兩麻黃大青甘草黃芩石膏桂各一兩大棗四枚以水五升煮取二升半去滓分爲三服微取汗三日已上至七八日不解者可服小柴胡湯柴胡八兩人參甘草黃芩各三兩生薑八兩無者乾薑三兩半夏五兩湯洗之大棗十二枚水九升煮取二升半分爲三服微覆取汗半日須臾便差若不好更作一劑若有熱實得汗不解復滿痛煩躁欲謬語者可服大柴胡湯方柴胡半斤大黃二兩黃芩三兩芍藥二兩枳實十枚半夏五兩洗之生薑五兩大棗十二枚水一斗煮取四升當分爲四服當微利也此四方最第一急須者若幸可得藥便可不營之保無死憂諸小治爲防以窮極耳若病失治及治不差十日已上皆名壞病唯應服大小鼈甲湯此方藥分兩乃少而種數多非備急家所辦故不載凡傷寒發汗皆不可使流離過多一服得微汗汗潔便止未止粉之勿當風初得傷寒便身重腰背痛煩悶不已脉浮面赤斑斑如錦文喉咽痛或下痢或狂言欲走此名中陽毒五日可治過此死宜用此方雄黃甘草升麻當歸椒桂各一分水五升煮取二升半分三服温覆取汗服後不汗更作一劑若身重背强蟄蟄如被打腹中痛心下硬短氣嘔逆唇青面黑四肢冷脉沉細而緊數此名中陰毒五日可治過此死用此方甘草升麻各二分當歸椒各一分鱉甲一兩以水五升煮取二升半分三服温覆取汗汗不出湯煮更作也陰毒傷口鼻冷者乾薑桂各一分末温酒三合服之當大熱差凡陰陽二毒不但初得便爾或一二日變作者皆以今藥治之得此病多死治熱病不解而下痢困篤欲死者服此大青湯方大青四兩甘草三兩膠二兩豉八合赤石脂三兩以水一斗煮取三升分三服盡更作日夜兩劑愈又方但以水五升豉一升梔子十四枚韭白一把煮取三升半分爲三服又方龍骨半斤搗碎以水一斗煮取五升使極冷稍稍飲其間或得汗卽愈矣又方黃連當歸各二兩乾薑一兩赤石脂二兩蜜丸如梧子服二十丸日三夜再又方黃連二兩熟艾如鴨卵大以水二斗煮取一升頓服立止天行諸痢悉主之黃連三兩黃檗當歸龍骨各二兩以水六升煮取二升去滓入蜜七合又火煎取一升半分爲三服效天行毒病挾熱腹痛下痢升麻甘草黃連當歸芍藥桂心黃檗各半兩以水三升煮取一升服之當良天行四五日大下熱痢黃連黃檗各三兩龍骨三兩艾如雞子大以水六升煮取二升分爲二服忌食猪肉冷水若下膿血不止者赤石脂一斤乾薑一兩粳米一升水七升煮米熟去滓服七合日二又方赤石脂一斤乾薑二兩水五升煮取三升分二服若絞臍痛加當歸一兩芍藥二兩加水一升也若大便堅閉令利者大黃四兩厚朴二兩枳實四枚以水四升煮取一升二合分再服得通者止之若十餘日不大便者服承氣丸大黃杏人各二兩枳實一兩芒消一合搗蜜和丸如彈丸和湯六七合服之未通更服若下痢不能食者黃連一升烏梅二十枚炙燥并得搗末蠟如棋子大蜜一升合於微火上令可丸丸如梧子大一服二丸日三若小腹滿不得小便方細末雌黃蜜和丸取如棗核大內溺孔中令半寸亦以竹管注陰令痛朔之通又方末滑石三兩葶藶子一合水二升煮取七合服又方搗生葱薄小腹上參易之治胸脇痞滿心塞氣急喘急方人參术各一兩枳實二兩乾薑一兩搗蜜和丸一服一枚若嗽加括蔞二兩吐加牡蠣二兩日夜服五六丸不愈更服毒病攻喉咽腫痛方切當陸炙令熱以布藉喉以熨布上冷復易又方取眞䕡茄爪甲大內口中以牙小嚼汁以漬喉當微覺異爲佳也毒病後攻目方煮蜂窠以洗之日六七度佳又方冷水漬青布以掩之若生翳者燒豉二七粒末內管鼻中以吹之治傷寒嘔不止方甘草一兩升麻半兩生薑三兩橘皮二兩水三升煮取二升頓服之愈又方乾薑六分附子四分末以苦酒丸如梧子大一服三丸日三服治傷寒啘不止方甘草三兩橘皮一升水五升煮取三升分服日三取差又方熟洗半夏末服之一錢一服又方赤蘇一把水三升煮取二升稍稍飲又方乾薑六分附子四分末苦酒丸如梧子大服三丸日三服比歲有病時行仍發瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨决隨生不卽治劇者多死治得差後瘡瘢紫黑彌歲方滅此惡毒之氣世人云永徽四年此瘡從西東流遍於海中煮葵菜以蒜齏啖之卽止初患急食之少飯下菜亦得以建武中於南陽擊虜所得仍呼爲虜瘡諸醫參詳作治用之有效方取好蜜通身上摩亦可以蜜煎升麻并數數食又方以水濃煮升麻綿沾洗之苦酒漬彌好但痛難忍其餘治猶依傷寒法但每多作毒意防之用地黃黑膏亦好治時行病發黃方茵陳六兩大黃二兩栀子十二枚以水一斗先煮茵陳取五升去滓內二物又煮取三升分四服亦可兼取黃疸中雜治法差比歲又有虜黃病初唯覺四體沉沉不快須臾見眼中黃漸至面黃及舉身皆黃急令溺白紙紙卽如檗染者此熱毒已入內急治之若初覺便作瓜蒂赤豆散吹鼻中鼻中黃汁出數升者多差若已深應看其舌下兩邊有白脉彌彌處蘆刀割破之紫血出數升亦歇然此須慣解割者不解割忽傷亂舌下青脈血出不止便煞人方可燒紡軨鐵以灼此脈令焦兼瓜蒂雜巴豆搗爲丸服之大小便亦去黃汁破灼已後禁諸雜食又云有依黃坐黃復須分別之方切竹煮飲之如飲又方搗生瓜根絞取汁飲一至二三升又方醋酒浸雞子一宿吞其白數枚又方竹葉切五升小麥七升石膏三兩末綿裹之以水一斗五升煮取七升一服一升盡吃卽差也又方生葛根汁二升好豉一升栀子三七枚茵陳切一升水五升煮取三升去滓內葛汁分爲五服又方金色脚雞雌雞血在治如食法熟食肉飲汁令盡不過再作亦可下少鹽豉佳治毒攻手足腫疼痛欲斷方用虎杖根剉煮適寒温以漬足令踝上有赤許水止之又方以稻穰灰汁漬足又方酒煮苦參以漬足差又方鹽豉及羊尿一升搗令熟以漬之又方細剉黃檗五斤以水三斗煮漬之亦治攻陰腫痛又方作坎令深三赤少容兩足燒坎令熱以酒灌坎中着屐踞坎中壅勿令泄又方煮羊桃汁漬之雜少鹽豉尤好又方煮馬矢若羊矢汁漬又方猪膏和羊矢塗之亦佳又方以牛肉裹腫處腫消痛止又方搗常思草絞取汁以漬足又方猪蹄一具合葱煮去滓內少鹽以漬之毒病下部生瘡者燒鹽以深導之不過三又方生漆塗之綿導之又方大丸艾灸下部此謂窮無藥又方取蚓三升以水五升得二升半盡服之又方煮桃皮煎如飴以綿合導之又方水中荇菜搗綿裹導之日五易差又方櫸皮槲皮合煮汁如粘糖以導之又濃煮桃皮飲之最良又方搗蛇莓汁服三合日三水漬烏梅令濃并內崖蜜數數飲若病人齒無色舌上白或喜睡眠憒憒不知痛癢處或下痢急治下部不曉此者但攻其上不以下爲意下部生蟲蟲食其肛肛爛見五臟便死治之方取雞子白內漆合攪還內殻中仰頭吞之當吐蟲則愈又方燒馬蹄作灰細末猪脂和塗綿以導下部日數度差又方桃人十五枚苦酒二升鹽一合煮取六合服之又方燒艾於管中薰之令煙入下部中少雄黃雜妙此方是溪温故爾兼取彼治法又有病䘌下不止者烏頭二兩女萎雲實各一兩桂二分蜜丸如桐子水服五丸一日三服治下部卒痛如鳥啄之方赤小豆大豆各一升合搗兩囊貯蒸之令熟更互坐卽愈此本在雜治中亦是傷寒毒氣所攻故凡治傷寒方甚多其有諸麻黃葛根桂枝柴胡青龍白虎四順四逆二十餘方並是至要者而藥難盡備且診候須明悉别所在撰大方中今唯載前四方尤是急須者耳其黃膏赤散在辟病條中預合初覺患便服之傷寒時行温疫三名同一種耳而源本小異其冬月傷於寒或疾行力作汗出得風冷至夏發名爲傷寒其冬月不甚寒多暖氣及西風使人骨節緩惰受病至春發名爲時行其年歲中有癘氣兼挾鬼毒相注名爲温病如此診候略相似又貴勝雅言惣名傷寒世俗因號爲時行道術符刻言五温亦復殊大歸終止是共途也然自有陽明少陰陰毒陽毒爲異耳少陰病例不發熱而腹滿下痢最難治也附方必效方治天行一二日者麻黃一大兩去節以水四升煮去沫取二升去滓著米一匙及豉爲稀粥取粥一升先作熟湯浴淋頭百餘碗然後服粥厚覆取汗於夜最佳梅師方治傷寒汗出不解已三四日胸中悶吐豉一升鹽一合水四升煎取一升半分服當吐聖惠方治傷寒四日已嘔吐更宜吐以苦參末酒下二錢得吐差又方治時氣熱毒心神煩燥用藍澱半大匙以新汲水一盞服又方治時氣頭痛不止用朴消三兩搗羅爲散生油調塗頂上又方治時氣煩渴用生藕汁一中盞入生蜜一合令勻分二服勝金方治時疾熱病狂言心燥苦參不限多少炒黃色爲末每服二錢水一盞煎至八分温服連煎三服有汗無汗皆差博濟方治陰陽二毒傷寒黑龍丹舶上硫黃一兩以柳木槌研三兩日巴豆一兩和殻記箇數用二升鐺子一口先安硫黃鋪鐺底次安巴豆又以硫黃蓋之釅醋半升已來澆之盞子蓋合令緊蜜更以濕紙周回固濟縫勿令透氣縫紙乾更以醋濕之文武火熬常著人守之候裏面巴豆作聲數已半爲度急將鐺子離火便入臼中急搗令細再以少米醋并蒸餅少許再搗令冷可丸如雞頭大若是陰毒用椒四十九粒葱白二莖水一盞煎至六分服一丸陽毒用豆鼓四十九粒葱白二莖水一盞同煎吞一丸不得嚼破孫用和方治陽毒入胃下血頻疼痛不可忍鬱金五箇大者牛黃一皂莢子別細研二味同爲散每服用醋漿水一盞同煎三沸温服孫兆口訣治陰毒傷寒手足逆冷脉息沉細頭疼腰重兼治陰毒咳逆等疾方川烏頭乾薑等分爲粗散炒令轉色放冷再搗爲細散每一錢水一盞鹽一撮煎取半盞温服又方治陰勝隔陽傷寒其人必燥熱而不欲飲水者是也宜服霹靂散附子一枚燒爲灰存性爲末蜜水調下爲一服而愈此逼散寒氣然後熱氣上行而汗出乃愈聖惠方治陰毒傷寒四肢逆冷宜熨以吳茱萸一升酒和勻濕絹袋二隻貯蒸令極熱熨腳心候氣通暢勻暖卽停熨累驗唐崔元亮療時疾發黃心狂煩熱悶不認人方取大栝樓一枚黃者以新汲水九合浸一切熱毒暑月和甘草煎色如琥珀可愛堪著嘗之甘美瓶置井中令冷徹如水白甆器及銀器中貯似茶啜之時人呼爲冷飲子又且尊於茗能破女子經候不通搗以酒浸常服有孕之人斷勿服破血凡得毒病愈後百日之內禁食猪犬羊肉并傷血及肥魚久膩乾魚則必大下痢下則不可復救又禁食麵食胡蒜韭薤生菜蝦䱉輩食此多致復發則難治又令到他年數發也治篤病新起早勞及食飲多致欲死方燒鱉甲服方寸匕又方以水服胡粉少許又方粉三升以暖水和服之厚覆取汗又方乾蘇一把水五升煮取二升盡服之無乾者生亦可用加生薑四兩豉一升又方鼠矢兩頭尖者二七枚豉五合以水三升煎半頓服之可服温覆取汗愈有麻子人內一升加水一升彌良亦可內枳實葱白一虎口也又方取伏雞子殻碎之熬令黃黑細末熱湯服一合温覆取汗又方大黃麻黃各二兩栀子人十四枚豉一升水五升煮取三升分再服當小汗及下痢又方濃煮甘皮服之蘆根亦佳覺多而發復方燒飯篩末服方寸匕良治交接勞復陰卵腫或縮入腹腹中絞痛或便絶方燒婦人月經衣服方寸匕又方取㹠子一枚撞之三十六放於戸中逐使喘極乃刺脇下取血一升酒一升合和飲之若卒無者但服血愼勿便冷應用猳㹠又方取所交接婦人衣覆男子上一食久活又方取猳㹠脛及血和酒飲之差又方刮青竹茹二升以水三升煮令五六沸然後絞去滓以竹茹湯温服之此方亦通治勞復又方礬石一分消三分末以大麥粥清可方寸匕一服熱毒隨大小便出又方取蓼子一大把水挼取汁飲一升乾者濃取汁服之葱頭搗以苦酒和服亦佳又方蚯蚓數升絞取汁服之良若差後病男接女病女接男名陰陽易病者發復復者亦必死卒陰易病男女温病差後雖數十日血脉未和尚有熱毒與之交接者卽得病曰陰易殺人甚於時行宜急治之令人身體重小腹急熱上腫胸頭重不能舉眼中生䁾膝脛拘急欲死方取婦人褌親陰上者割取燒末服方寸匕日三小便卽利而陰微腫者此當愈得童女褌亦良若女病亦可用男褌又方鼠矢兩頭尖者二七枚藍一把水五升煮取二升盡服之温覆取汗又方蚯蚓二十四枚水一斗煮取三升一服仍取汗並良又方末乾薑四兩湯和頓服温覆取汗得解止又方男初覺便灸陰三七壯若未盡甚至百壯卽愈眼無妨陰道瘡復常兩男兩女并不自相易則易之爲名陰陽交換之謂也凡欲病人不復取女人手足爪二十枚又取女中下裳帶一尺燒灰以酒若米飲服之大病差後小勞便鼻衂方左顧牡蠣十分石膏五分搗末酒服方寸匕日三四亦可蜜丸服如梧子大服之大病差後多虛汗及眼中流汗方杜仲牡蠣分等暮臥水服五匕則停不止更作又方甘草二兩石膏二兩搗末以漿服方寸匕日二服差又方龍骨牡蠣麻黃根末雜粉以粉身良又差復虛煩不得眠眼中㾓疼懊憹豉七合烏梅十四枚水四升先煮梅取二升半內豉取一升半分再服無烏梅用栀子十四枚亦得又方黃連四兩芍藥二兩黃芩一兩膠三小挺水六升煮取三升分三服亦可內乳子黃二枚又方千里流水一石揚之萬度二斗半半夏二兩洗之秫米一斗茯苓四兩合煮得五升分五服附方梅師方治傷寒差後交接發動困欲死眼不開不能語方栀子三十枚水三升煎取一升服辟瘟疫藥干散大麻人柏子人乾薑細辛各一兩附子半兩炮搗篩正旦以井華水舉家各服方寸匕疫極則三服日一服老君神明白散术一兩附子三兩烏頭四兩桔梗二兩半細辛一兩搗篩正旦服一錢匕一家合藥則一里無病此帶行所遇病氣皆消若他人有得病者便温酒服之方寸匕亦得病已四五日以水三升煮散服一升覆取汗出也赤散方牡丹五分皂莢五分炙之細辛乾薑附子各三分肉桂二分眞珠四分躑躅四分搗篩爲散初覺頭强邑邑便以少許內鼻中吸之取吐温酒服方寸匕覆眠得汗卽差晨夜行及視病亦宜少許以內粉粉身佳牛馬疫以一匕著舌下溺灌日三四度甚妙也度瘴散辟山瘴惡氣若有黑霧鬱勃及西南温風皆爲疫癘之候方麻黃椒各五分烏頭三分細辛术防風桔梗桂乾薑各一分搗篩平旦酒服一盞匕辟毒諸惡氣冒霧行尤宜服之太乙流金方雄黃三兩雌黃二兩礬石鬼箭各一兩半羖羊角二兩搗爲散三角絳囊貯一兩帶心前并門戸上月旦青布裏一刀圭中庭燒温病人亦燒熏之卽差辟天行疫癘雄黃丹砂巴豆礬石附子乾薑分等搗蜜丸平旦向日吞之一丸如胡麻大九日止令無病常用辟温病散方真珠肉桂各一分貝母三分熬之雞子白熬令黃黑三分搗篩歲旦服方寸匕若歳中多病可月月朔望服之有病卽愈病人服者當可大效虎頭殺鬼方虎頭骨五兩朱砂雄黃雌黃各一兩半鬼臼皂莢蕪荑各一兩搗篩以蠟蜜和如彈丸絳囊貯系臂男左女右家中懸屋四角月朔望夜半中庭燒一丸一方有菖蒲藜蘆無虎頭鬼臼皂莢作散帶之趙泉黃膏方大黃附子細辛乾薑椒桂各一兩巴豆八十枚去心皮搗細苦酒漬之宿臘月猪膏二斤煎三上三下絞去滓蜜器貯之初覺勃色便熱如梧子大一丸不差又服亦可火炙以摩身體數百遍佳并治賊風走游皮膚并良可預合之便服卽愈也單行方術西南社中柏東南枝取暴乾末服方寸匕立差又方正月上寅日搗女青屑三角絳囊貯繫戸上帳前大吉又方馬蹄木搗屑二兩絳囊帶之男左女右又方正月朔旦及七月吞麻子小豆各二七枚又各二七枚投井中又以附子二枚小豆七枚令女子投井中又方冬至日取雄赤雞作臘至立春煮食盡勿分他人二月一日取東行桑根大如指懸門戶上又人人帶之又方埋鵲於圊前斷温病令不相染著斷髮仍使長七寸盜著病人臥席下又方以繩度所住戶中壁屈繩結之又方密以艾灸病人床四角各一壯不得令知之佳也又方取小豆新布囊貯之置井中三日出舉家男服十枚女服二十枚又方桃木中蟲矢末服方寸匕又方鮑魚頭燒三指撮小豆七枚合末服之女用豆二十七枚又方熬豉雜土酒漬常將服之又方以鯽魚密致卧下勿令知之又方柏子人細辛米祭米乾薑三分附子一分末酒服方寸匕日服三服十日又方用麥蘗服米祭米乾薑又云麻子人可作三種服之附方
