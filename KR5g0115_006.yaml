front:
  text: 葛仙翁肘後備急方卷之六陛六
  hash: sha256:2756cedf1f4984624de7f951b6f8367a1d786d2f8080bdca533e0327ef08d880
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0115_HFL_006-001a, image: hfl/1015/1015-094.png}
body:
  text: 治目赤痛暗昧㓨諸病方第四十三華佗禁方令病人自用手兩指擘所患眼垂空咒之曰疋疋屋舍狹窄不容宿客即出也傷寒方末亦有眼方姚方目中冷淚出眥赤癢乳汁煎方黄連三分蕤仁二分乾薑四分以乳汁一升漬一宿微火煎取三合去滓取米大傅眥睛爲所傷損破方牛旋日二點避風黑睛破亦差附方范汪方主目中淚出不得開即刺痛方以鹽如大豆許内目中習習去鹽以冷水數洗目差博濟方治風毒上攻眼腫癢澁痛不可忍者或上下臉眥赤爛浮翳瘀肉侵睛神效驅風散五倍子一兩蔓荆子一兩半同杵末每服二錢水二盞銅石器内煎及一盞澄滓熱淋洗留滓二服又依前煎淋洗大能明眼目去澁癢簡要濟衆治肝虚目睛疼冷泪不止筋脉痛及眼羞明怕日補肝散夏枯草半兩香附子一兩共爲末每服一錢臘茶調下無時聖惠方治眼癢急赤澀用大膽汁注目中又方治風赤眼以地龍十條炙乾爲末夜卧以冷茶調下二錢七又方治傷寒熱毒氣攻眼生白翳用烏賊魚骨二兩不用大皮杵末入龍腦少許更研令細日三四度取少許點之又方治乆患内障眼車前子乾地黄麥門冬等分爲末蜜丸如梧桐子大服屢效治目方用黃連多矣而羊肝丸尤竒異取黄連末一大兩白羊子肝一具去膜同於砂盆内研令極細衆手捻爲丸如梧桐子每食以暖漿水吞二七枚連作五劑差但是諸眼目疾及障翳青盲皆主之禁食猪肉及冷水劉禹錫云有崔承元者因官治一死罪囚出活之因後數年以病自致死一旦崔爲内障所苦喪眀逾年後半夜嘆息獨坐時聞階除間悉窣之聲崔問爲誰曰是昔所蒙活者囚今故報恩至此遂以此方告訖而没崔依此合服不數月眼復明因傳此方於世又方今醫家洗眼湯以當歸芍藥黄連等分停細以雪水或甜水煎濃汁乘熱洗冷即再温洗甚益眼目但是風毒赤目花翳等皆可用之其説云凡眼目之病皆以血脉凝滯使然故以行血藥合黄連治之血得熱即行故乘熱洗之用者無不神效又方治雀目不計時月用蒼术二兩搗羅爲散每服一錢不計時候以好羊子肝一箇用竹刀子批破糝藥在内麻繩纏定以粟米泔一大盞煑熟爲度患人先薰眼藥氣絶即喫之簡要濟衆治小兒雀目梅師方治目暗黄昏不見物者以青羊肝切淡醋食之煮亦佳又方治眼睛無故突一二寸者以新汲水灌漬睛中數易水睛自入崔元亮海上方著此三名一名西國草一名畢楞伽一名覆盆子治眼暗不見物冷浪浸淫不止及青盲天行目暗等取西國草日暴乾搗令極爛薄綿裹之以飲男乳汁中浸如人行八九里乆用點目中即仰卧不過三四日視物如少年禁酒油麵千金方點小兒黑花眼翳澀痛用貝齒一兩燒作灰研如麵入少龍腦點之妙又方常服明目洞視胡麻一石蒸之三十遍末酒服每日一升又方古方明目黑髮槐子於牛膽中漬隂乾百日食後吞一枚十日身輕三十日白髮黑百日内通神孫眞人食忌主眼有翳取芒消一大兩置銅器中急火上煉之放冷後以生絹細羅點眼角中每夜欲卧時一度點妙經驗方退翳明目白龍散馬牙消光淨者用厚紙裹令按實安在懷内著肉處養一百二十日取出研如粉入少龍腦同研細不計年歲深遠眼内生翳膜漸漸昏暗遠視不明但瞳人不破散并醫得每點用藥末兩米許點目中又方治内外障眼蒼术四兩米泔浸七日逐日换水後刮去黑皮細切入青鹽一兩同炒黄色爲度去鹽不用木賊二兩以童子小便浸一宿水淘焙乾同搗爲末每日不計時候但飲食蔬菜内調下一錢七服甚驗經驗後方治虚勞眼暗采三月蔓菁花隂乾爲末以井花水每空心調下二錢七乆服長生可讀夜書外臺秘要主目翳及努肉用礬石最白者内一黍米大於翳上及努肉上即冷泪出綿拭之令惡汁盡其疾日日減翳自消薄便差礬石須眞白好者方可使用又補肝散治三十年失明蒺藜子七月七日收隂乾搗散食後水服方寸七又療盲猪膽一枚微火上煎之可丸如黍米大内眼中食頃良又方治翳如重者取猪膽白皮曝乾合作小繩子如粗釵股大小燒作灰待冷便以灰點翳上不過三五度即差又方輕身益氣明目蕪菁子一升水九升煮令汁盡日乾如此三度搗末水服方寸七日三斗門方治火眼用艾燒令烟起以碗蓋之候烟上碗成煤取下用温水調化洗火眼即差更入黃連甚妙廣利方治眼築損努肉出生杏仁七枚去皮細嚼吐於掌中及熱以綿裹箸頭將點努肉上不過四五度差藥性論云空心用鹽揩齒少時吐水中洗眼夜見小字良顧含養嫂失明含嘗藥視膳不冠不食嫂目疾須用蚺蛇膽含計盡求不得有一童子以一合授含含開乃蚺蛇膽也童子出門化爲青鳥而去嫂目遂差治卒耳聾諸病方第四十七葛氏耳卒聾取鼠膽内耳内不過三愈有人云側卧瀝一膽盡須臾膽汁從下邊出初出益聾半日頃乃差治三十年老聾又方巴豆十四枚搗鵝脂半兩火熔内巴豆和取如小豆綿裹内耳中差日一易姚云差三十年聾若卒得風覺耳中怳怳者急取鹽七升甑蒸使熱以耳枕鹽上冷復易亦療耳卒疼痛蒸熨又方栝蔞根削令可入耳以臘月猪脂煎三沸出塞耳每日作三七日即愈姚氏耳痛有汁出方熬杏仁令亦黑搗如膏以綿裏塞耳日三易三日即愈聤耳耳中痛膿血出方月下灰吹滿耳令深入無苦即自出耳聾菖蒲根丸菖蒲根一寸巴豆一粒去皮心二物合搗篩分作七丸綿裹卧即塞夜易之十日立愈黃汁立差耳中膿血出方細附子末以葱涕和灌耳中良單葱涕亦佳側耳令入耳耳中常嗚方生地黃切以塞耳日十數易小品療聤耳出膿汁散方礬石二兩燒黄連一兩烏賊魚骨一兩三物爲散即如棗核大綿裏塞耳日再易更加龍骨耳聾巴豆丸巴豆一枚去心皮班猫一枚去翅足二物合搗篩綿裹塞耳中再易甚驗云此來所用則良又方礠石菖蒲通草熏陸香杏仁萆麻松脂搗篩爲末分等蠟及鵝脂和硬和爲丸稍長用釵子穿心爲孔先去耳塞然後内於藥日再初著癢及作聲月餘緫差殿中侯監效耳卒痛蒸鹽熨之痛不可忍求死者菖蒲附子各一分末和鳥麻油煉點耳中則立止聤耳膿血出車轄脂塞耳中膿血出盡愈附方肘後方療耳卒腫出膿水方礬石燒末以筆管吹耳内日三四度或以綿裏塞耳中立差經驗方治底耳方用桑螵蛸一個慢火炙及八分熟存性細研入麝香一字爲末糝在耳内每用半字如神効如有膿先用綿包子捻去次後糝藥末入耳内又方治耳卒聾巴豆一粒臘裹針刺令通透用塞耳中梅師方治耳乆聾松脂三兩煉巴豆一兩相和熟搗可丸通過以薄綿裹内耳孔中塞之日一度易聖惠方治腎氣虚損耳聾用鹿腎一對去脂膜切於豉汁中入粳米二合和煑粥入五味之法調和空腹令之作羹及酒并得社壬方治耳聾因腎虚所致十年内一服愈蠍至小者四十九枚生薑如蠍大四十九片二物銅器内炒至生薑乾爲度爲末都作一服初夜温酒下至二更盡盡量飲酒至醉不妨次日耳中如笙黃即效勝金方治耳聾立效以乾地龍入鹽貯在葱尾内爲水點之千金方治耳聾以雄黄硫黄等分爲末綿裹寒耳中又方酒三升漬牡荆子一升碎之浸七日去滓任性服盡三十年聾差又方以醇酢微火煎附子削令尖塞耳効外臺祕要治聾芥子搗碎以人乳調和綿裏塞耳差楊氏産乳方療耳鳴無晝夜烏頭燒作灰菖蒲等分爲末綿裏塞耳中日再用效治耳爲百蟲雜物所人方第四十八葛氏百蟲入耳以好酒灌之起行自出又方閉氣令人以蘆吹一耳又方以桃葉塞兩耳立出蜈蚣入耳以樹葉裹鹽灰令熱以掩耳冷復易立出蚰蜒入耳熬胡麻以葛囊貯枕之蟲聞香則自出蟻入耳炙猪脂香物安耳孔邊即自出神效方蚰蜒入耳以牛酪灌滿耳蚰蜒即出出當半銷若入腹中空腹食好酪一二升即化爲黃水而出不盡更作服手用神驗無比此方是近得又方小鷄一隻去毛足以油煎令黄箸穿作孔枕之又方取蚯蚓内葱葉中并化爲水滴入耳中蚰蜒亦化爲水矣附方勝金方主百蟲入耳不出以鷄冠血滴入耳内即出又千金方搗韭汁灌耳中差又方治耳中有物不可出以麻繩剪令頭散傅好膠著耳中物上粘之令相著徐徐引之令出又梅師方取車釭脂塗耳孔中自出續十全方治蟲入耳秦椒末一錢醋半盞浸良久少少灌耳蟲自出外臺秘要肘後治蟻入耳燒鯪鯉甲末以水調灌之即出劉禹錫傳信方治蚰蜒入耳以麻油作煎餅枕卧須臾蚰蜒自出而差李元淳尚書在河陽日蚰蜓入耳無計可爲半月後腦中洪洪有聲腦悶不可徹至以頭自擊門柱奏疾狀危極因發御藥以療之無差者爲受苦不念生存忽有人獻此方乃愈兵部手集治蚰蜒入耳小蒜汁理一切蟲入耳皆同錢相公篋中方治百節蚰蜒并蟻入耳以苦醋注之起行即出聖惠方治飛蛾入耳醬汁灌入耳即出又擊銅器於耳傍經驗方治水入耳以薄荷汁點立效治卒食噎不下方第四十九葛氏方取少蜜含之即立下又方取老牛涎沫如棗核大置水中飲之終身不復患噎也附方外臺祕要治噎羚羊角屑一物多少自在末之飲服方寸匕亦可以角摩噎上良食醫心鏡治卒食噎以陳皮一兩湯浸去穰焙爲末以水一大盞煎取半盞熱服聖惠方治膈氣咽喉噎塞飲食不下用碓觜上細糠蜜丸彈子大非時含一丸嚥津廣五行記云永徽中絳州僧病噎不下食吿弟子吾死之後便可開吾胷喉視有何物言終而卒弟子依言而開視胷中得一物形似魚而有兩頭遍體是肉鱗弟子置器中跳躍不止戲以諸味皆隨化盡時夏中藍多作澱有一僧以澱置器中此蟲遂繞器中走須臾化爲水治卒諸雜物鯁不下方第五十食諸魚骨鯁以魚骨於頭上立即愈下云謦咳即出又方小嚼薤白令柔以繩繫中持繩端吞薤到鯁處引之鯁當隨出療骨鯁仍取所餘者骨左右手反覆擲背後立出雜物鯁方解衣帶目窺下部不下即出又方好蜜以匕抄稍稍嚥之令下魚骨鯁在喉中衆法不能去者方取飴糖丸如鷄子黄大吞之不去又吞以漸大作丸用得效附方斗門方治骨鯁用鹿角爲末含津嚥下妙外臺祕要療鯁取虎骨爲末水服方寸七又方螻蛄腦一物吞亦治刺不出傅之刺即出又方口稱鸕鷀則下又古今録驗療魚鯁骨橫喉中六七日不出取鯉魚鱗皮合燒作屑以水服之則出未出更服勝金方治小兒大人一切骨鯁或竹木簽刺喉中不下方於臘月中取鱖魚膽懸北檐下令乾每魚鯁即取一皂子許以酒煎化温温呷若得逆便吐骨即隨頑涎出若未吐更吃温酒但以吐爲妙酒即隨性量力也若未出更煎一塊子無不出者此藥但是鯁物在藏腑中日久痛黄瘦甚者服之皆出若卒求鱖魚不得蠡魚鯇魚鯽魚俱可臘月收之甚佳孟詵云人患卒瘂取杏仁三分去皮尖熬别杵桂一分和如泥取李核用綿裏含細細嚥之日五夜三治卒誤吞諸物及患方第五十一葛氏誤吞釵方取薤曝令萎煮使熟勿切食一大束釵即隨出生麥菜若節縷皆可用誤吞釘及箭金針錢鐵等物方多食肥羊脂諸般肥肉等自裏之必得出吞諸珠璫鐵而鯁方燒弩銅令赤内水中飲其汁立愈誤吞錢燒火炭末服方寸七即出小品同又方服蜜三升即出姚氏食中吞髮繞喉不出方取梳頭髮燒作灰服一錢七吞環若指彄燒鵝羽數枚末飲之吞錢臘月米餳頓服半升又方濃煎艾汁服效附方聖惠方治誤吞銀環子釵子以水銀半兩服之再服即出又方治小兒誤吞針用磁石如棗核大磨令光鑽作竅絲穿令含針自出又方治小兒誤吞銅鐵物在咽喉内不下用南燭根燒細研熟水調一錢下之鐵相公篋中方療誤吞錢以磁石棗許大一塊含之立出又方取艾蒿一把細剉用水五升煎取一升頓服便下又外臺祕要取飴糖一斤漸漸盡食之環及釵便出又楊氏産乳葈耳頭一把以水一升浸水中十餘度飲水愈孫用和方治誤吞金銀或錢在腹内不下方石灰一杏核大硫黄一皂子大同研爲末酒調下不計時候姚氏方治食中誤吞髮繞喉不出取己頭亂髮燒作灰服一錢七水調陳藏器云故鋸無毒主誤吞竹木入喉咽出入不得者燒令赤漬酒中及熱飲並得治面疱髮秃身臭心惛鄙醜方第五十二葛氏療年少氣充面生𦫗瘡胡粉水銀臘月猪脂和熟研令水銀消散向暝以粉面曉拭去勿水洗至暝又塗之三度即差姚方同又方塗麋脂即差又方三歲苦酒漬鷄子三宿軟取白以塗上隱居效方疱瘡方黄連牡蠣各二兩二物搗篩和水作泥封瘡上濃汁粉之神驗冬葵散冬葵子柏子仁茯苓瓜瓣各一兩四物爲散食後服方寸匕日三酒下之療面及鼻酒齄方眞珠胡粉水銀分等猪脂和塗又鸕鷀矢和臘月猪脂塗亦大驗神効面多䵟𪒟或似雀卵色者苦酒煮术常以拭面稍稍自去又方新生鷄子一枚穿去其黄以朱末一兩内中漆固别方云蠟塞以鷄伏著例出取塗面立去而白又别方出西王母枕中陳朝張貴妃常用膏方鷄子一枚丹砂二兩末之仍云安白鷄腹下伏之餘同鷄子令面皮急而光滑丹砂發紅色不過五度傅面面白如玉光潤照人大佳卒病餘面如米粉傅者熬礬石酒和塗之姚云不過三度又方白蘞二分杏人半分鷄矢白一分搗下以蜜和之雜水以拭面良療人頭面患癧瘍方雄黄硫黄礬石末猪脂和塗之又方取生樹木孔中蚛汁拭之末桂和傅上日再三又方蛇蛻皮熟以磨之數百度令熱乃弃草中勿顧療人面體黎黑膚色麤陋皮厚狀醜細搗羖羊脛骨鷄子白和傅面乾以白粱米泔汁洗之三日如素神效又方蕪菁子二兩杏仁一兩並搗破栝蔞去子囊豬胰五具淳酒和夜傅之寒月以爲手面膏别方云老者少黑者白亦可加土苽根一兩大棗七枚日漸白悅姚方豬胰五具神驗隱居効驗方面黑令白去黯方烏賊魚骨細辛栝蔞乾薑椒各二兩五物切以苦酒漬三日以成煉牛髓二斤煎之苦酒氣盡藥成以粉面醜人特異鮮好神妙方又令面白如玉色方羊脂狗脂各一升白芷半升甘草七尺半夏半兩烏喙十四枚合煎以白器成塗面二十日即變兄弟不相識何况餘人乎傳效方療化面方眞珠屑光明砂並别熟研冬苽陳人各二兩亦研水銀四兩以四五重帛練袋子貯之銅鐺中醋漿微火煮之一宿一日堪用取水銀和面脂熟研使消乃合珠屑砂并瓜子末更合調然後傅面又療人面無光潤黑䵟及皺常傅面脂方細辛萎蕤黄耆薯蕷白附子辛夷芎藭白芷各一兩栝蔞木蘭皮各一分成煉豬脂二升十一物切之以綿裹用少酒漬之一宿内豬脂煎之七上七下别出一片白芷内煎候白芷黄色成去滓絞用汁以傅面千金不傳此膏亦療金瘡并吐血療人䵟令人面皮薄如蕣華方鹿角尖取實白處於平石上以磨之稍濃取一大合乾薑一大兩搗宻絹篩和鹿角汁攪使調匀每夜先以煖漿水洗面軟帛拭之以白蜜塗面以手拍使蜜盡手指不粘爲盡然後塗藥平旦還以暖漿水洗二三七日顔色驚人塗藥不見風日愼之又面上暴生䵟方生杏仁去皮搗以鷄子白和如煎餅麵入夜洗面乾塗之旦以水洗之立愈姚方云經宿拭去面上礨子化面並療仍得光潤皮急方土瓜根搗篩以漿水和令調匀入夜漿水以洗面塗藥旦復洗之百日光華射人夫妻不相識葛氏服藥取白方取三樹桃花隂乾末之食前服方寸七日三姚云并細腰身又方白苽子中仁五分白楊皮二分桃花四分搗末食後服方寸七日三欲白加瓜子欲赤加桃花三十日面白五十日手足俱白又一方有橘皮三分無楊皮又方汝苑三分鉛丹一分末以醋漿服一刀圭日三服十日大便黑十八十九日如漆二十一日全白便止過此太白其年過三十難復療服藥忌五辛又方朱丹五兩桃花三兩末井朝水服方寸七日三服十日知二十日太白小便當出黑汁又方白松脂十分乾地黄九分乾漆五分熬附子一分炮桂心二分搗下篩蜜丸服十丸日三諸蟲悉出便肥白又方乾薑桂甘草分等末之且以生鷄子一枚内一升酒中攪温以服方寸七十日知一月白光潤又方去黑羊膽猪胰細辛等分煎三沸塗面咽旦醋漿洗之又方茯苓白石脂分等蜜和塗之日三度服一種藥一月即得肥白方大豆黄炒舂如作醬滓取純黄一大升搗篩煉猪脂和令熟丸酒服二十丸日再漸加至三四十丸服盡五升不出一月即大能食肥白試用之療人鬚鬢秃落不生長方麻子人三升秦椒二合置泔汁中一宿去滓日一沐一月長二尺也又方蔓荆子三分附子二枚碎酒七升合煑器中封二七日澤沐十日長一尺勿近面上恐有毛生又方桑白皮剉三二升以水淹煑五六沸去滓以洗鬚鬢數數爲之即自不落又方麻子人三升白桐葉一把米泔煑五六沸去滓以洗之數之則長又方東行桑根長三尺中央當甑飯上蒸之承取兩頭汁以塗鬚鬢則立愈療鬚鬢黄方燒梧桐灰乳汁和以塗膚及鬚鬢佳染髮鬚白令黑方醋漿煑豆漆之黑如漆色又方先洗鬚髮令淨取石灰胡粉分等漿和温夕卧塗訖用油衣包裹明日洗去便黑大佳又拔白毛令黑毛生方拔去白毛以好白蜜任孔中即生黑毛眉中無毛亦針挑傷傅蜜亦毛生比見諸人水取石子研丁香汁拔訖急手傅孔中亦即生黑毛此法大神驗若頭風白屑撿風條中方脂澤等方在此篇末姚方療䵟白蜜和茯苓塗上滿七日即愈又療面胡粉刺方搗生菟絲絞取汁塗之不過三五上又黑靣方牯羊膽牛膽淳酒三升合煮三沸以塗面良面上惡瘡方黄連黄檗胡粉各五兩下篩以粉面上瘡瘡方並出本條中患冝撿用之葛氏療身體及腋下狐臭方正旦以小便洗腋下即不臭姚云大神驗又方燒好礬石作末絹囊貯常以粉腋下又用馬齒礬石燒令汁盡粉之即差又方青木香二兩附子一兩石灰一兩細末著粉腋中汁出即粉之姚方有礬石半兩燒又方炊飯及熱丸以拭腋下臭仍與犬食之七日一如此即差又方煮兩鷄子熟去殻皮各内腋下冷弃三路口勿反顧三爲之良姚方取牛脂胡粉合椒以塗腋下一宿即愈可三兩度作之則永差又兩腋下及手足掌隂下股裏常汗濕致臭方乾枸杞根干畜根甘草半兩干章陸胡粉滑石各一兩六物以苦酒和塗腋下當汁出易衣更塗不過三傅便愈或更發復塗之不可多傅傷人腋餘處亦塗之若股内隂下常濕且臭或作瘡者方但以胡粉一分粉之即差常用驗方隱居效方療胡臭鷄舌藿香青木香胡粉各二兩爲散内腋下綿裹之常作差令人香方白芷薰草杜若杜蘅藁本分等蜜丸爲丸但旦服三丸暮服四丸二十日足下悉香云大神驗又方瓜子芎藭藁本當歸杜蘅細辛各二分白芷桂各五分擣下食後服方寸七日三服五日口香一十日肉中皆香神良小品又方甘草松樹根及皮大棗甜瓜子四物分等末服方寸七日三二十日覺效五十日身體並香百日衣服床幃皆香姚同療人心孔惛塞多忘喜誤七月七日取蜘蛛網着領中勿令人知則永不忘也姚方同又方丁酉日宻自至市買遠志著巾角中還末服之勿令人知姚同又方丙午日取鱉甲著衣帶上良又方取牛馬豬鷄心干之末向日酒服方寸七日三問一知十孔子大聖智枕中方已出在第九卷姚同又方茯苓茯神人參五分遠志七分菖蒲二分末服方寸匕日三夜一服又方章陸花隂干一百日擣末暮水服方寸七暮卧思念所欲知事即於眠中醒悟又方上黨人參半斤七月七日麻㪍一升合搗蒸使氣盡遍服一刀圭暮卧逆知未然之事療人嗜眠喜睡方馬頭骨燒作灰末服方寸七日三夜一又方父鼠目一枚燒作屑魚膏和注目外眥則不肯眠兼取兩目絳囊裹帶又方麻黄术各五分甘草三分日中南擣末服一方寸七日三姚方人不忘菖蒲三分茯苓五分伏神人參各五分遠志七分末服方寸七日三夜一五日則知神良傅用方頭不光澤臘澤飾髮方青木香白芷零陵香甘松香澤蘭各一分用綿裹酒漬再宿内油裏煎再宿加臘澤斟量硬軟即火急煎著少許胡粉烟脂訖又緩火煎令粘極去滓作梃以飾髮神良作香澤塗髮方依臘澤藥内漬油裏煎即用塗髮亦綿裹煎之作手脂法猪胰一具白芷桃人碎各一兩辛夷各二分冬瓜人二分細辛半分黄瓜栝蔞人各三分以油一大升煮白芷等二三沸去滓挼豬胰取盡乃内冬苽桃人末合和之膏成以塗手掌即光蓽豆香藻法蓽豆一升白附芎藭白芍藥水栝蔞當陸桃人冬瓜人各二兩擣篩和合先用水洗手面然後傅藥粉飾之也六味薰衣香方沉香一片麝香一兩蘇合香蜜塗微火炙少令變色白膠香一兩擣沉香令破如大豆粒丁香一兩亦别擣令作三兩段擣餘香訖蜜和爲炷燒之若薰衣著半兩許又藿香一兩佳葛氏既有膏傅面染髮等方故䟽脂澤等法亦粉飾之所要云髮生方蔓荆子三分附子二枚生用井碎之二物以酒七升和内瓷器中封閉經二七日藥成先以灰汁淨洗鬚髮痛拭乾取烏鷄脂揩一日三遍凡經七日然後以藥塗日三四遍四十日長一尺餘處則勿塗附方肘後方姚氏療䵟茯苓末白蜜和塗上滿七日即愈又方療面多皯𪒟如雀卵色以羖羊膽一枚酒二升合煑三沸以塗拭之日三度差千金方治血䵟面皺取蔓菁子爛研入常用面脂中良崔元亮海上方滅瘢膏以黄礬石燒令汁出胡粉炒令黄各八分惟須細研以臘月豬脂和更研如埿先取生布揩令痛則用藥塗五度又取鷹屎白燕窠中草燒作灰等分和人乳塗之其瘢自滅肉平如故又方治面䵟黑子取李核中人去皮細研以鷄子白和如稀餳塗至晩每以淡漿洗之後塗胡粉不過五六日有神愼風孫眞人食忌去黶子取石灰炭上熬令熱插糯米於灰上候米化即取米點之外臺祕要救急去黑子方夜以暖漿水洗面以布揩黑子令赤痛水研白檀香取濃汁以塗之旦又復以漿水洗面仍以鷹糞粉黑子又令面生光方以蜜陀僧用乳煎塗面佳兼德瘡鼻疱聖惠方治䵟𪒟斑點方用蜜陀僧二兩細研以人乳汁調塗面每夜用之又方治黑痣生於身面上用藜蘆灰五兩水一大碗淋灰汁於銅器中貯以重湯煑令如黑膏以針微撥破痣處點之良不過三遍神驗又方生眉毛用七月烏麻花隂乾爲末生烏麻油浸每夜傅之千金翼老人令面光澤方大豬蹄一具洗淨理如食法煑漿如膠夜以塗面曉以漿水洗面皮急矣譚氏小兒方療豆瘡瘢面黶以蜜陀僧細研水調夜塗之明旦洗去平復矣有治癧瘍三方具風條中千金方治諸腋臭伏龍肝澆作泥傅之立差外臺祕要治狐臭若股内隂下恒濕臭或作瘡青木香好醋浸致腋下夾之即愈又生狐臭以三年釅醋和石灰傅之經驗方善治狐臭用生薑塗腋下絶根本又方烏髭鬢駐顔色壯筋骨明耳目除風氣潤肌膚久服令人輕健蒼术不計多少用米泔水浸三兩日逐日换水候滿日即出刮去黑皮切作片子暴乾用慢火炒令黄色細搗末每一斤末用蒸過茯苓半斤煉蜜爲丸如梧桐子大空心卧時温熟水下十五丸别用术末六兩甘草末一兩拌和匀作湯點之下术丸妙忌桃李雀蛤及三白千金方治髮落不生令長麻子一升熬黑壓油以傅頭長髮妙又治髮不生以羊屎灰淋取汁洸之三日一洗不過十度即生又治眉髮髭落石灰三升以水拌匀焰火炒令焦以絹袋貯使好酒一斗漬之宻封冬十四日春秋七日取服一合常令酒氣相接嚴云百日即新髭髮生不落孫眞人食忌生髮方取側柏葉隂乾作末和油塗之又方令髮鬢烏黑醋煑大豆黑者去豆煎令稠傅髮又方治頭秃蕪菁子末酢和傅之日三梅師方治年少髮白拔去白髮以白蜜塗毛孔中即生黑者髮不生取梧桐子搗汁塗上必生黑者千金翼療髮黄熊脂塗髮梳之散頭入床底伏地一食頃即出便盡黑不過一升脂驗楊氏産乳療白秃瘡及髮中生癬取熊白傅之又療秃瘡取虎膏塗之聖惠方治白秃以白鴿糞搗細羅爲散先以醋米泔洗了傅之立差又治頭赤秃用白馬蹄燒灰末以臘月猪脂和傅之簡要濟衆治頭瘡大笋殻葉燒爲灰量瘡大小用灰調生油傅入少膩粉佳葛仙翁肘後備急方卷之六
