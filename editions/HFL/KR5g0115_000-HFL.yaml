front:
  text: 葛仙翁肘後備急方序单位陛一醫有方古也古以來著方書者無慮數十百家其方殆未可以數計篇帙浩瀚苟無良醫師安所適從况窮郷遠地有病無醫有方無藥其不罹夭折者幾希丹陽葛稚川夷考古今醫家之說驗其方簡要易得鍼炙分寸易曉必可以救人於死者爲肘後備急方使有病者得之雖無韓伯休家自有藥雖無封君達人可爲醫其以備急固宜華陽陶弘景曰葛之此製利世實多但行之既久不無謬誤乃著百一方䟽於備急之後訛者正之缺者補之附以炮製服食諸法纖悉備具仍區别内外他犯爲三條可不費討尋開卷見病其以備急益冝葛陶二君世共知爲有道之士於學無所不貫於術無所不通然猶積年僅成此編蓋一方一論已試而後録之非徒采其簡易而已人能家置一帙遇病得方方必己病如歷卞和之肆舉皆美玉入伯樂之厩無非駿足可以易而忽之邪葛自序云人能起信可免夭横意可見矣自天地大變此方湮没幾絶間一存者閟以自寳是豈製方本意連帥烏侯夙多疹疾宦學之餘留心於醫藥前按察河南北道得此方於平郷郭氏郭之婦翁得諸汴之掖庭變亂之際與身存亡未嘗輕以示人迨今而出焉天也侯命工刻之以趣其成唯恐病者見方之晩也雖然方之顯晦而人之生死休戚係焉出自有時而隱痛惻怛如是其急者不忍人之心也有不忍人之心斯有不忍人之政矣則侯之仁斯民也豈直一方書而已乎方之出乃吾仁心之發見者也因以序見命特書其始末以告夫未知者至元丙子季秋稷亭段成己題葛仙翁肘後備急方序亦名肘後卒救方隱居又名百一方抱朴子丹陽葛稚川曰余既窮覽墳索以著述餘暇兼綜術數省仲景元化劉戴秘要金匱緑秩黄素方近將千卷患其混雜煩重有求難得故周流華夏九州之中收拾竒異捃拾遺逸選而集之便種類殊分緩急易簡凡爲百卷名曰玉函然非有力不能盡寫又見周甘唐阮諸家各作備急既不能窮諸病狀兼多珍貴之藥豈貧家野居所能立辦又使人用鍼自非究習醫方素識明堂流注者則身中榮衛尚不知其所在安能用鍼以治之哉是使鳧雁摯擊牛羊搏噬無以異也雖有其方猶不免殘害之疾余今採其要約以爲肘後救卒三卷率多易得之藥其不獲已須買之者亦皆賤價草石所在皆有兼之以灸灸但言其分寸不名孔穴凡人覽之可了其所用或不出乎垣籬之内顧眄可具苟能信之庶免橫禍焉世俗苦於貴遠賤近是古非今恐見此方無黄帝倉公和鵲踰跗之目不能採用安可强乎華陽隱居補闕肘後百一方序太歳庚辰隱居曰余宅身幽嶺迄將十載雖每植德施功多止一時之設可以傳方遠裔者莫過於撰述見葛氏肘後救卒殊足申一隅之思夫生人所爲大患莫急於疾疾而不治猶救火而不以水也今輦掖左右藥師易尋郊郭之外已似難值况窮村迥野遥山絶浦其間枉夭安可勝言方術之書卷軸徒煩拯濟殊寡欲就披覽迷惑多端抱朴此製實爲深益然尚闕漏未盡輒更採集補闕凡一百一首以朱書甄别爲肘後百一方於雜病單治略爲周遍矣昔應琚爲百一詩以箴規必行今余撰此蓋欲衛輔我躬且佛經云人用四大成身一大輒有一百一病是故深宜自想上自通人下達衆庶莫不各加繕寫而究括之余又别撰效驗方五卷具論諸病證徒因藥變通而并是大治非窮居所資若華軒鼎室亦宜修省耳葛序云可以施於貧家野居然亦不止如是今搢紳君子若常處閑佚乃可披檢方書或從禄外邑將命遐征或宿直禁門晨宵隔絶或急速戎陳城栅嚴阻忽遇疾倉卒唯拱手相看曷若探之囊笥則可庸豎成醫故備論證候使曉然不滯一披條領無使過差也尋葛氏舊方至今已二百許年播於海内因而齊者其效實多余今重以該要庶亦傳之千祀豈止於空衛我躬乎舊方都有八十六首檢其四蛇兩犬不假殊題喉舌之間亦非異處入塚御氣不足專名雜治一條猶是諸病部類强致殊分復成失例今乃配合爲七十九首於本文究具都無忖減復添二十二首或因葛一事增構成篇或補葛所遺準文更撰具如後録詳悉自究先次比諸病又不從類遂具勞復在傷寒前霍亂置耳目後隂易之事乃出雜治中兼題與篇名不盡相符卒急之時難於尋撿今亦汷其銓次庶歷然易曉其解散脚弱虚勞渴痢發背嘔血多是貴勝之疾其傷寒中風診候朂難分别皆應取之於脉豈凡庸能究今所載諸方皆灼然可用但依法施治無使違逆其癰疽金瘡形變甚衆自非具方未易根盡其婦女之病小兒之病並難治之方法不少亦載其綱要云凡此諸方皆是撮其樞要或名醫垂記或累世傳良或博聞有驗或自用得力故復各題祕要之說以避文繁又用藥有舊法亦不復假事事詮詔今通立定格共爲成準凡服藥不言先食者皆在食前應食後者自各言之凡服湯云三服再服者要袍山源涯味或踈或數足令勞力相及毒利藥皆須空腹補瀉其間自可進粥凡散日三者當取旦中暮進之四五服則一日之中量時而分均也凡下丸散不云酒水飲者本方如此而别說用酒水飲則是可通用三物服也凡云分等即皆是丸散隨病輕重所須多少無定銖兩三種五種皆分均之分兩凡云丸散之若干分兩者是品諸藥宜多宜少之分兩非必止於若干分兩假令日服三方寸匕須差止是三五兩藥耳凡云末之是擣篩如法㕮咀者皆細切之凡云湯煑取三升分三服皆絞去滓而後酌量也字方中用鳥獸屎作矢字尿作溺字牡鼠亦作雄字乾作干字凡云錢匕者以大錢上全抄之若云半錢則是一錢抄取一邊爾并用五銖錢也方寸匕即用方一寸抄之可也刀圭准如兩大豆炮熬炙洗治諸藥凡用半夏皆湯洗五六度去滑附子烏頭炮去皮有生用者隨方言之礬石熬令汁盡椒皆出汗麥門冬皆去心丸散用膠皆炙巴豆皆去心皮熬有生用者隨而言之杏人去尖皮熬生用者言之葶藶皆熬皂莢去皮子藜蘆枳殻甘草皆炙大棗支子擘破巴豆桃杏人之類皆别研搗如膏乃和之諸角皆屑之麻黄皆去節凡湯中用芒硝阿膠𥹋糖皆絞去滓内湯中更微煑令消紅雪朴硝等皆狀此而入藥也用麻黄即去節先煑三五沸掠去沫後乃入餘藥凡如上諸法皆己具載在余所撰本草上卷中今之人有此肘後百一者未必得見本草是以復䟽方中所用者載之此事若非留心藥術不可盡知則安得使之不僻繆也案病雖千種大略只有三條而己一則府藏經絡因邪生疾二則四支九竅内外交媾三則假爲他物橫來傷害此三條者今各以類而分别之貴圖倉卒之時披尋簡易故也今以内疾爲上卷外發爲中卷他犯爲下卷具列之云
