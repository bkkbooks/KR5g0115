front:
  text: 葛仙翁肘後備急方卷之七陛七
  hash: sha256:9f9e660597290e49902e5545c464f64426f519837d4b3af04b357f0312cd32aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0115_HFL_007-001a, image: hfl/1015/1015-164.png}
body:
  text: 治爲熊虎爪牙所傷毒痛方第五十三葛氏方燒青布以燻瘡口毒即出仍煑葛根令濃以洗瘡搗乾葛根末以煑葛根汁服方寸七日五夜一則佳又方嚼粟塗之姚同又煑生鐵令有味以洗瘡上姚同凡猛獸毒蟲皆受人禁氣將入山草宜先禁之其經術云到山下先閉氣三十五息存神仙將虎來到吾前乃存吾肺中有白帝出把虎兩目塞吾下部又乃吐肺氣白通冠一山林之上於是良久又閉氣三十五息兩手捻都監目作三步步皆以右足在前乃止祝曰李耳李耳圖汝非李耳耶汝盜黄帝之犬黄帝教我問汝汝答之云何畢便行一山之虎不可得見若逢之者目向立大張左手五指側之極勢跳手上下三度於跳中大唤咄虎北斗君汝去虎即走止宿亦先四凹如此又燒牛羊角虎亦不敢近人又搗雄黄紫石縫囊貯而帶之附方梅師方治虎傷人瘡但飲酒常令大醉當吐毛出治卒爲猘犬凡所咬毒方第五十四療猘犬咬人方先嗍却惡血灸瘡中十壯明日以去日灸一壯滿百乃止姚云忌酒又云地榆根末服方寸七日一二亦末傅瘡上生根搗傅佳又方刮虎牙若虎骨服一七已發如猘犬者服此藥即差姚同又方仍殺所咬犬取腦傅之後不復發又方搗薤汁傅之又飲一升日三瘡乃差又方末礬石内瘡中裹之止瘡不壞速愈神妙又方頭髮猬皮燒末水和飲一杯若或已目赤口噤者折齒下之姚云二物等分又方搗地黄汁飲之并以塗瘡過百度止又方末乾薑常服并以内瘡中凡猘犬咬人七日一發過三七日不發則脫也要過百日乃爲大免耳每到七日輒當飲薤汁三二升又當終身禁食犬肉蠶蛹食此發則不可救矣瘡未差之間亦忌生物諸肥膩及冷但於飰下蒸魚及就膩氣中食便發不宜飲酒能過一年乃佳若重發療方生食蟾蜍鱠絶良驗姚同亦可燒炙食之不必令其人知初得嚙便爲之則後不發姚剥作鱠吞蒜齏下又方搗薑根汁飲之即差又方服蔓菁汁亦佳又凡犬咬人取竈中熱灰以粉瘡傅之姚同又方火炙蠟以灌瘡中姚同又方以頭垢少少内瘡中以熱牛屎塗之佳姚同又方挼蓼以傅瘡上又方乾薑末服二七薑汁服半升亦良又方但依猘犬法彌佳燒蟾蜍及末礬石傅之尤佳得犬嚙者難療凡犬食馬肉生狂及尋常忽鼻頭燥眼赤不食避人藏身皆欲發狂便宜枸杞汁煑糜飼之即不狂若不肯食糜以塩伺鼻便忽塗其鼻既舐之則欲食矣神驗附方梅師方治狂狗咬人取桃白皮一握水三升煎取一升服食療治犬傷人杵生杏人封之差治卒毒及狐溺棘所毒方第五十五馬嚼人作瘡有毒種熱疼痛方刺鷄𡨥血瀝著瘡中三下若駁馬用雌鷄草馬用雄鷄姚同又方灸瘡及腫上差若瘡乆不差者馬鞭梢長二寸鼠矢二七枚燒末膏和傅之效又方以婦人月經傅上最良姚云神效人體上先有瘡而乘馬馬汗若馬毛入瘡中或但爲馬氣所蒸皆致腫痛煩熱入腹則殺人燒馬鞭皮末以膏和傅上又方多飲淳酒取醉即愈又剥死馬馬骨傷人手毒攻欲死方便取死馬腹中屎塗之即差姚同又方以手内女人隂中即愈有胎者不可令胎墮狐尿棘㓨㓨人腫痛欲死方破鷄搨之即差又方以熱桑灰汁漬冷復易取愈小品方以熱蠟著瘡中又烟熏之令汁出即便愈此狐所尿之木猶如蛇𧊄也此下有魚骨傷人附方圖經云治惡刺及狐尿刺搗取蒲公草根莖白汁塗之惟多塗立差止此方出孫思邈千金方其序云余以正觀五年七月十五日夜以左手中指背觸著庭木至曉遂患痛不可忍經十日痛日深瘡日高大色如熟小豆色嘗聞長者之論有此方遂依治之手下則愈痛亦除瘡亦即差未十日而平復楊炎南行方亦著其效云效方治狐尿㓨螫痛杏人細研煑一兩沸承熱以浸螫處數數易之外臺祕要治剥馬被骨刺破中毒欲死取剥馬腹中糞及馬尿洗以糞傅之大驗絞糞汁飲之效聖惠方治馬咬人毒入心馬齒莧湯食之差靈苑方治馬汗入瘡腫痛漸甚宜急療之遲則毒深難理以生烏頭末傅瘡口良乆有黄水出立愈王氏博濟治驢涎馬汗毒所傷神效白礬飛過黄丹炒令紫色各等分相衮合調貼患處治卒青蛙蝮虺衆蛇所螫方第五十六葛氏竹中青蜂螫人方雄黄麝香乾薑分等搗篩以麝罔和之著小竹管帶之行急便用傅瘡兼衆蛇虺毒之神良又方破烏鷄熱傅之蛇緑色喜縁樹及竹上大者不過四五尺皆呼爲青條蛇人中立死葛氏毒蛇螫人方急掘作坑以埋瘡處堅築其上毒即入土中須臾痛緩乃出徐王治蛇毒方用搗地榆根絞取汁飲兼以漬瘡又方搗小蒜飲汁以滓傅瘡上又方猪耳垢著瘡中牛耳中垢亦可用之良又方嚼塩唾上訖灸三壯復嚼塩唾之瘡上又方搗薤傅之又方燒蜈蚣末以傅瘡上又方先以無節竹筒著瘡上熔蠟及蜜等分灌筒中無蜜單蠟亦通又方急且尿瘡中乃拔向日閉氣三步以刀掘地作小坎以熱湯沃坎中埿作丸如梧子大服之并以少泥泥之瘡上佳又方桂心栝蔞分等爲末用小竹筒宻塞之以帶行卒爲蝮蛇即傅之此藥療諸蛇毒塞不宻則氣歇不中用一切蛇毒急灸瘡三五壯則衆毒不能行蛇毒搗鬼針草傅上即定又方荆葉袋貯薄瘡腫上又方以射罔塗腫上血出乃差又方以合口椒并葉搗傅之無不止又方切葉刀燒赤烙之附方梅師方治蛇虺螫人以獨頭蒜酸草搗絞傅所咬處廣利方治蛇咬方取黑豆葉剉杵傅之日三易良廣濟方治毒蛇嚙方菰蔣草根灰取以封之其草似燕尾也兵部手集主蛇蝎蜘蛛毒鷄卵輕敲一小孔合咬處立差劉禹錫傳信方治蛇咬蝎螫燒刀子頭令赤以白礬置刀上看成汁便熱滴咬處立差此極神驗得力者數十人貞元三十二年有兩僧流向南到鄧州俱爲蛇嚙令用此法救之傅藥了便發更無他苦治蛇瘡敗蛇骨刺人入口繞身諸方第五十七葛氏凡蛇瘡未愈禁熱食食便發療之依初螫人法蛇螫人九竅皆血出方取虻蟲初食牛馬血腹滿者二七枚燒服之此上蛇瘡敗及洪腫法方蛇螫人牙折入肉中痛不可堪方取蝦蟆肝以傅上立出又方先宻取荇葉當其上穿勿令人見以再覆瘡口上一時著葉當上穿穿即折牙出也蛇骨刺人毒痛方以鐵精如大豆者以管吹瘡内姚同又方燒死鼠搗傅之瘡上蛇螫人瘡已合而餘毒在肉中淫淫痛癢方取大小蒜各一升合搗熱湯淋取汁灌瘡中姚同蛇卒繞人不解方以熱湯淋即解亦可令就尿之蛇入人口中不出方艾灸蛇尾即出若無火以刀周匝割蛇尾截令皮斷乃將皮倒脫即出小品同之七八月中諸蛇毒旺不得泄皆嚙草木即枯死名爲蛇蚳此物傷人甚於蛇螫即依蛇之螫法療之附方廣利方治蛇咬瘡暖酒淋洗瘡上日三易聖惠方治蛇入口并入七孔中割母猪尾頭瀝血滴口中即出治卒入山草禁辟衆蛇藥術方第五十八辟衆蛇方同前姚氏仙人入山草法辟蛇之藥雖多唯以武都雄黄爲上帶一塊右稱五兩於肘間則諸蛇毒莫敢犯他人中者便磨以療之又帶五蛄黄丸良丸有蜈蚣故方在於備急中此下有禁法云不受而行則無驗蛇毒勿渡水渡水則痛甚於初螫亦當先存想作大蜈蚣前已隨後渡若乘船渡不作法殺人入山並不得呼作蛇皆唤爲蛇中之者彌宜勿誤辟蛇法到處燒羖羊角令有煙出地則去矣附方廣利方治諸蛇毒螫人欲死兼辟蛇乾薑雄黄等分同研用小絹袋貯系臂上男左女右蛇聞藥氣逆避人螫毒傅之治卒蜈蚣蜘蛛所螫方第五十九葛氏方割鷄冠血塗之又方以鹽緘瘡上即愈云蜈蚣去遠者即不復得又方塩熱漬之又方嚼大蒜若小蒜或桑樹白汁塗之亦以麻履底土揩之良蜈蚣甚嚙人其毒殊輕於蜂當時小痛而易歇蜘蛛毒生鐵衣醋研取濃汁塗之又烏麻油和胡粉傅上乾復易取差取羊桃葉傅之立愈附方蚯蚓螻蛄蠶咬蠼嫂尿及惡蟲咬人附梅師方治蜈蚣咬人痛不止獨頭蒜摩螫處痛止又經驗後方燒鷄屎酒和傅之佳又取鷄屎和醋傅之聖惠方治蜈蚣咬方用蝸牛擦取汁滴入咬處兵部手集治蜘蛛咬遍身成瘡取上好春酒飲醉使人翻不得一向卧恐酒毒腐人須臾蟲於肉中小如米自出又譚氏小兒方以葱一枝去尖頭作孔將蚯蚓入葱葉中緊担兩頭勿泄氣頻摇動即化爲水點咬處差劉禹錫傳信方治蟲豸傷咬取大藍汁一碗入雄黄麝香二物隨意看多少細研投藍中以點咬處若是毒者即并細服其汁神異之極也昔張員外在劒南爲張延賞判官忽被斑蜘蛛咬項上一宿咬有二道赤色細如箸繞項上從胷前下至心經兩宿頭面腫疼如數升大肚漸腫幾至不救張相素重薦因出家資五百千并薦家財又數百千募能療者忽一人應召云可治張相初甚不信欲驗其方遂令目前合藥其人云不惜方當療人性命耳遂取大藍汁一瓷碗取蜘蛛投之藍汁良乆方出得汁中甚困不能動又别搗藍汁加麝香末更取蜘蛛投之至汁而死又更取藍汁麝香復加雄黄和之更取一蜘蛛投汁中隨化爲水張相及諸人甚異之遂令點於咬處兩日内悉平愈但咬處作小瘡痂落如舊經驗方治蜘蛛咬遍身生絲羊乳一升飲之貞元十年崔員外從質云目擊有人被蜘蛛咬腹大如孕婦其家弃之乞食於道有僧遇之教飲羊乳未幾日而平又方治蚯蚓咬濃作塩湯浸身數遍差浙西軍將張韶爲此蟲所咬其形大如風眉鬚皆落每夕蚯蚓鳴於體有僧教以此方愈又方治蚯蚓蟲咬其形如大風眉鬚皆落以石灰水浸身亦良聖惠方主蛐蟮咬人方以鷄屎傅之又方治螻蛄咬人用石灰醋和塗之廣利方治蠶咬人麝香細研蜜調塗之差千金方治蠼嫂尿瘡楝樹枝皮燒灰和猪膏傅之又方杵豉傅之又方以酢和粉傅之又方治蠼螋蟲尿人影著處便令人體病瘡其狀如粟粒累累一聚慘痛身中忽有處燥痛如芒刺亦如刺蟲所螫後細瘡㿔作叢如茱萸子狀也四畔赤中央有白膿如黍粟亦令人皮急舉身惡寒壯熱極者連起竟腰脇胷也治之法初得磨犀角塗之止博物志治蠼嫂蟲溺人影亦隨所著作瘡以鷄腸草汁傅之良外臺秘要治蠼嫂尿瘡繞身匝即死以燕巢中土猪脂苦酒和傅之又方治蠼嫂尿瘡燒鹿角末以苦酒調塗之錢相公方療蠼螋尿瘡黄水出嚼梨葉傅之乾即易勝金方治蠼螋尿人成瘡初如糝粟漸大如豆更大如火烙漿庖疼痛至甚宜速用草茶并臘茶俱可以生油調傅上其痛藥至立止妙聖惠方治惡蟲咬人用紫草油塗之又方以酥和塩傅之治卒蠆螫方第六十以玉壺丸及五蛄丸塗其上並得其方在備急丸散方中又方取屋霤下土水和傅之治卒蜂所螫方第六十一蜂螫人取人尿洗之又方榖樹桑樹白汁塗之并佳又方刮齒垢塗之又破蜘蛛又煑蜂房塗之燒牛角灰苦酒和塗之又斷葫揩之又嚼青蒿傅之附方千金方治蜂螫人用露蜂房末猪膏和傅之楊氏産乳蜂房煎湯洗亦得又外臺秘要挼薄荷貼之差又聖惠方以酥傅之愈沈存中筆談云處士劉湯隱居住屋山嘗於齊中見一大蜂竄爲蛛網絲縛之爲蜂所螫墜地俄頃蛛鼓腹欲裂徐徐行入草嚙芋梗微破以瘡就嚙處磨之良久腹漸消輕躁如故自後人有爲蜂螫者挼芋梗傅之則愈治卒蝎所螫方第六十二蝎螫人温湯漬之又方挼馬莧大蒜又嚼乾薑塗之佳姚方以冷水漬螫處即不痛水微暖便痛即易水又以冷漬故布搨之數易新效方蜀葵花石榴花艾心分等並五月五日午時取隂乾合搗和水塗之螫處立定二花未定又鬼針草挼汁傅之立差又黄丹醋塗之又生烏頭末唾傅之嚼乾薑塗之又麝罔封之温酒漬之即愈附方孫眞人食忌主蠍螫以礬石一兩醋半升煎之投礬末於醋中浸螫處又勝金方烏頭末少許頭醋調傅之又錢相公篋中方取半夏以水研塗之立止又食醫心鏡以醋磨附子傅之又經驗方以驢耳垢傅之差崔給事傳廣利方治蠍螫人痛不止方楮樹白汁塗之立差治中蠱毒方第六十三葛氏方療蠱毒下血方羖羊皮方三寸得敗鼓亦好蘘荷葉苦參黄連當歸各二兩水七升煑二升分三服一方加犀角升麻各三兩無蘘荷根用茜根四兩代之佳人有養畜蠱以病人其𧦽法中蠱令人心腹切痛如有物嚙或吐下血不即療之食人五藏則死矣欲知蠱與非蠱當令病人唾水中沉者是浮者非小品姚並同欲知蠱毒主姓名方取鼓皮少少燒末飲病人病人須臾自當呼蠱主姓名可語便去則便愈亦有蛇蜒合作蠱毒著飲食中使人得瘕病此一種積年乃死療之各自有藥又蘘荷葉宻著病人卧席下其病人即自呼蠱主姓名也療中蠱毒吐血或下血皆如爛肝方茜草根蘘荷根各三兩㕮咀以水四升煑取二升去滓適寒温頓服即愈又自當呼蠱主姓名茜草即染絳草也小品并姚方同也又方巴豆一枚去心皮熬豉三粒釜底墨方寸七合搗爲三丸一丸當下毒不可者更服一丸即下又方塩一升淳苦酒和一服立吐即愈小品同支方苦酒一升煑令消服愈又方取蚯蚓十四枚以苦酒三升漬之蚓死但服其汁已死者皆可活又方苦瓠一枚水二升煑取一升服立即吐愈小品同支方用苦酒一升煑令消服神驗又方皂莢三梃炙去皮子酒五升漬一宿去滓分三服小品同療飲中蠱毒令人腹内堅痛面目青黄淋露骨立病變無常方取鐵精搗之細篩又别搗烏鷄肝以和之丸如梧子大服三丸甚者不過十日微者即愈别有鐵精方又方猪肝一具蜜一升共煎之令熟分爲二十服祕方小品同支方分作丸亦得又方取棗木心剉得一斛著釜中淹之令上有三寸水煑取二斗澄取清微火煎得五升宿勿食旦服五合則吐蠱毒出小品姚同之又方雄黄丹砂藜蘆各一兩搗末旦以井華水服一刀圭當下吐蠱蟲出又方隱荵草汁飲一二升此草桔梗苗人皆食之治蠱已食下部肚盡腸穿者取長股蝦蟆青背一枚鷄骨支方一分燒爲灰合内下部令深入小品同支方屢用大驗姚方亦同又方以猪膽瀝内下部中以綿深導内塞之又方五蠱黄丸最爲療蠱之要其方在備急條中復有自然飛蠱狀如鬼氣者難此諸種得眞犀麝香雄黄爲良藥人帶此於身亦預防之姚氏療中蠱下血如鷄肝出石餘四藏悉壞唯心未毁或鼻破待死方末桔梗酒服一七日一二葛氏方也支太醫有十數傳用方取馬兜零根搗末水服方寸匕隨吐則出極神驗此物苗似葛蔓縁柴生子似橘子凡畏已中蠱欲服甘草汁宜生煑服之當吐疾出若平生預服防蠱毒者冝熟炙煑服即内消不令吐神驗又方甘草炙每合嚥汁若因食中蠱反毒即自吐出極良常含嚥之永不慮藥及蠱毒也又有解百毒散在後藥毒條中亦療方桑白汁一合服之須臾吐利蠱出席辯刺史傳效二方云并試用神驗斑猫蟲四枚去足翅炙桃皮五月初五采取去黑皮隂乾大戟凡三物並搗别篩取斑猫一分桃皮大戟各二分合和棗核大以米清飲服之訖吐出蠱一服不差十日更一服差此蠱洪州最多老媪解療一人得縑二十疋祕方不可傳其子孫犯法黄花公若於則爲都督因以得之流傳老媪不復得縑席云已差十餘人也又方羖羊皮方寸七蘘荷根四兩苦參黄連各二兩當歸犀角升麻各三兩七物以水九升煑取三升分三服蠱即出席云曾與一人服應時吐蜂兒數升即差此是姚大夫方附方千金翼方療蠱毒以槲木北隂白皮一大握長五寸以水三升煑取一升空腹分服即吐蠱出也又治蠱毒下血猬皮燒末水服方寸匕當吐蠱毒外臺祕要救急治蠱以白鴿毛糞燒灰飲和服之楊氏産乳療中蠱毒生玳瑁以水磨如濃飲服一盞自解聖惠方治小兒中蠱下血欲死搗青藍汁頻頻服半合治卒中溪毒方第六十四姚氏中水毒祕方取水萍曝乾以酒服方寸七差止又云中水病手足指冷即是若暖非也其冷或一寸極或竟指未過肘膝一寸淺至於肘膝爲劇葛氏水毒中人一名中溪一名中灑東人呼爲蘇駭切一名水病似射工而無物其診法初得之惡寒頭微痛目注疼心中煩懊四肢振浙骨節皆强筋急但欲睡旦醒暮劇手逆冷三日則復生蟲食下瘡不痛不癢不冷人覺視之乃知不即療過六七日下部膿潰蟲食五藏熱極煩毒注下不禁八九日良醫不能療覺得急當深視下部若有瘡正赤如截肉者爲陽毒最急若瘡如蠡魚齒者爲隂毒猶小緩要皆煞人不過二十日欲知是中水毒當作數升湯以小蒜五寸㕮咀投湯中莫令大熱熱即無力捩去滓適寒温以浴若身體發赤斑文者又無異證當以他病療之也病中水毒方取梅若桃葉搗絞汁三升許以少水解爲飲之姚云小兒不能飲以汁傅乳頭與之又方常思草搗絞飲汁一二升并以綿染寸中以導下部日三過即差又方搗藍青汁以少水和塗之頭面身體令匝又方取梨葉一把熟搗以酒一杯和絞服之不過三又方取蛇莓草根搗作末服之并以導下部亦可飲汁一二升夏月常行欲入水浴先以少末投水中流更無所畏又辟射工家中雖以器貯水浴亦宜少末投水中大佳今東閒諸山縣無不病溪毒春月皆得亦如傷寒呼爲溪温未必是射工輩亦盡患瘡痢但寒熱煩疼不解便致死耳方家用藥與傷寒温疾相似令施其單法五加根燒末酒若漿水飲之荆葉汁佳千金不傳祕之又方宻取蓼搗汁飲一二合又以塗身令周匝取牛膝莖一把水酒共一杯漬絞取汁飲之日三雄牛膝莖紫色者是也若下部生瘡已決洞者秫米一升塩五升水一石煑作糜坐中即差又方桃皮葉熟搗水漬令濃去滓著盆中坐漬之有蟲出又方皂莢燒末綿裹導之亦佳又服牡丹方寸七日三服治卒中射工水弩毒方第六十五江南有射工毒蟲一名短狐一名蜮常在山間水中人行及水浴此蟲口中横骨角弩唧以射人形影則病其診法初得或如傷寒或似中惡或口不能語或惡寒熱四肢拘急旦可暮劇困者三日齒間血出不療即死其中人有四種初覺則遍身體視之其一種正黑如墨子而繞四邊犯之如刺狀其一種作瘡瘡久即穿陷一種突起如石其一種如火灼人肉熛起作瘡此種最急并皆煞人居地天大雨或逐人行潦流入人家而射人又當養鵝鴨食人行將純白鵝以辟之白鴨亦善帶好生犀角佳也若見身中有此四種瘡處便急療之急周繞遍去此瘡邊一寸輒炙一處百壯瘡亦百壯則差又方赤莧莖葉搗絞取汁飲之以滓傅之姚云服七合日四五服又方胡蒜令傅以搨瘡上灸蒜上千壯差又方白鷄矢白者二枚以小餳和調以塗瘡上又方鼠婦蟲豉各七合巴豆三枚去心合猪脂但以此藥塗之又方取水上浮走豉母蟲一枚置口中便差云此蟲正黑如大豆浮水上相遊者又方取皁莢一梃尺二者槌碎苦酒一升煎如飴去滓傅之痛處差又方馬齒莧搗飲汁一升滓傅瘡上日四五遍則良驗又方升麻烏翣各二兩水三升煑取一升盡服之滓傅瘡上不差更作姚同更加犀角二兩云此蟲含沙射人影便病欲渡水先以石投之口邊角弩發矢言口息兩角能屈伸冬月則蟄有一長角横在口前弩檐臨其角端曲如上弩以氣爲矢用水勢以射人人中之便不能語餘狀如葛氏所說治卒中沙虱毒方第六十六山水間多有沙虱甚細略不可見人入水浴及以水澡浴此蟲在水中著人身及隂天雨行草中亦著人便鑽入皮裏其診法初得之皮上正赤如小豆黍米粟粒以手摩赤上痛如刺三日之後令百節强疼痛寒熱赤上發瘡此蟲漸入至骨則殺人自有山澗浴畢當以布拭身數遍以故帛拭之一度乃傅粉之也又療沙虱毒方以大蒜十片著熱灰中温之令熱斷蒜及熱柱瘡上盡十片復以艾灸瘡上七壯則良又方斑猫二枚熬一枚末服之燒一枚令絶烟末以傅瘡上即差又以射罔傅之佳又方生麝香大蒜合搗以羊脂和著小筒子中帶之行今東間水無不有此浴竟中拭㸁㸁如芒毛針刺熟看見則以竹葉抄挑去之比見嶺南人初有此者即以茅葉茗茗刮去及小傷皮則爲佳仍數塗苦苣菜汁佳已深者針挑取蟲子正如疥蟲著爪上映光方見行動也若挑得便就上灸三四壯則蟲死病除若覺猶惛惛見是其已太深便應依土俗作方術拂出乃用諸湯藥以浴皆一二升出都盡乃止亦依此方并雜溪毒及射工法急救七日中宜差不爾則仍有飛蟲噉人心藏便死愼不可輕治卒服藥過劑煩悶方第六十七服藥過劑煩悶及中毒多煩悶欲死方刮東壁土少少以水一二升和飲之良又方於屋霤下作坎方二尺深三尺以水七升灌坎中以物揚之令沫出取一升飲之未解更作又方擣藍取汁服數升無藍只洗青絹取汁飲亦得服藥失度心中苦煩方飲生葛根汁大良無生者乾葛爲末水服五合亦可煑服之又方吞鷄子黄數枚即愈不差更作服石藥過劑者白鴨屎末和水調服之差又方大黄三兩芒硝二兩生地黄汁五升煑取三升分三服得下便愈若卒服藥吐不止者飲新汲水一升即止若藥中有巴豆下痢不止方末乾薑黄連服方寸七差又方煑豆汁一升服之差附方外臺祕要治服藥過劑及中毒煩悶欲死燒犀角末水服方寸七治卒中諸藥毒救解方第六十八治食野葛已死方以物開口取鷄子三枚和以吞之須臾吐野葛出又方温猪脂一升飲之又方取生鴨就口斷鴨頭以血瀝口中入咽則活若口不可開者取大竹筒洞節以頭注其脇取冷水竹筒中數易水須臾口開則可得下藥若人多者兩脇及臍中各與筒甚佳又方多飲甘草汁佳姚方中諸毒藥及野葛已死方新小便和人屎絞取汁一升頓服入腹即活解諸毒無過此汁中酖毒已死者粉三合水三升和飲之口噤以竹管强開灌之中射罔毒藍汁大豆猪犬血並解之中狼毒毒以藍汁解之中狼葵毒以葵根汁解之中藜蘆毒以雄黄葱汁并可解之中躑躅毒以栀子汁解之中巴豆毒黄連小豆藿汁大豆汁並可解之中雄黄毒以防己汁解之中蜀椒毒中蜈蚣毒二毒桑汁煑桑根汁并解之中礬石毒以大豆汁解之中芫花毒以防風甘草桂并解之中半夏毒以生薑汁乾薑并解之中附子烏頭毒大豆汁遠志汁並可解之中杏仁毒以藍子汁解之食金已死者取鷄屎半升水淋得一升飲之日三服又方吞水銀二兩即裹金出少者一兩亦足姚云一服一兩三度服之扶坐與之令入腹即活又方鴨血及鷄子亦解之今取一種而兼解衆毒取甘草㕮咀濃煑多飲其汁井多食䓗中涕並佳又方煑大豆令涌多飲其汁無大豆豉亦佳又方藍青藍子亦通解諸毒常預畜之又方煑薺苨令濃飲一二升祕方卒無可煑嚼食之亦可作散服之此藥在諸藥中諸藥則皆驗又方凡煑此藥汁解毒者不可熱飲之諸毒得熱更甚宜使小冷爲良帶辯刺史云嶺南俚人毒皆因食得之多不即覺漸不能食或更心中漸脹并背急悶先寒似瘴微覺即急取一片白銀含之一宿銀變色即是藥也銀青是藍藥銀黄赤是𦵣藥久久者入眼眼或青或黄赤青是藍藥黄赤是𦵣藥俚人有解療者畏人得知在外預言三百牛藥或云三百兩銀藥余久任以首領親狎知其藥常用俚人不識本草乃妄言之其方并如後也初得俚人毒藥且令定方生薑四兩甘草三兩炙切以水六升煑取二升且服三服服訖然後覓藥療之療方常山四兩切白塩四錢以水一斗漬一宿以月盡日漬月一日五更以土釜煑勿令奴婢鷄犬見煑取二升旦分再服服了少時即吐以銅器貯取若青色以杖舉五尺不斷者即藥未盡二日後更一劑席辯曾飲酒得藥月餘始覺首領梁墳將土常山與爲呼爲一百頭牛藥服之即差差後二十日愼毒食唯有煑飯食之前後得差凡九人又方黄藤十兩嶺南皆有切以水一斗煑取二升分三服服訖毒藥内消若防己俚人藥常服此藤縱得自然不發席云常服之利小便亦療數人又方都淋藤十兩嶺南皆有土人悉知俚人呼爲三百兩銀其葉細長有三尺微藤生切以水一斗和酒二升煑取三升分三服服訖毒藥并逐小便出十日愼毒食不差更服之即愈又方乾藍實四兩白花藤四兩出隽州者上不得取野葛同生者切以水七升酒一升煑取半空腹頓服之少悶勿怪單乾藍擣末頓服之亦差又療腹内諸毒都淋藤二兩長三寸並細剉酒三升合安罌中宻封以糠火燒四邊燒令三沸待冷出温服常令有酒色亦無所忌大效若不獲已食俚人食者先取甘草一寸炙之後熟嚼吞之若食著毒藥即吐便是得藥依前法療之席辯云常囊貯甘草十片以自防附方勝金方治一切毒以膽子礬爲末用糯米糊丸如鷄頭實大以朱砂衣常以朱砂養之冷水化一丸服立差經驗方解藥毒上攻如聖散露蜂房甘草等分用麩炒令黄色去麩爲末水二碗煎至八分一碗令温臨卧頓服明日取下惡物外臺秘要治諸藥石後或熱噤多向冷地卧又不得食諸熱麵酒等方五加皮二兩以水四升煑取二升半候石發之時便服未定更服孫思邈論云有人中烏頭巴豆毒甘草入腹即定方稱大豆解百藥毒嘗試之不效乃加甘草爲甘豆湯其效更速梅師方蜀椒閉口者有毒誤食之便氣欲絶或下白沫身體冷急煎桂汁服之多飲冷水一二升忽食飲吐漿煎濃豉汁服之聖惠方治硫黄忽發氣悶用羊血服一合效又方治射罔在諸肉中有毒及漏脯毒用貝子末水調半錢服效或食麵臛毒亦同用初虞世方治藥毒祕效巴豆去皮不出油馬牙硝等分合研成膏冷水化一彈子許服差治食中諸毒方第六十九蜀椒閉口者有毒戟人咽氣便欲絶又令人吐白沫多飲桂汁若冷水一二升及多食大蒜即便愈愼不可飲熱殺人比見在中椒毒含蒜及薺苨差鈎吻葉與芥相似誤食之殺人方薺苨八兩水六升煑取三升服五合日五服又云此非釣吻食諸菜中毒發狂煩悶吐下欲死方取鷄屎燒末服方寸七不解更服又煑葛根飲汁莨菪毒煑甘草汁擣藍汁飲並良苦瓠毒煑黍穰令濃飲汁數升佳食馬肝中毒取牡鼠屎二七枚兩頭尖者是水和飲之未解者更作食六畜鳥獸幞頭垢一錢七小品云起死人又飲豉汁數升良凡物肝臟自不可輕啖自死者彌勿食之生食肝中毒擣附子末服一刀圭日三服肉有箭毒以藍汁大豆解射罔毒食鬱肉謂在蜜器中經宿者及漏脯茅屋汁霑脯爲漏脯此前并有毒燒人屎末酒服方寸七又方搗薤汁服二三升各連取以少水和之食黍米中藏脯中毒方此是鬱脯煑大豆一沸飲汁數升即解兼解諸肉漏毒食自死六畜諸肉中毒方黄檗末服方寸七未解者數服六畜自死皆是遭疫有毒食之洞下亦致堅積並宜以痢丸下之食魚中毒濃煑橘皮飲汁小品云冬瓜汁最驗食猪肉遇冷不消必成蟲癥下之方大黄朴硝各一兩芒硝亦佳煑取一升盡服之若不消并皮研杏子湯三升和三服吐出神驗食牛肉中毒煑甘草飲汁一二升食馬肉洞下欲死者豉二百粒杏子二十枚㕮咀蒸之五升飯下熟合搗之再朝服令盡此牛馬皆謂病死者耳食鱸魚肝及鯸鮧魚中毒剉蘆根煑汁飲一二升良解毒濃煑香蘇飲汁一升飲食不知是何毒依前甘草薺苨通療此毒皆可以救之食𦵔菜誤吞水蛭蛭噉臟血腸痛漸黄瘦者飲牛羊熱血一二升許經一宿便煖猪脂一升飲之便下蛭食菌遇毒死方絞人屎汁飲一升即活服諸吐痢丸亦佳又掘地作土漿服二三升則良誤食野芋欲死療同菌法凡種芋三年不取亦成野芋即殺人也附方梅師方治飲食中毒魚肉菜等苦參三兩以苦酒一升煎三五沸去滓服之吐出即愈或取煑犀角汁一升亦佳又方治食狗肉不消心下堅或腹脹口乾發熱妄語煑蘆根飲之又方杏仁一升去皮水三升煎沸去滓取汁爲三服下肉爲度金匱方治食蟹中毒紫蘇煑汁飲之三升以子汁飲之亦治凡蟹未經霜多毒又聖惠方以生藕汁或煑乾蒜汁或冬瓜汁並佳又方治雉肉作臛食之吐下用生犀角末方寸七新汲水調下即差唐崔魏公云鉉夜暴亡有梁新聞之乃𧦜之曰食毒僕曰常好食竹鷄竹鷄多食半夏苗必是半夏毒命生薑擂汁折齒而灌之活金匱方春秋二時龍帶精入芹菜中人遇食之爲病發時手青肚滿痛不可忍作蛟龍病服硬糖三二升日二度吐出如蜥蜴三二個便差明皇雜録云有黄門奉使交廣回周顧謂曰此人腹中有蛟龍上驚問黄門曰卿有疾否曰臣馳馬大庾嶺時當大熱困且渴遂飲水覺腹中堅痞如杯周遂以硝石及雄黄煑服之立吐一物長數寸大如指視之鱗甲具投之水中俄頃長數尺復以苦酒沃之如故以器覆之明日已生一龍矣上甚訝之治防避飲食諸毒方第七十雜鳥獸他物諸忌法白羊不可雜雄雞羊肝不可合烏梅及椒食猪肉不可雜羊肝牛腸不可合犬肉雄雞肉不可合生䓗菜雞鴨肉不可合蒜及李子鱉肉等生肝投地塵芥不著者不可食暴脯不肯燥及火炙不動并見水而動並勿食鳥獸自死口不開者不可食水中魚物諸忌魚頭有正白連諸齊上不可食魚無腸膽及頭無魫勿食魚不合烏雞肉食生魚目赤不可作膾魚勿合小豆藿青魚鮓不可合生胡荽鱉目凹者不可食鱉肉不可合雞鴨子及赤莧菜食之妊娠者不可食鱠魚雜果菜諸忌李子不可合雞子及臨水食之五月五日不可食生菜病人不可食生胡芥菜妊娠勿食桑椹并鴨子巴豆藿羹半夏菖蒲羊肉細辛桔梗忌菜甘草忌菘菜牡丹忌胡荽常山忌葱黄連桔梗忌猪肉茯苓忌大醋天門冬忌鯉魚附方食醫心鏡黄帝云食甜瓜竟食塩成霍亂孫眞人食忌蒼耳合猪肉食害人又云九月勿食被霜瓜食之令人成反胃病治卒飲酒大醉諸病方第七十一大醉恐腹腸爛作湯於大器中以漬之冷復易大醉不可安卧常令摇動轉側又當風席地及水洗飲水最忌於交接也飲醉頭痛方刮生竹皮五兩水八升煑取五升去滓然後合納雞子五枚攪調更煑再沸二三升服盡飲後下痢不止煑龍骨飲之亦可末服連月飲酒喉咽爛舌上生瘡擣大麻子一升末黄檗二兩以蜜爲丸服之飲酒積熱遂發黄方雞子七枚苦酒漬之封蜜器中納井底二宿當取各吞二枚枚漸盡愈大醉酒連日煩每不堪方蔓青菜并少米熟煑去滓冷之便飲則良又方生葛根汁一二升乾葛煑飲亦得欲使難醉醉則不損人方擣栢子仁麻子仁各二合一服之乃以飲酒多二倍又方葛花并小豆花子末爲散服三二七又時進葛根飲枇杷葉飲并以雜者乾蒲麻子等皆使飲而不病人胡麻亦煞酒先食鹽一七後則飲酒亦倍附方外臺祕要治酒醉不醒九月九日眞菊花末飲服方寸七又方斷酒用驢駒衣燒灰酒服之又方鸕鷀糞灰水服方寸匕聖惠方治酒毒或醉昏悶煩渴要易醒方取柑皮二兩焙乾爲末以三錢七水一中盞煎三五沸入鹽如茶法服妙又方治酒醉不醒用菘菜子二合細研井花水一盞調爲二服千金方斷酒法以酒七升著瓶中朱砂半兩細研著酒中緊閉塞瓶口安猪圈中任猪摇動經七日頓飲之又方正月一日酒五升淋碓頭杵下取飲又方治酒病豉葱白各半升水二升煑取一升頓服葛仙翁肘後備急方卷之七
