front:
  text: 楊氏產乳療通體遍身腫小便不利
  hash: sha256:79627806ef14ae7b51875675b3492e38084d84a4dade8abb557e87d6847f5c61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0115_YP-C_11xuji-10-0106a, image: JY146/11xuji-10-0106a.png}
body:
  text: 猪苓五兩搗篩煎水三合調服方加寸七至二七治卒大腹水病方第二十五水病之初先目上腫起如老蠶色俠頭脈動股裏冷脛中滿按之沒指腹內轉側有節聲此其候也不卽治須臾身體稍腫肚盡脹按之隨手起則病已成猶可爲治此皆從虛損大病或下痢後婦人產後飲水不卽消三焦受病小便不利乃相結漸漸生聚遂流諸經絡故也治之方葶藶一升熬搗之於臼上割生雄鵾雞合血共頭共搗萬杵服如梧子五丸稍加至十丸勿食鹽常食小豆飯飲小豆汁鱧魚佳也又方防風甘草葶藶各一兩搗苦酒和丸如梧子大三丸日三服常服之取消平乃止又方雄黃六分麝香三分甘遂芫花人參各二分搗蜜和丸服如豆大二丸加至四丸卽差又方但以春酒五升漬葶藶子二升隔宿稍服一合小便當利又方葶藶一兩杏人二十枚並熬黃色搗分十服小便去立差又方胡洽水銀丸大治水腫利小便姚同葶藶椒目各一升芒消六兩水銀十兩水煮水銀三日三夜乃以合搗六萬杵自相和丸服如大豆丸日三服日增一丸至十丸更從一起差後食牛羊肉自補稍稍飲之又方多取柯枝皮剉濃煮煎令可丸服如梧子大三丸須臾又一丸當下水後將服三丸日三服此樹一名木奴南人用作船又方眞蘇合香水銀白粉等分蜜丸服如大豆二丸日三當下水節飲好自養無蘇合可闕之也又方取草麻繩熟者二十枚去皮研之水解得三合日一服至日中許當吐下諸水汁結裹若不盡三日後更服三十枚猶未盡更復作差後節飲及鹹物等又方小豆一升白雞一頭治如食法以水三斗煮熟食滓飲汁稍相令盡又方取青雄鴨以水五升煮取飲汁一升稍稍飲令盡厚覆之取汗佳又方取胡鷰卵中黃頓吞十枚又方取蛤螻炙令熟日食十箇又方若唯腹大動搖水聲皮膚黑名曰水蠱巴豆九十枚去皮心杏仁六十枚去皮尖並熬令黃搗和之服如小豆大一枚以水下爲度勿飲酒佳又方鬼扇細搗絞汁服如雞子卽下水更復取水蠱若湯研麻子汁飲之又方慈彌草三十斤子三石煮取一石去滓更湯上煎令可丸服如皂莢子三九至五六丸水隨小便去卽飲糜粥養之又方白茅根一大把小豆三升水三升煮取乾去茅根食豆水隨小便下又方鼠尾草馬鞭草各十斤水一石煮取五斗去滓更煎以粉和爲丸服如大豆大二丸加至四五丸禁肥肉生冷勿食腫滿者白椹樹白皮一握水二升煮取五合白檳榔大者二枚末之內更煎三五沸湯成下少許紅雪服之又將服牛溺章陸羊肉臛及香柔煎等在腫滿條中其十水丸諸大方在別卷若止皮膚水腹內未有者服諸發汗藥得汗便差然愼護風寒爲急若唯腹大下之不去便針臍下二寸入數分令水出孔合須腹減乃止附方李絳兵部手集方療水病無問年月深淺雖復脉惡亦主之大戟當歸橘皮各一大兩切以水一大升煮取七合頓服利水二三斗勿恠至重不過再服便差禁毒食一年水下後更服永不作此方出張尚客外臺祕要治水氣章陸根白者去皮切如小豆許一大盞以水三升煮取一升已上爛卽取粟米一大盞煮成粥仍空心服若一日兩度服卽恐利多每日服一頓卽微利不得雜食又療水病腫鯉魚一頭極大者去頭尾及骨唯取肉以水二斗赤小豆一大升和魚肉煮可取二升已上汁生布絞去滓頓服盡如不能盡分爲二服後服温令暖服訖當下利利盡卽差又方卒患腫滿曾有人忽脚胅腫漸上至膝足不可踐地至大水頭面遍身大腫脹滿苦瓠白瓤實捻如大豆粒以麵裹煮一沸空心服七枚至午當出水一斗三日水自出不止大瘦乃差三年內愼口味也苦瓠須好者無黶翳細理研淨者不爾有毒不用聖惠方治十種水不差垂死用猯肉半斤切粳米三合水三升葱椒薑豉作粥食之又方治十種水病腫滿喘促不得臥以螻蛄五枚乾爲末食前湯調半錢匕至一錢小便通效食醫心鏡治十種水病不差垂死青頭鴨一隻治如食法細切和米并五味煮令極熟作粥空腹食之又方主水氣脹滿浮腫小便澁少白鴨一隻去毛腸洗饋飯半升以飯薑椒釀鴨腹中縫定如法蒸候熟食之楊氏產乳療身體腫滿水氣急臥不得郁李人一大合搗爲末和麥麯搜作餅子與吃入口卽大便通利氣便差梅師方治水腫坐臥不得頭面身體悉腫取東引花桑枝燒灰淋汁煮赤小豆空心食令飽饑卽食盡不得吃飯又方治水腫小便澁黃牛尿飲一升日至夜小便利差勿食鹽又方治心下有水白朮三兩澤瀉五兩剉以水三升煎取一升半分服千金翼治小便不利膀胱水氣流滯以浮萍日乾末服方寸匕日一二服良經驗方河東裴氏傳經效治水腫及暴腫葶藶三兩杵六千下令如泥卽下漢防己末四兩取綠頭鴨就藥臼中截頭瀝血於臼中血盡和鴨頭更搗五千下丸如梧桐子患甚者空腹白湯下十丸稍可者五丸頻服五日止此藥利小便有效如神韋宙獨行方療水腫從腳起入腹則殺人用赤小豆一斗煮令極爛取汁四五升温漬膝以下若以入腹但服小豆勿雜食亦愈李絳兵部手集方亦著此法云曾得效治卒心腹癥堅方第二十六治卒暴癥腹中有物如石痛如刺晝夜啼呼不治之百日死方牛膝二斤以酒一斗漬以宻封於熱灰火中温令味出服五合至一升量力服之又方用蒴藋根亦如此尤良姚云牛膝酒神驗也又方多取當陸根搗蒸之以新布藉腹上藥披著布上勿腹上冷復之晝夜勿息又方五月五日葫十斤去皮桂一尺二寸竈中黃土如鴨子一枚合搗以苦酒和塗以布搭病不過三差又方取橉木燒爲灰淋取汁八升以釀一斛米酒成服之從半合始不知稍稍增至一二升不盡一劑皆愈此灰入染絳用葉中釀酒也橉直忍切凡癥堅之起多以漸生如有卒覺便牢大自難治也腹中癥有結積便害飲食轉羸瘦治之多用陷冰玉壺八毒諸大藥今止取小易得者取虎杖根勿令影臨水上者可得石餘杵熟煮汁可丸以秫米五六升炊飯內日中塗藥後可飯取差又方亦可取根一升搗千杵酒漬之從少起日三服此酒治癥乃勝諸大藥又方蠶矢一石桑柴燒灰以水淋之五度取生鼈長一尺者內中煮之爛熟去骨細擘剉更煎令可丸丸如梧子大一服七丸日三又方射罔二兩椒三百粒搗末雞子白和爲丸如大麻子服一丸漸至如大豆大一丸至三丸爲度又方大猪心一枚破頭去血搗末雄黃麝香當門子五枚巴豆百枚去心皮生用心縫以好酒於小銅器中煎之令心沒欲歇隨益盡三升當糜爛煎令可丸如麻子服三丸日三服酒盡不糜者出搗蜜丸之良又大黃末半斤朴消三兩蜜一斤合於湯上煎可丸如梧子服十丸日三服之治鼈癥伏在心下手揣見頭足時時轉者白雌雞一雙絶食一宿明旦膏煎飯飼之取其矢無問多少於銅器中以溺和之火上熬可搗末服方寸匕日四五服須消盡乃止常飼雞取矢差畢煞雞單食之姚同治心下有物大如杯不得食者葶藶二兩熬之大黃二兩澤漆四兩搗篩蜜丸和搗千杵服如梧子大二丸日三服稍加其有陷氷赭鬼諸丸方别在大方中治兩脇下有氣結者狼毒二兩旋覆花一兩附子二兩炮之搗篩蜜和丸服如梧子大二丸稍加至三丸服之熨癥法銅器受二升許貯魚膏令深二三寸作大火炷六七枚燃之令膏煖重紙覆癥上以器熨之晝夜勿息膏盡更益也又方茱萸三升碎之以酒和煮令熟布帛物裏以熨癥上冷更均番用之癥當移去復逐熨須臾消止亦可用好茱萸末以雞子白和射菵服之又方竈中黃土一升先搗葫熟內上復搗以苦酒澆令浥浥先以塗布一囘仍㩉病上以塗布上乾復易之取令消止差治婦人臍下結物大如杯升月經不通發作往來下痢羸瘦此爲氣瘕按之若牢强肉癥者不可治未者可治末乾漆一斤生地黃三十斤搗絞取汁火煎乾漆令可丸食後服如梧子大三丸日三服卽差附方外臺秘要方療心腹宿癥卒得癥取朱砂細研搜飯令朱多以雄雞一隻先餓三日後以朱飯飼之著雞於板上收取糞曝燥爲末温清酒服方寸七至二錢日三服若病困者晝夜可六服一雞少更飼一雞取足服之俟愈卽止又療食魚肉等成癥結在腹并諸毒氣方狗糞五升燒末之綿裹酒五升漬再宿取清分十服日再已後日三服使盡隨所食癥結卽便出矣千金方治食魚鱠及生肉住胸膈不化必成癥瘕搗馬鞭草汁飲之一升生薑水亦得卽下又方治肉癥思肉不已食訖復思白馬尿三升空心飲當吐肉肉不出卽死藥性論云治癥癖病鼈甲訶梨勒皮乾薑末等分爲丸空心下三十丸再服宋明帝宫人患腰痛牽心發則氣絶徐文伯視之曰髮瘕以油灌之吐物如髮引之長三尺頭已成蛇能動搖懸之滴盡惟一髮勝金方治膜外氣及氣塊方延胡索不限多少爲末猪胰一具切作塊子炙熟蘸藥末食之治心腹寒冷食飲積聚結癖方第二十七治腹中冷癖水穀癊結心下停痰兩脇痞滿按之鳴轉逆害飲食取大蟾蜍一枚去皮及腹中物支解之芒消大人一升中人七合瘦弱人五合以水六升煮取四升一服一升一服後未得下更一升得下則九日十日一作又方茱萸八兩消石一升生薑一斤以酒五升合煮取四升先服一服一升不痛者止勿再服之下病後好將養之又方大黃八兩葶藶四兩并熬芒消四兩熬令汁盡熟搗蜜和丸丸如梧子大食後服三丸稍增五丸又方狼毒三兩附子一兩旋覆花三兩搗蜜丸服如梧子大食前三丸日三服又方巴豆三十枚去心杏人二十枚并熬桔梗六分藜蘆四分皂莢三分並炙之搗蜜和丸如胡豆大未食服一丸日二欲下病者服二丸長將息百日都好差又方貝母二兩桔梗二兩礬石一兩巴豆一兩去心皮生用搗千杵蜜和丸如梧子一服二丸病後少少減服又方茯苓一兩茱萸三兩搗蜜丸如梧子大服五丸日三服又治暴宿食留飲不除腹中爲患方大黃茯苓芒消各三兩巴豆一分搗蜜丸如梧子大一服二丸不痛止又方椒目二兩巴豆一兩去皮心熬搗以棗膏丸如麻子服二丸下痛止又方巴豆一枚去心皮熬之椒目十四枚豉十六粒合搗爲丸服二丸當吐利吐利不盡更服二丸服四神丸下之亦佳中候黑丸治諸癖結痰癊第一良桔梗四分桂四分巴豆八分去心皮杏人五分去皮芫花十二分並熬令紫色先搗三味藥成末又搗巴豆杏人如膏合和又搗二千杵丸如胡豆大服一丸取利至二三丸兒生十日欲癇皆與一二丸如粟粒大諸腹內不便體中覺患便服得一兩行利則好也硫黃丸至熱治人之大冷夏月温飲食不解衣者硫黃礬石乾薑茱萸桂烏頭附子椒人參細辛皂莢當歸十二種分等隨人多少搗蜜丸如梧子大一服十丸至二十丸日三服若冷痢者加赤石脂龍骨卽便愈也露宿丸治大寒冷積聚方礬石乾薑桂桔梗附子炮皂莢各三兩搗篩蜜丸如梧子大酒下十丸加至一十五丸附方外臺秘要療癖方大黃十兩杵篩醋三升和匀白蜜兩匙煎堪丸如梧桐子大一服三十丸生薑湯吞下以利爲度小者減之聖惠方治伏梁氣在心下結聚不散用桃奴二兩爲末空心温酒調二錢匕簡要濟眾治久積冷不下食嘔吐不止冷在胃中半夏五兩洗過爲末每服二錢白麫一兩以水和搜切作棋子水煮麵熟爲度用生薑醋調和服之治胸膈上痰癊諸方第二十八治卒頭痛如破非中冷又非中風方釜月下墨四分附子三分桂一分搗篩以冷水服方寸七當吐一方無桂又方苦參桂半夏等分搗下篩苦酒和以塗痛則差又方烏梅三十枚鹽三指撮酒三升煮取一升去滓頓服當吐愈此本在雜治中其病是胸中膈上痰厥氣上衝所致名爲厥頭痛吐之卽差但單煮米作濃飲二三升許適冷暖飲盡二三升須臾適吐適吐畢又飲如此數過劇者須臾吐膽乃止不損人而卽差治胸中多痰頭痛不欲食及飲酒則瘀阻痰方常山二兩甘草一兩松蘿一兩瓜蒂三七枚酒水各一升半煮取升半初服七合取吐吐不盡餘更分二服後可服半夏湯胡洽名粉隔湯礬石一兩水二升煮取一升內蜜半合頓服須臾未吐飲少熱湯又方杜蘅三兩松蘿三兩瓜蒂三十枚酒一升二合漬再宿去滓温服五合一服不吐晩更一服又方瓜蒂一兩赤小豆四兩搗末温湯三合和服便安卧欲擿之不吐更服之又方先作一升湯投水一升名爲生熟湯及食三合鹽以此湯送之須臾欲吐便摘出未盡更服二合飲湯二升後亦可更服湯不復也又方常山四兩甘草半兩水七升煮取三升內半升蜜服一升不吐更服無蜜亦可方中能月服一種則無痰水之患又有旋覆五飲在諸大方中若胸中痞寒短氣腷者腷敷逼切甘草二兩茯苓三兩杏人五十枚碎之水一斗三升煮取六升分爲五服又方桂四兩术甘草二兩附子炮水六升煮取三升分爲三服膈中有結積覺駭駭不去者藜蘆一兩炙末之巴豆半兩去皮心熬之先搗巴豆如泥入藜蘆末又搗萬杵蜜丸如麻子大服一丸至二三丸膈中之病名曰膏肓湯丸徑過針灸不及所以作丸含之令氣勢得相熏染有五膈丸方麥門冬十分去心甘草十分炙椒遠志附子炮乾薑人參桂細辛各六分搗篩以上好蜜丸如彈丸以一丸含稍稍嚥其汁日三丸服之主短氣心胸滿心下堅冷氣也此疾有十許方率皆相類此丸最勝用藥雖多不合五膈之名謂憂膈氣膈恚膈寒膈其病各有診別在大方中又有七氣方大約與此大同小别耳附方聖惠方治痰厥頭痛以烏梅十箇取肉鹽二錢酒一中盞合煎至七分去滓非時温服吐卽佳又方治冷痰飲惡心用蓽撥一兩搗爲末於食前用清粥飲調半錢服又方治痰壅嘔逆心胸滿悶不下食用厚朴一兩塗生薑汁炙令黃爲末非時粥飲調下二錢匕千金翼論曰治痰飲吐水無時節者其源以冷飲過度遂令脾胃氣羸不能消於飲食飲食入胃則皆變成冷水反吐不停者赤石脂散主之赤石脂一斤搗篩服方寸匕酒飲自任稍稍加至三匕服盡一斤則終身不吐淡水又不下痢補五藏令人肥健有人痰飲服諸藥不效用此方遂愈御藥院方眞宗賜高祖相國去痰清目進飲食生犀丸川芎十兩緊小者粟米泔浸三日換切片子日乾爲末作兩料每料入麝腦各一分生犀半兩重湯煮蜜杵爲丸小彈子大茶酒嚼下一丸痰加朱砂半兩膈壅加牛黃一分水飛鐵粉一分頭目昏眩加細辛一分口眼喎斜炮天南星一分又方治膈壅風痰半夏不計多少酸漿浸一宿温湯洗五七遍去惡氣日中𥋧乾搗爲末漿水搜餅子日中乾之再爲末每五兩入生腦子一錢研匀以漿水濃脚丸雞頭大紗袋貯通風處陰乾每一丸好茶或薄荷湯下王氏博濟治三焦氣不順胸膈壅塞頭昏目眩涕唾痰涎精神不爽利膈丸牽牛子四兩半生半熟不蚛皂莢塗酥二兩爲末生薑自然汁煮糊丸如桐子大每服二十丸荆芥湯下經驗後方治頭風化痰川芎不計分兩用淨水洗浸薄切片子日乾或焙杵爲末煉蜜爲丸如小彈子大不拘時茶酒嚼下又方治風痰鬱金一分藜蘆十分各爲末和令匀每服一字用温漿水一盞先以少漿水調下餘者水漱口都服便以食壓之外臺秘要治一切風痰風霍亂食不消大便澁訶梨勒三枚搗取末和酒頓服三五度良勝金方治風痰白僵蠶七箇直者細研以薑汁一茶脚温水調灌之又方治風痰以蘿蔔子爲末温水調一匙頭良久吐出涎沫如是癱緩風以此吐後用緊疎藥服疎後服和氣散差斗門方治胸膈壅滯去痰開胃用半夏淨洗焙乾搗羅爲末以生薑自然汁和爲餅子用濕紙裹於慢火中煨令香熟水兩盞用餅子一塊如彈丸大入鹽半錢煎取一盞温服能去胸膈壅逆大壓痰毒及治酒食所傷其功極驗治卒患胸渾痛方第二十九胸痺之病令人心中堅痞忽痛肌中苦痺絞急如刺不得俛仰其胸前皮皆痛不得手犯胸滿短氣咳嗽引痛煩悶自汗出或徹引背膂不卽治之數日害人治之方用雄黃巴豆光搗雄黃細篩內巴豆務熟搗相入丸如小豆大服一丸不效稍益之又方取枳實搗宜服方寸匕日三夜一服又方搗栝樓實大者一枚切薤白半升以白酒七升煮取二升分再服亦可加半夏四兩湯洗去滑則用之又方橘皮半斤枳實四枚生薑半斤水四升煮取二升分再服又方枳實桂等分搗末橘皮湯下方寸七日三服仲景方神效又方桂烏喙乾薑各一分人參細辛茱萸各二分貝母二分合搗蜜和丸如小豆大一服三丸日三服之若已差復發者下韭根五斤搗絞取汁飲之愈附方杜壬治胸膈痛徹背心腹痞滿氣不得通及治疾嗽大栝樓去瓤取子熟炒別研和子皮麫糊爲丸如梧桐子大米飲下十五丸治卒胃反嘔啘方第三十葛氏治卒乾嘔不息方破雞子去白吞中黃數枚卽愈也又方搗葛根絞取汁服一升許又方一云蔗汁温令熱服一升日三一方生薑汁服一升又方灸兩腕後兩筋中一穴名間使各七壯灸心主尺澤亦佳又方甘草人參各二兩生薑四兩水六升煮取二升分爲三服治卒嘔啘又厥逆方用生薑半斤去皮切之橘皮四兩擘之以水七升煮三升去滓適寒温服一升日三服又方蘡薁藤斷之當汁出器承取飲一升生葛藤尤佳治卒啘不止方飲新汲井水數升甚良又方痛爪眉中夾間氣也又方以物刺鼻中各一分來許皂莢內鼻中令嚏差又方但閉氣仰引之又方好豉二升煮取汁服之也又方香蘇激煮汁頭服一二升良又方粢米三升爲粉井花水服之良又方用枇杷葉一斤拭去毛炙水一斗煮取三升服蘆根亦佳治食後喜嘔吐者燒鹿角灰二兩人參一兩搗末方寸匕日三服姚同治人忽惡心不已方薤白半斤茱萸一兩豉半升米一合棗四枚枳實二枚鹽如彈丸水三升煮取一升半分爲三服又方但多嚼豆蔻子及咬檳榔亦佳治人胃反不受食食畢輒吐出方大黃四兩甘草二兩水二升煮取一升半分爲再服之治人食畢噫醋及醋心方人參一兩茱萸半斤生薑六兩大棗十二枚水六升煮取二升分爲再服也噦不止半夏洗乾末之服一匕則立止又方乾薑六分附子四分炮搗苦酒丸如梧子服三丸日三效附方張仲景方治反胃嘔吐大半夏湯半夏三升人參三兩白蜜一升以水一斗二升煎揚之一百二十遍煮下三升半温服一升日再亦治膈間痰飲又方主嘔噦穀不得下眩悸半夏加茯苓湯半夏一升生薑半斤茯苓三兩切以水七升煎取一升半分温服之千金方治反胃食卽吐搗粟米作粉和水丸如梧子大七枚爛煮內醋中細吞之得下便已麫亦得用之又方治乾噦若手足厥冷宜食生薑此是嘔家聖藥治心下痞堅不能食胸中嘔噦生薑八兩細切以水三升煮取一升半夏五合洗去滑以水五升煮取一升二味合煮取一升半稍稍服之又方主乾嘔取羊乳一盃空心飲之斗門方治翻胃用附子一箇最大者坐於磚上四面著火漸逼碎入生薑自然汁中又依前火逼乾復淬之約生薑汁盡盡半碗許搗羅爲末用粟米飲下一錢不過三服差經驗方治嘔逆反胃散大附子一箇生薑一斤細剉煮研如麫糊米飲下之又方治丈夫婦人吐逆連日不止粥食湯藥不能下者可以應用此候效摩丸五靈脂不夾土石揀精好者不計多少搗羅爲末研狗膽汁和爲丸如雞頭大每服一丸煎熱生薑酒摩令極細更以少生薑酒化以湯湯藥令極熱須是先做下粥温熱得所左手與患人藥吃不得嗽口右手急將粥與患人吃不令太多又方碧霞丹治吐逆立效北來黃丹四兩篩過用好米醋半升同藥入銚內煎令乾卻用炭火三秤就銚內煅透紅冷取研細爲末用粟米飯丸如桐子大煎酵湯下七丸不嚼只一服孫眞人食忌治嘔吐以白檳榔一顆煨橘皮一分炙爲末水一盞煎半盞服廣濟方治嘔逆不能食訶梨勒皮二兩去核熬爲末蜜和丸如梧桐子大空心服二十丸日二服食醫心鏡主脾胃氣弱食不消化嘔逆反胃湯飲不下粟米半升杵細水和丸如梧子大煮令熟點少鹽空心和汁吞下金匱玉函方治五噎心膈氣滯煩悶吐逆不下食蘆根五兩剉以水三大盞煮取二盞去滓不計時温服外臺秘要治反胃昔幼年經患此疾每服食餅及羹粥等須臾吐出貞觀許奉御兄弟及柴蔣等家時稱名醫奉勅令治罄竭各人所長竟不能療漸羸憊候絶朝夕忽有一衛士云服驢小便極驗旦服二合後食唯吐一半晡時又服二合人定時食粥吐卽便定迄至今日午時奏之大內中五六人患反胃同服一時俱差此藥稍有毒服時不可過多承取尿及熱服二合病深七日以來服之良後來療人並差又方治嘔麻仁三兩杵熬以水研取汁著少鹽吃立效李諫議用極妙又方治久患咳噫連咳四五十聲者取生薑汁半合蜜一匙頭煎令熟温服如此三服立效又方治咳噫生薑四兩爛搗入蘭香葉二兩椒末一錢匕鹽和麵四兩裏作燒餅熟煨空心吃不過三兩度效孫尚藥方治諸吃噫橘皮二兩湯浸去瓤剉以水一升煎之五合通熱頓服更加枳殻一兩去瓤炒同煎之服效梅師方主胃反朝食暮吐暮食朝吐旋旋吐者以甘蔗汁七升生薑汁一升二味相和分爲三服又方治醋心檳榔四兩橘皮二兩細搗爲散空心生蜜湯下方寸匕兵部手集治醋心每醋氣上攻如釅醋吳茱萸一合水三盞煎七分頓服縱濃亦須强服近有人心如蜇破服此方後二十年不發治卒發黃疸諸黃病第三十一治黃疸方蕪菁子五升搗篩服方寸匕日三先後十日愈之又方燒亂髮服一錢匕日三服秘方此治黃疸又方搗生麥苗水和絞取汁服三升以小麥勝大麥一服六七合日三四此酒疸也又方取藜蘆著灰中炮之令小變色搗下篩末服半錢匕當小吐不過數服此秘方也又方取小豆秫米雞矢白各二分搗篩爲末分爲三服黃汁當出此通治面目黃卽差疸病有五種謂黃疸穀疸酒疸女疸勞疸也黃汗者身體四肢微腫胸滿不得汗汗出如黃檗汁由大汗出卒入水所致方猪脂一斤温令熱盡服之日三當下下則稍愈又方栀子十五枚栝蔞子三枚苦參三分搗末以苦酒漬雞子二枚令軟合黃白以和藥搗丸如梧子大每服十丸日五六除熱不吐卽下自消也又方黃雌雞一隻治之剉生地黃三斤內腹中急縛仰置銅器中蒸令極熟絞取汁再服之又方生茅根一把細切以猪肉一斤合作羹盡啜食之又方柞樹皮燒末服方寸匕日三服又方甘草一尺栀子十五枚黃檗十五分水四升煮取一升半分爲再服此藥亦治温病發黃又方茵陳六兩水一斗二升煮取六升去滓內大黃二兩栀子十四枚煮取三升分爲三服又方麻黃一把酒五升煮取二升半可盡服汗出差若變成疸者多死急治之方土瓜根搗取汁頓服一升至三服須病汗當小便去不爾更服之穀疸者食畢頭旋心怫鬱不安而發黃由失饑大食胃氣衝熏所致治之方茵陳四兩水一斗煮取六升去滓內大黃二兩栀子七枚煮取二升分三服溺去黃汁差又方苦參三兩龍膽一合末牛膽丸如梧子以生麥汁服五丸日三服酒疸者心懊痛足脛滿小便黃飲酒發赤斑黃黑由大醉當風入水所致治之方黃耆二兩木蘭一兩末之酒服方寸匕日三服又方大黃一兩枳實五枚栀子七枚豉六合水六升煮取二升分爲三服又方芫花椒目等分燒末服半錢日一兩遍女勞疸者身目皆黃發熱惡寒小腹滿急小便難由大勞大熱交接交接後入水所致治之方消石礬石等分末以大麥粥飲服方寸匕日三令小汗出小便當去黃汁也又方亂髮如雞子大猪膏半斤煎令消盡分二服附方外臺祕要柳枝以水一斗煮取濃汁半升服令盡又方治陰黃汗染衣涕唾黃取蔓菁子搗末平旦以井花水服一匙日再加至兩匙以知爲度每夜小便重浸少許帛子各書記日色漸退白則差不過服五升圖經曰黃疸病及狐惑病并猪苓散主之猪苓茯苓术等分杵末每服方寸匕水調下食療云主心急黃以百合蒸過蜜和食之作粉尤佳紅花者名山丹不堪食治黃疸用秦艽一大兩細剉作兩貼子以上好酒一升每貼半升酒絞取汁去滓空腹分兩服或利便止就中好酒人易治凡黃有數種傷酒曰酒黃夜食誤食鼠糞亦作黃因勞發黃多痰涕目有赤脈日益憔悴或面赤惡心者是崔元亮用之及治人皆得方極效秦艽須用新好羅文者傷寒類要療男子婦人黃疸病醫不愈耳目悉黃食飲不消胃中脹熱生黃衣在胃中有乾屎使病爾用煎猪脂一小升温熱頓服之日三燥屎下去乃愈又方治黃百藥不差煮驢頭熟以薑虀噉之并隨多少飲汁又方治黃疸身眼皆如金色不可使婦人雞犬見取東引桃根切細如筋若釵股以下者一握以水一大升煎取一小升適温空腹頓服後三五日其黃離離如薄雲散唯眼最後差百日方平復身黃散後可時時飲一盞清酒則眼中易散不飲則散遲忌食熱麵猪魚等肉此是徐之才家祕方正元廣利方療黃心煩熱口乾皮肉皆黃以秦艽十二分牛乳一大升同煮取七合去滓分温再服差此方出於許人則治卒患腰脇痛諸方第三十二葛氏治卒腰痛諸方不得俯仰方正立倚小竹度其人足下至臍斷竹及以度後當脊中灸竹上頭處隨年壯畢藏竹勿令人得矣又方鹿角長六寸燒搗末酒服之鹿茸尤佳又方取鼈甲一枚炙搗篩服方寸匕食後日三服又方桂八分牡丹四分附子二分搗末酒服一刀圭日再服治腎氣虛衰腰脊疼痛或當風臥濕爲冷所中不速治流入腿膝爲偏枯冷痺緩弱宜速治之方獨活四分附子一枚大者炮杜仲茯苓桂心各八分牛膝秦艽防風芎藭芍藥六分細辛五分乾地黃十分切水九升煮取三升空腹分三服如行八九里進一服忌如前頓服三劑治諸腰痛或腎虛冷腰疼痛陰萎方乾漆熬烟絕巴戟天去心杜仲牛膝各十二分桂心狗脊獨活各八分五加皮山茱萸乾薯蕷各十分防風六分附子四分煉蜜丸如梧子大空腹酒下二十丸日再加減以知爲度也大效脇痛如打方大豆半升熬令焦好酒一升煮之令沸熟飲取醉又方芫花菊花等分躑躅花半斤布囊貯蒸令熱以熨痛處冷復易之又方去窮骨上一寸灸七壯其左右一寸又灸七壯又積年久痛有時發動方乾地黃十分甘草五分乾漆五分水五分桂一尺搗篩酒服一七日三服又方六七月取地膚子陰乾末服方寸七日五六七服治反腰有血痛方搗杜仲三升許以苦酒和塗痛上乾復塗并灸足踵白肉際三壯治䐴腰痛生葛根嚼之嚥其汁多多益佳又方生地黃搗絞取汁三升煎取二升內蜜一升和一升日三服不差則更服之又方灸腰眼中七壯腎腰者猶如反腰忽轉而倇之治腰中常冷如帶錢方甘草乾薑各二兩茯苓术各四兩水五升煮取三升分爲三服小品云温治脇卒痛如打方以繩橫度兩乳中間屈繩從乳橫度以趍痛脇下灸繩下屈處三十壯便愈此本在雜治中隱居效方腰背痛方杜仲一斤切酒二斗漬十日服三合附方千金方治腰脚疼痛胡麻一升新者熬令香杵篩日服一小升計服一斗卽永差酒飲蜜湯羹汁皆可服之佳續千金方治腰膝疼痛傷敗鹿茸不限多少塗酥炙紫色爲末温酒調下一錢匕經驗方治腰脚痛威靈仙一斤洗乾好酒浸七日爲末麫糊丸桐子大以浸藥酒下二十丸經驗後方治腰疼神妙用破故紙爲末温酒下三錢匕又方治腎虛腰脚無力生栗袋貯懸乾每日平明吃十餘顆次喫猪腎粥又方治丈夫腰膝積冷痛或頑麻無力菟絲子洗秤一兩牛膝一兩同浸於銀器內用酒過一寸五日曝乾爲末將元浸酒再入少醇酒作糊搜和丸如梧桐子大空心酒下二十丸外臺祕要療腰痛取黃狗皮炙裹腰痛處取暖徹爲度頻即差也徐伯玉方同斗門方治腰痛用大黃半兩更入生薑半兩同切如小豆大於鐺內炒令黃色投水兩碗至五更初頓服天明取下腰間惡血物用盆器貯如雞肝樣即痛止又方治腰重痛用檳榔爲末酒下一錢梅師方治卒腰痛暫轉不得鹿角一枚長五寸酒二升燒鹿角令赤內酒中浸一宿飲之崔元亮海上方治腰脚冷風氣以大黃二大兩切如棋子和少酥炒令酥盡入藥中切不得令黃焦則無力搗篩爲末每日空腹以水大三合入生薑兩片如錢煎十餘沸去薑取大黃末兩錢別置椀子中以薑湯調之空腹頓服如有餘薑湯徐徐呷之令盡當下冷膿多惡物等病卽差止古人用毒藥攻病必隨人之虛實而處置非一切而用也姚僧垣初仕梁武帝因發熱欲服大黃僧垣曰大黃乃是快藥至尊年高不可輕用帝弗從幾至委頓元帝常有心腹疾諸醫咸謂宜用平藥可漸室通僧垣曰脉洪而實此有宿食非用大黃無差理帝從而遂愈以此言之今醫用一毒藥而攻眾病其偶中病便謂此方之神奇其差誤乃不言用藥之失如此者眾矣可不戒哉修眞方神仙方菟絲子一斗酒一斗浸良久漉出暴乾又浸以酒盡爲度每服二錢温酒下日二服後吃三五匙水飯壓之至三七日加至三錢匕服之令人光澤三年老變爲少此藥治腰膝去風久服延年治虛損羸瘦不堪勞動方第三十三治人素有勞根苦作便發則身百節皮膚無處不疼痛或熱筋急方取白柘東南行根一尺刮去上皮取中間皮以燒屑亦可細切搗之以酒服三方寸匕厚覆取汗日三服無酒以漿服之白柘是柘之無刺者也治卒連時不得眠方暮以新布火炙以熨目并蒸大豆更番囊貯枕枕冷復更易熱終夜常枕熱豆卽立愈也此二條本在雜治中並皆虛勞患此疾雖非乃飈急不卽治亦漸瘵人後方勞救爲力數倍今故略載諸法凡男女因積勞虛損或大病後不復常若四體沉滯骨肉疼酸吸吸少氣行動喘惙或小腹拘急腰背强痛心中虛悸咽乾唇燥面體少色或飲食無味陰陽廢弱悲憂慘戚多卧少起久者積年輕者才百日漸至瘦削五藏氣竭則難可復振治之湯方甘草二兩桂三兩芍藥四兩生薑五兩無者亦可用乾薑大棗二七枚以水九升煮取三升去滓內飴八兩分三服間日復作一劑復可將諸丸散耳黃蓍加二兩人參二兩爲佳若患痰滿及溏瀉可除飴耳姚同又方烏雌雞一頭治如食法以生地黃一斤切飴糖二升內腹內急縛銅器貯甑中蒸五升米久須臾取出食肉飲汁勿啖鹽三月三度作之姚云神良並止盜汗又方甘草一兩白朮四兩麥門冬四兩牡蠣二兩大棗二十枚膠三兩水八升煮取二升再服又方黃耆枸杞根白皮生薑三兩甘草麥門冬桂各二兩生米三合水九升煮取三升分四服又方羊腎一枚切朮一升以水一斗煮取九升服一升日二三服一日盡冬月分二日服日可再服又有建中腎𤃉湯法諸丸方乾地黃四兩茯苓薯蕷桂牡丹山茱萸各二兩附子澤瀉一兩搗蜜丸如梧子服七丸日三加至十丸此是張仲景八味腎氣丸方療虛勞不足大傷飲水腰痛小腹急小便不利又云長服卽去附子加五味子治大風冷又方苦參黃連菖蒲車前子忍冬枸杞子各一升搗蜜丸如梧子大服十丸日三服有腎氣大丸法諸散方朮一斤桂半斤乾地黃澤瀉茯苓各四兩搗篩飲服方寸匕日三兩服佳又方生地黃二斤麫一斤搗炒乾篩酒服方寸匕日三服附方枸杞子酒主補虛長肌肉益顏色肥健人能去勞熱用生枸杞子五升好酒二斗研搦匀碎浸七日漉去滓飲之初以三合爲始後卽任意飲之外臺祕要同食療補虛勞治肺勞止渴去熱風用天門冬去皮心入蜜煮之食後服之若曝乾入蜜丸尤佳亦用洗面甚佳又方雀卵白和天雄末菟絲子末爲丸空心酒下五丸主男子陰萎不起女子帶下便溺不利除疝瘕決癰腫續五藏氣經驗方暖精氣益元陽白龍骨遠志等分爲末煉蜜丸如梧桐子大空心臥時冷水下三十丸又方除盜汗及陰汗牡蠣爲末有汗處粉之經驗後方治五勞七傷陽氣衰弱腰脚無力羊腎蓯蓉羹法羊腎一對去脂膜細切肉蓯蓉一兩酒浸一宿刮去皺皮細切相和作羹葱白鹽五味等如常法事治空腹食之又方治男子女人五勞七傷下元久冷烏髭鬢一切風病四肢疼痛駐顏壯氣補骨脂一斤酒浸一宿放乾却用烏油麻一升和炒令麻子聲絕卽播去只取補骨脂爲末醋煮麪糊丸如梧桐子大早晨温酒鹽湯下二十丸又方固陽丹菟絲子二兩酒浸十日水淘焙乾爲末更入杜仲一兩蜜炙搗用薯蕷末酒煮爲糊丸如梧桐子大空心用酒下五十丸食醫心鏡益丈夫興陽理腿膝冷淫羊藿一斤酒一斗浸經三日飲之佳御藥院治脚膝風濕虛汗少力多疼痛及陰汗燒礬作灰細研末一匙頭沸湯投之淋洗痛處外臺祕要補虛勞益髓長肌悅顏色令人肥健鹿角膠炙搗爲末以酒服方寸匕日三服又治骨蒸桃仁一百二十枚去皮雙人留尖杵和爲丸平旦井花水頓服令盡服訖量性飲酒令醉仍須吃水能多最精隔日又服一劑百日不得食肉又骨蒸亦曰內蒸所以言內者必外寒內熱附骨也其根在五藏六府之中或皮燥而無光蒸作之時四肢漸細足胅腫者石膏十分研如乳法和水服方寸七日再以體涼爲度崔元亮海上方療骨蒸鬼氣取童子小便五大斗澄過青蒿五斗八月九月採帶子者最好細剉二物相和內好大釜中以猛火煎取三大斗去滓淨洗釜令乾再瀉汁安釜中以微火煎可二大斗卽取猪膽十枚相和煎一大斗半除火待冷以新瓷器貯每欲服時取甘草二三兩熟炙搗末以煎和搗一千杵爲丸空腹粥飲下二十丸漸增至三十丸止治脾胃虛弱不能飲食方第三十四治卒得食病似傷寒其人但欲卧七八日不治煞人方按其脊兩邊有䧟處正灸䧟處兩頭各七壯卽愈治食魚鱠及生肉住胸膈中不消化吐之又不出不可留多使成癥方朴消如半雞子一枚大黃一兩凡二物㕮咀以酒二升煮取一升去滓盡服之立消若無朴消者芒消代之皆可用治食生冷雜物或寒時衣薄當風或夜食便卧不卽消心腹煩痛脹急或連日不化方燒地令極熱卽敷薄薦莞席向卧覆取汗卽立愈也治食過飽煩悶但欲臥而腹脹方熬麫令微香搗服方寸匕得大麥生麫益佳無麫以糜亦得此四條本在雜治中皆食飲脾胃家事令胃氣充實則永無食患食宜先治其本故後疏諸法腹中虛冷不能飲食食輒不消羸瘦致之四肢尫弱百疾因此互生生地黃十斤搗絞取汁和好麵三斤以日曝乾更和汁盡止未食後服半合日三稍增至三合又方麫半斤麥蘖五升豉五合杏仁二升皆熬令黃香搗篩丸如彈服一枚後稍增之又方大黃芍藥各半斤搗末之芒消半斤以蜜三斤於銅器中湯上煎可丸如梧子大服七丸至十丸又方麴一斤乾薑十兩茱萸一升鹽一彈合搗蜜和如彈丸日三服又方术二斤麴一斤熬令黃搗蜜丸如梧子大服三十丸日三若大冷可加乾薑三兩若患腹痛加當歸三兩羸弱加甘草二兩并長將息徐以麴术法療產後心下停水仍須利之治脾胃氣弱水穀不得下遂成不復受食方大麻子三升大豆炒黃香合搗篩食前一二方寸匕日四五服佳矣治飽食便臥得穀勞病令人四肢煩重嘿嘿欲卧食畢輒甚方大麥蘖一升椒一兩并熬乾薑三兩搗末服方寸匕日三四服附方食醫心鏡治脾胃氣冷不能下食虛弱無力鶻突羹鯽魚半斤細切起作鱠沸豉汁熱投之著胡椒乾薑蒔蘿橘皮等末空腹食之近世方主脾胃虛冷不下食積久羸弱成瘵者温州白乾薑一物漿水煮令透心潤濕取出焙乾搗篩陳廩米煮粥飲丸如桐子一服三五十丸湯使任用其效如神食療治胃氣虛風熱不能食生薑汁半雞子殻生地黃汁少許蜜一匙頭和水三合頓服立差經驗方治脾元氣發歇痛不可忍者吳茱萸一兩桃仁一兩和炒令茱萸焦黑後去茱萸取桃仁去皮尖研細葱白三莖煨熟以酒浸温分二服經驗後方治脾胃進食茴香二兩生薑四兩同搗令匀淨器內濕紙蓋一宿次以銀石器中文武火炒令黃焦爲末酒丸如梧子大每服十丸至十五丸茶酒下外臺秘要治久患氣脹烏牛尿空心温服一升日一服氣散卽止治卒絕粮失食饑憊欲死方第三十五粒食者生人之所資數日乏絕便能致命本草有不饑之文而醫方莫言斯術者當以其涉在仙奇之境非庸俗所能遵故也遂使荒饉之歲餓尸橫路良可哀乎今略載其易爲者云若脫値奔竄在無人之郷及墮墜溪谷空井深冢之中四顧迥絕無可藉口者便須飲水服氣其服法如左閉口以舌料上下齒取津液而咽之一日得三百六十咽便佳漸習乃可至千自然不飢三五日小疲極過此便漸輕强復有食十二時六戊者諸法恐危逼之地不能曉方面及時之早晩故不論此若有水者卒無器便與左手貯祝曰丞掾吏之賜眞乏糧正赤黃行無過城下諸醫以自防畢三叩齒右手指三叩左手如此三遍便飲之後復有杯器貯水尤佳亦左手執右手以物扣之如法日服三升便不復飢卽差若可得游涉之地周行山澤間者但取松柏葉細切水服二合日中二三升便佳又掘取白茅根洗淨切服之此三物得行曝燥石上搗碎服服者食方寸辟一日又有大豆者取含光明帀熱以水服盡此則解十日赤小豆亦佳得熬二豆黃末服一二升辟十日草中有术天門冬麥門冬黃精萎蕤貝母或生或熟皆可單食樹木上自耳及檀榆白皮並可辟飢也若遇荒年穀貴無以充糧應須藥濟命者取稻米一斗淘汰之百蒸百曝搗日一餐以水得三十日都止則可終身不食日行三百里又方粳米一斗酒三升漬之出曝之又漬酒盡止出稍食之渴飲之辟三十日足一斛二升辟周年有守中丸藥法其疏諸米豆者是人間易得易作且不乖穀氣使質力無減耳恐肉穢之身忽然專御藥物或非所堪若可得頻管則自更按余所撰穀方中求也附方聖惠方絕穀昇仙不食法取松實搗爲膏酒調下三錢日三則不飢渴飲水勿食他物百日身輕日行五百里野人閑話云伏虎尊師煉松脂法十斤松脂五度以水煮過令苦味盡取得後每一斤煉了松脂入四兩茯苓末每晨水下一刀圭卽終年不食而後延齡身輕清爽抱朴子云漢成帝時獵者於終南山見一人無衣服身皆生黑毛跳坑越澗如飛乃密伺其所在合圍取得乃是一婦人問之言我
