front:
  text: 葛仙翁肘後備急方卷之三陛三
  hash: sha256:db45a2da3ff0ce7c0b13bd9621febcb9f17e3718252671f2062f7767a4e090c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0115_HFL_003-001a, image: hfl/1014/1014-004.png}
body:
  text: 治寒熱諸瘧方第十六治瘧病方鼠婦豆豉二七枚合搗令相和未發時服二丸欲發時服一丸又方青蒿一握以水二升漬絞取汁盡服之又方用獨父蒜於白炭上燒之末服方寸匕又方五月五日蒜一片去皮中破之刀割合容巴豆一枚去心皮內蒜中令合以竹挾以火炙之取可熱搗為三丸未發前服一丸不止復與一丸又方取蜘蛛一枚蘆管中密塞管中以綰頸過發時乃解去也又方日始出時東向日再拜畢正長跪向日叉手當閉氣以書墨注其管兩耳中各七注又丹書舌上言子日死畢復再拜還去勿顧安卧勿食過發時斷即差又方多煮豉湯飲數升令得大吐便差又方取蜘蛛一枚著飰中合丸吞之又方臨發時搗大附子下篩以苦酒和之塗背上又方鼠婦蟲子四枚各一以飴糖裏之丸服便斷即差又方常山搗下篩成末三兩真丹一兩白蜜和搗百杵丸如梧子先發服三丸中服三丸臨卧服三丸無不斷者常用效又方大開口度上下唇以繩度心頭灸此度下頭百壯又灸脊中央五十壯過發時灸二十壯又方破一大豆去皮書一片作日字一片作月字左手持日右手持月吞之立愈向日服之勿令人知也又方皂莢三兩去皮炙巴豆一兩去心皮搗丸如大豆大一服一枚又方巴豆一枚去心皮射菵如巴豆大棗一枚去皮合搗成丸先發各服一丸如梧子大也又方常山知母甘草麻黃等分搗蜜和丸如大豆服三丸比發時令過畢又方常山三兩甘草半兩水酒各半升合煮取半升先發時一服比發令三服盡又方常山三兩銼以酒三升漬二三日平旦作三合服欲嘔之臨發又服二合便斷舊酒亦佳急亦可煮又方常山三兩秫米三百粒以水六升煮取三升分之服至發時令盡又方若發作無常心下煩熱取常山二兩甘草一兩半合以水六升煮取二升分再服當快吐仍斷勿飲食老瘧久不斷者常山三兩鱉甲一兩炙升麻一兩附子一兩烏賊骨一兩以酒六升漬之小令近火一宿成服一合比發可數作又方藜蘆皂莢各一兩炙巴豆二十五枚并搗熬令黃依法搗蜜丸如小豆空心服一丸未發時一丸臨發時又一丸勿飲食又方牛膝莖葉一把切以酒三升服令微有酒氣不即斷更作不過三服而止又方末龍骨方寸匕先發一時以酒一升半煮三沸及熱盡服溫覆取汗便即效又方常山三兩甘草半兩知母一兩搗蜜丸至先發時服如梧子大十丸次服減七丸八丸後五六丸即差又方先發二時以炭火床下令脊腳極暖被覆過時乃止此治先寒後熱者又方先炙鱉甲搗末方寸匕至時令三服盡用火炙無不斷又方常山三兩搗篩雞子白和之丸空腹三十丸去發食久三十丸發時三十丸或吐或否也從服藥至過發時勿飲食治溫瘧不下食知母鱉甲炙常山各二兩地骨皮三兩切竹葉一升切石膏四兩以水七升煮二升五合分溫三服忌蒜熱麵猪魚治瘴瘧常山黃連豉熬各三兩附子二兩炮搗篩蜜丸空腹服四丸欲發三丸飲下之服藥後至過發時勿吃食若兼諸痢者黃連犀角各三兩牡蠣香豉各二兩并熬龍骨四兩搗篩蜜丸服四十丸日再服飲下無時節發者常山二兩甘草一兩半豉五合綿裹以水六升煮取三升再服快吐無問年月可治三十年者常山黃連各三兩酒一斗宿漬之曉以瓦釜煮取六升一服八合比發時令得三服熱當吐冷當利服之無不差者半料合服得勞瘧積久衆治不差者生長大牛膝一大虎口以水六升煮取二升空腹一服欲發一服禳一切瘧是日抱雄雞一時令作大聲無不差又方未發頭向南卧五心及額舌七處閉氣書鬼字咒法發日執一石於水濱一氣咒云眢眢圓圓行路非難捉取瘧鬼送與河官急急如律令投於水不得回顧治一切瘧烏梅丸方甘草二兩烏梅肉熬人參桂心肉從蓉知母牡丹各二兩常山升麻桃人去皮尖熬烏豆皮熬膜取皮各三兩桃人研欲丸入之搗篩蜜丸蘇屠臼搗一萬杵發日五更酒下三十丸平旦四十丸欲發四十丸不發日空腹四十丸晚三十丸無不差徐服後十餘日吃肥肉發之也見瘧白驢蹄二分熬大黃四分緑豆三分末砒霜二分光明砂半分雄黃一分搗蜜丸如梧子發日平旦冷水服二丸七日內忌油附方外臺祕要治瘧不痊乾薑高良薑等分為末每服一錢水一中盞煎至七分服聖惠方治久患瘧勞瘴等方用鱉甲三兩塗酥炙令黃去裙為末臨發時溫酒調下二錢七治瘧用桃人一百個去皮尖於乳鉢中細研成膏不得犯生水候成膏入黃丹三錢丸如梧子大每服三丸當發日面北用溫酒吞下如不飲酒井花水亦得五月五日午時合忌雞犬婦人見又方用小蒜不拘多少研極爛和黃丹少許以聚為度丸如雞頭大候乾每服一丸新汲水下面東服至妙治卒發癲狂病方第十七治卒癲疾方炙隂莖上宛宛中三壯得小便通則愈又方灸隂莖上三壯囊下縫二七壯又方灸兩乳頭三壯又灸足大指本聚毛中七壯灸足小指本節七壯又方取葶藶一升搗三千杵取白犬倒懸之以杖犬令血出承取以和葶藶末服如麻子大一丸三服取差又方莨菪子三升酒五升漬之出曝乾漬盡酒止搗服一錢匕日三勿多益狂又小品癲狂莨菪散莨菪子三升末之酒一升漬多日出搗之以向汁和絞去滓湯上煎令可丸服如小豆三丸日三口面當覺急頭中有蟲行者額及手足應有赤色處如此必是差候若未見服取盡矣又方末房葵溫酒服一刀圭至二三身潤又小不仁為候又方自縊死者繩燒三指撮服之凡癲疾發則仆地吐涎沫無知强掠起如狂反遺糞者難治治卒發狂方燒蝦蟆搗末服方寸七日三服之酒服又方卧其人著地以冷水淋其面為絡日淋之治卒狂言鬼語方針其足大拇指爪甲下入少許即止又方以甑帶急合縛兩手火灸左右脅握肘頭文俱起七壯須臾鬼語自道姓名乞去徐徐詰問乃解手耳凡狂發則欲走或自高貴稱神聖皆應備諸火炙乃得永差耳若或悲泣呻吟者此為邪魅非狂自依邪方治之近效方已生蠶紙作灰酒水任下差療風癲也附方斗門方治癲癇用艾於隂囊下穀道正門當中間隨年道灸之千金方治風癲百病麻人四升水六升猛火煮令牙生去滓煎取七合旦空心服或發或不發或多言語勿怪之但人摩手足須定凡進三劑愈又方治狂邪發無時披頭大叫欲殺人不避水火苦參以蜜丸如梧子大每服十丸薄荷湯下外臺祕要治風癇引脅牽痛發作則吐耳如蟬鳴天門冬去心皮曝乾搗篩酒服方寸七若人久服亦能長生廣利方治心熱風癇爛龍角濃研汁食上服二合日再服經驗後方治大人小兒久患風癇纏喉㗇嗽遍身風疹急中涎潮等此藥不太吐逆只出涎水小兒服一字瓜蒂不限多少細碾為末壯年一字十五已下老怯半字早晨井花水下一食須含沙糖一塊良久涎如水出年深涎盡有一塊如涎布水上如鑒矣涎盡食粥一兩日如吐多困甚即咽麝香湯一盞即止矣麝細斫溫水調下昔天平尚書覺昏眩即服之取涎有效明皇雜録云開元中有名醫紀朋者觀人顔色談笑知病深淺不待診脉帝聞之召於掖庭中看一宫人每日昃則笑歌啼號若狂疾而足不能履地朋視之曰此必因食飽而大促力頓仆於地而然乃飲以雲母湯令熟寐覺而失所苦問之乃言因太華公主載誕宫中大陳歌吹某乃主謳懼其聲不能清且長吃㹠蹄羹飽而當筵歌大曲曲罷覺胸中甚熱戲於砌臺上高而墜下久而方惺病狂足不能及地治卒得驚邪恍惚方第十八治人心下虛悸方麻黃半夏等分搗蜜丸服如大豆三丸日二稍增之半夏湯洗去滑乾治驚憂怖迫遙或驚恐失財或激憤惆悵致志氣錯越心行違僻不得安定者龍骨遠志茯神防風牡蠣各二兩甘草七兩大棗七枚以水八升煮取二升分再服日日作之取差又方茯苓乾地黃各四兩人參桂各三兩甘草二兩麥門冬一升去心半夏六兩洗滑生薑一斤以水一斗又殺烏雞取血及肝心煮三升分四服日三夜一其間少食無爽作三劑差又方白雄雞一頭治如食真珠四兩切薤白四兩以水三升煮取二升宿勿食旦悉食雞等及飲汁盡又有鎮心定志諸丸在大方中治卒中邪鬼恍惚振噤方灸鼻下人中及兩手足大指爪甲本令艾丸在穴上各七壯不止至十四壯愈此事本在雜治中治女人與邪物交通獨言獨笑悲思恍惚者末雄黃一兩以松脂二兩溶和虎爪攪令如彈丸夜內火籠中燒之令女人侵坐其上被急自蒙唯出頭耳一爾未差不過三劑過自斷也又方雄黃一兩人參一兩防風一兩五味子一升搗篩清旦以井水服方寸七三服差師往以針五枚內頭髻中狂病者則以器貯水三赤新布覆之橫大刀於上悉乃矜莊呼見其人其人必欲起走愼勿聽因取一噴之一呵視三通乃熟拭去水指彈額上近髮際問欲愈乎其人必不肯答如此二七彈乃答欲因杖針㓨鼻下人中近孔內側空停針兩耳根前宛宛動中停針又削鼻直上入髮際一寸橫針又刺鼻直上入乃具詰問憐憐醒悟則乃止矣若男女喜夢與鬼通致恍惚者鋸截鹿角屑酒服三指撮日三附方張仲景主心下悸半夏麻黃丸二物等分末蜜丸如小豆每服三丸日三簡要濟衆方每心藏不安驚悸善忘上鬲風熱化痰白石英一兩朱砂一兩同研為散每服半錢食後夜卧金銀湯調下心中客熱膀胱間連脅下氣妨常旦憂愁不樂兼心忪者取莎草根二大斤切熬令香以生絹袋貯之於三大斗無灰清酒中浸之春三月浸一日即堪服冬十月後即七日近暖處乃佳每空腹服一盞日夜三四服之常令酒氣相續以知為度若不飲酒即取莎草根十兩加桂心五兩蕪荑三兩和搗為散以蜜和為丸搗一千杵丸如梧子大每空腹以酒及薑蜜湯飲汁等下二十丸日再服漸加至三十丸以差為度治中風諸急方第十九治卒中急風悶亂欲死方灸兩足大指下橫文中隨年壯又别有續命湯若毒急不得行者內筋急者灸內踝外筋急者灸外踝上二十壯若有腫痹虛者取白斂二分附子一分搗服半刀圭每日可三服若眼上睛垂者灸目兩眥後三壯若不識人者灸季脅頭各七壯此脅小肋屈頭也不能語者灸第二槌或第五槌上五十壯又别有不得語方在後篇中矣又方豉茱萸各一升水五升煮取二升稍稍服若眼反口噤腹中切痛者上隂囊下第一橫理十四壯又别有服膏之方若狂走欲斫刺人或欲自殺罵詈不息稱鬼語者灸兩口吻頭赤肉際各一壯又灸兩肘屈中五壯又灸背脾中間三壯三日報炎三倉公祕法又應炙隂囊下縫三十壯又别有狂邪方若發狂者取車轂中脂如雞子熱溫淳苦酒以投脂甚攪令消服之令盡若心煩恍惚腹中痛滿或時絶而復蘇者取釜下土五升搗篩以冷水八升和之取汁盡服之口已噤者强開以竹筒灌之使得下人便愈甚妙若身體角弓反張四肢不隨煩亂欲死者清酒五升雞白矢一升搗篩合和揚之千遍乃飲之大人服一升日三少小五合差若頭身無不痛顛倒煩滿欲死者取頭垢如大豆大服之并囊貯大豆蒸熟逐痛處尉之作兩囊更番為佳若無豆亦可蒸鼠壤土尉若但腹中切痛者取鹽半斤熬令盡著口中飲熱湯二升得便吐愈又方附子六分生薑三兩切以水二升煮取一升分為再服若手足不隨方取青布燒作烟就小口器中熏痛處又方豉三升水九升煮取三升分三服又取豉一升微熬囊貯漬三升酒中三宿溫服微令醉為佳若身中有掣痛不仁不隨處者取乾艾葉一紏許丸之內瓦甑下塞餘孔唯留一目以痛處著甑目下燒艾以熏之一時間愈矣又方取朽木削之以水煮令濃熱灼灼爾以漬痛處效若口噤不開者取大豆五升熬令黃黑以酒五升漬取汁以物强發口而灌之畢取汗又方獨活四兩桂二兩以酒水二升煮取一升半分為三服開口與之溫時火炙令取汗若身直不得屈伸反覆者取槐皮黃白者切之以酒共水六升煮取二升去滓適寒溫稍稍服之又方刮枳樹皮取一升以酒一升漬一宿服五合至一升酒盡更作差若口喎僻者銜奏灸口吻口橫文間覺火熱便去艾即愈勿盡艾盡艾則太過若口左僻灸右吻右僻灸左吻灸炎手中指節上一丸喎右灸左也又有灸口喎法在此後也又方取空青末著口中入咽即愈姚同又方取蜘蛛子摩其偏急頰車上候視正則止亦可向火摩之又方牡蠣礬石附子竈中黃土分等搗末以三歲雄雞冠血和傅急上持水著邊視欲還正便急洗去藥不著更塗上便愈又方鱉甲烏頭塗之欲正即揭去之若四肢逆冷吐清汁宛轉啼呼者取桂一兩㕮咀以水三升煮取二升去滓適寒溫盡服若關節疼痛蒲黃八兩附子一兩炮合末之服一錢已日三稍增至方寸七若骨節疼煩不得屈伸近之則痛短氣得汗出或欲腫者附子二兩桂四兩术三兩甘草二兩水六升煮取三升分三服汗出愈也若中暴風白汗出如水者石膏甘草各等分搗酒服方寸七日移一丈輒一服也若中緩風四支不收者豉三升水九升煮取三升分為三服日二作之亦可酒漬煮飲之若卒中風癰身體不自收不能語迷昧不知人者陳元狸骨膏至要在備急藥方中附方頭風頭痛附經驗方治急中風目暝牙噤無門下藥者用此末子以中指點末揩齒三二十揩大牙左右其口自開始得下藥名開關散天南星搗為末白龍腦二件各等分研自五月五日午時合患者只一字至半錢簡要濟衆治中風噤不開涎潮吐方用皂角一挺去皮塗猪脂炙令黃色為末每服一錢匕非時溫酒服如氣實脉大調二錢匕如牙關不開用白梅揩齒口開即灌藥以吐出風涎差治中風不省人事牙關緊急者藜蘆一兩去蘆頭濃煎防風湯浴過焙乾碎切炒微褐色搗為末每服半錢溫水調下以吐出風涎為效如人行二里未吐再服又治膽風毒氣虛實不調昏沉睡多酸棗人一兩生用金挺蠟茶二兩以生薑汁塗炙令微焦搗羅為散每服二錢水七分煎六分無時溫服孫尚藥治卒中風昏昏若醉形體昏悶四肢不收或倒或不倒或口角似斜微有涎出斯須不治便為大病故傷人也此證風涎潮於上膈痹氣不通宜用急救稀涎散猪牙皂角四挺須是肥實不蚛削去黑皮晋礬一兩光明通瑩者二味同搗羅為細末再研為散如有患者可服半錢重者三字匕溫水調灌下不大嘔吐只是微微涎稀令出或一升二升當時惺惺次緩而調治不可便大段治恐過傷人命纍經效不能盡述梅師方療癰緩風手足嚲曳口眼喎斜語言蹇澀履步不正神驗烏龍丹川烏頭去皮臍了五靈脂各五兩右為末入龍腦麝香研令細勻滴水丸如彈子大每服一丸先以生薑汁研化次暖酒調服之一日兩服空心晚食前服治一人只三十丸服得五七丸便覺抬得手移得步十丸可以自聖惠方治一切風疾若能久服輕身明目黑髭駐顔用南燭樹春夏取枝葉秋冬取根皮揀擇細銼五升水五斗慢火煎取二斗去滓别於淨鍋中慢火煎如稀餳以瓷瓶貯溫酒下一匙日三服又方治風立有竒效用木天蓼一斤去皮細銼以生絹袋貯好酒二斗浸之春夏一七日秋冬二七日後開每空心日午初夜合溫飲一盞老幼臨時加減若長服日只每朝一盞又方治中風口喎巴豆七枚去皮爛研喎左塗右手心喎右塗左手心仍以暖水一盞安向手心須臾即便正洗去藥并頻抽掣中指又方治風頭旋用蟬殼二兩微炒為末非時溫酒下一錢七千金方治中風面目相引偏僻牙車急舌不可轉桂心以酒煮取汁故布蘸㩉病上正即正左喎㩉右右喎㩉左常用大效又方治三年中風不較者松葉一斤細切之以酒一斗煮取三升頓服取汗出立差又方立卒中風頭面腫杵杏人如膏傅之又方治頭面風眼瞤鼻塞眼暗冷泪杏人三升為末水煮四五沸洗頭冷汗盡三度差外臺祕要治卒中風口喎皂角五兩去皮為末三年大醋和右喎塗左右喎塗右乾及傅之差又治偏風及一切風桑枝銼一大升用今年新嫩枝以水一大斗煎取二大升夏用井中沉恐酢壞每日服一盞空心服盡又煎服終身不患偏風若預防風能服一大升佳又主風身體如蟲行鹽一斗水一石煎減半澄清溫洗三五度治一切風葛氏方治中風寒瘟直口噤不知人雞屎白一升熬令黃極熱以酒三升和攪去滓服千金翼方治熱風汗出心悶水和雲母服之不過再服立差篋中方治風頭及腦掣痛不可禁者摩膏主之取牛蒡莖葉搗取濃汁二升合無灰酒一升鹽花一匙頭火煎令稠成膏以摩痛處風毒散自止亦主時行頭痛摩時須極力令作熱乃速效冬月無葉用根代之亦可經驗後方治中風及壅滯以旋覆花洗塵令淨搗末煉蜜丸如梧子大夜卧以荼湯下五丸至七丸十丸又方解風熱疏積熱風壅消食化氣導血大解壅滯大黃四兩牽牛子四兩半生半熟為末煉蜜為丸如梧子大每服茶下一十丸如要微動吃十五丸冬月宜服并不搜攪人集驗方治風熱心躁口乾狂言渾身壯熱及中諸毒龍腦甘露丸寒水石半斤燒半日淨地坑內盆合四面濕土壅起候經宿取出入甘草末天竺黃各二兩龍腦二分糯米膏丸彈子大蜜水磨下食醫心鏡主中風心肺風熱手足不隨及風痹不任筋脉五緩恍惚煩躁熊肉一斤切如常法調和作腌臘空腹食之又主風攣拘急偏枯血氣不通利雁肪四兩煉濾過每日空心暖酒一杯肪一匙頭飲之同經曰治歷節諸風骨節疼痛晝夜不可忍者沒藥半兩研虎腦骨三兩塗酥炙黃色先搗羅為散與沒藥同研令細溫酒調二錢日三服大佳聖惠方治歷節風百節疼痛不可忍用虎頭骨一具塗酥炙黃槌碎絹袋貯用清酒二斗浸五宿隨性多少暖飲之妙內臺祕要方療歷節諸風百節酸痛不可忍松脂三十斤煉五十遍不能五十遍亦可二十遍用以煉酥三升溫和松脂三升熟攪令極稠旦空腹以酒服方寸七日三數食麵粥為佳愼血腥生冷酢物果子一百日差又方松節酒主歷節風四肢疼痛如解落松節二十斤酒五斗漬二七日服一合日五六服斗門方治白虎風所患不以積年久治無效痛不可忍者用腦麝楓柳皮不限多少細判焙乾浸酒常服以醉為度即差今之寄生楓樹上者方堪用其葉亦可製砒霜粉尤妙矣經驗後方治白虎風走注疼痛兩膝熱腫虎脛骨塗酥炙黑附子炮裂去皮臍各一兩為末每服溫酒調下二錢七日再服外臺祕要治癧瘍風及三年酢磨烏賊魚骨先布磨肉赤即傅之又治癧瘍風酢磨硫黃傅之止聖惠方治癧瘍風用羊蹄菜根於生鐵上以好醋磨旋旋刮取塗於患上未差更入硫黃少許同磨塗之集驗方治頸項及面上白駁浸淫漸長有似癬但無瘡可治鰻鱺魚脂傅之先拭剝上刮使燥痛後以魚脂傅之一度便愈甚者不過三度聖惠方治白駁用蛇蛻燒末醋調傅上佳又方治中風煩熱皮膚瘙癢用醍醐四兩每服酒調下宇匙集驗方治風氣客於皮膚瘙癢不已蜂房炙過蟬蛻等分為末酒調一錢七日三二服又方蟬蛻薄苛等分為末酒調一錢七日三服北夢瑣言云有一朝士見梁奉御診之曰風疾已深請速歸去朝士復見鄜州馬醫趙鄂者復診之言疾危與梁所說同矣曰只有一法請官人試吃消梨不限多少咀齕不及絞汁而飲到家旬日唯吃消梨頓爽矣千金方治頭風頭痛大豆三升炒令無聲先以貯一斗二升瓶一隻貯九升清酒乘豆熱即投於酒中蜜泥封之七日溫服孫真人方治頭風痛以豉湯洗頭避風即差千金翼治頭風搗葶藶子以湯淋取汁洗頭上又主頭風沐頭吳茱萸二升水五升煮取三升以綿染拭髮根聖惠方治頭風痛每欲天隂雨風先發者用桂心一兩為末以酒調如膏用傅頂上并額角陳藏器拾遺序云頭疼欲死鼻內吹消石末愈日華子云治頭痛水調决明子貼太陽穴又方决明子作枕勝黑豆治頭風明目也外臺祕要治頭疼欲裂當歸二兩酒一升煮取六合飲至再服孫兆口訣云治頭痛附子炮石膏煅等分為末入腦麝少許茶酒下半錢斗門方治卒頭痛白僵蠶碾為末去絲以熟水二錢七立差又方治偏頭痛用京芎細判酒浸服之佳博濟方治偏頭疼至靈散雄黃細辛等分研令細每用一字已下左邊疼吹入右鼻右邊疼吹入左鼻立效經驗後方治偏頭疼絶妙蓽撥為末令患者口中含溫水左邊疼令左鼻吸一字右邊疼令右鼻吸一字效集驗方治偏正頭疼穀精草一兩為末用白麵調攤紙花子上貼疼處乾又换偏頭疼方用生蘿卜汁一蜆殼仰卧注鼻左痛注左右痛注右左右俱注亦得神效外臺祕要頭風白屑如麩糠方堅截楮木作枕六十日一易新者治卒風瘖不得語方第二十治卒不得語方以苦酒煮瓜子薄頸一周以衣苞一日一夕乃解即差又方煮大豆煎其汁令如飴含之亦但濃煮飲之又方煮豉汁稍服之一日可美酒半升中攪分三服又方用新好桂削去皮搗篩三指撮著舌下咽之又方判穀枝葉酒煮熱灰中沫出隨多少飲之治卒失聲聲噎不出方橘皮五兩水三升煮取一升去滓頓服傾合服之又方濃煮苦竹葉服之差又方搗蘘荷根酒和絞飲其汁此本在雜治中又方通草乾薑附子茯神各一兩防風桂石膏各二兩麻黃一兩半白术半兩杏人三十枚十物搗篩為末蜜丸如大豆大一服七丸漸增加之凡此皆中風又有竹瀝諸湯甚多此用藥雖少而是將治所患一劑不差更應服之又方針大槌旁一寸五分又刺其下停針之又方礬石桂末綿裏如棗內舌下有唾出之又方燒馬勒銜鐵令赤內一升苦酒中破一雞子合和飲之若卒中冷聲嘶啞者甘草一兩桂二兩五味子二兩杏人三十枚生薑八兩切以水七升煮取二升為二服服之附方經驗後方治中風不語獨活一兩銼酒二升煎一升大豆五合炒有聲將藥酒熱投蓋良久溫服三合未差再服又方治中風不語喉中如拽鋸聲口中涎沫取藜蘆一分天南星一個去浮皮却臍子上陷一個坑子內入陳醋一橡斗子四面用火逼令黃色同一處搗再研極細用生蜜為丸如赤豆大每服三丸溫酒下聖惠方治中風以大聲咽喉不利以蘘荷根二兩研絞取汁酒一大盞相利令勻不計時候溫服半盞治風毒腳弱痹滿上氣方第二十一腳氣之病先起嶺南稍來江東得之無漸或微覺疼痹或兩脛小滿或行起忽弱或小腹不仁或時冷時熱皆其候也不即治轉上入腹便發氣則殺人治之多用湯酒摩膏種效既多不但一劑今只取單效用兼灸法取好豉一升三蒸三曝乾以好酒三斗漬之三宿可飲隨人多少欲預防不必待時便與酒煮豉服之腳弱其得小愈及更營諸方服之并及炎之次服獨活酒方獨活五兩附子五兩生用切以酒一斗漬經三宿服從一合始以微痹為度又方白礬石二斤亦可用鐘乳末附子三兩豉三升酒三斗漬四五日稍飲之若此有氣加蘇子二升也又方好硫黃三兩末之牛乳五升先煮乳水五升仍內硫黃煎取三升一服三合亦可直以乳煎硫黃不用水也卒無牛乳羊乳亦得又方法先煎牛乳三升令減半以五合輒服硫黃末一兩服畢厚蓋取汗勿令得風中間更一服暮又一服若己得汗不復更取但好將息將護之若未差愈後數日中亦可更作若長將亦可煎為丸北人服此治腳多效但須極好硫黃耳可預備之若脛己滿捏之沒指者但勒飲烏犢牛溺二三升使小便利息漸漸消當以銅器尿取新者為佳無烏牛純黃者亦可用之又方取牽牛子搗蜜丸如小豆大五丸取令小便利亦可正爾吞之其子黑色正似梂子核形巿人亦賣之又方三白根搗碎酒飲之又方酒若水煮大豆飲其汁又食小豆亦佳又生研胡麻酒和服之差又方大豆三升水一斗煮取九升內清酒九升又煎取九升稍稍飲之小便利則腫歇也其有風引白雞竹瀝獨活諸湯及八風石斛狗脊諸散并别在大方中金芽酒最為治之要今載其方蜀椒茵芋金牙細辛菵草乾地黃防風附子地膚蒴藋升麻各四兩人參三兩羌活一斤牛膝五兩十四物切以酒四斗漬七日飲二三合稍加之亦治口不能言腳屈至良又有側子酒亦效若田舍貧家此藥可釀拔葜及松節松葉皆善拔葜淨洗銼之一斛以水三斛煮取九斗以漬麯及煮去滓取一斛漬飯釀之如酒法熟即取飲多少任意可頓作三五斛若用松節葉亦依准此法其汁不厭濃也患腳屈積年不能行腰脊攣痹及腹內緊結者服之不過三五劑皆平復如無釀水邊商陸亦佳其炎法孔穴亦甚多恐人不能悉皆知處今止疏要者必先從上始若直炎腳氣上不泄則危矣先炎大椎在項上大節高起者炎其上面一穴耳若氣可先炎百會五十壯穴在頭頂凹中也肩井各一百壯在兩肩小近頭凹處指捏之安令正得中穴耳次炎膻中五十壯在胸前兩邊對乳胸厭骨解間指按覺氣翕翕爾是也一云正胸中一穴也次炙巨闕在心厭尖尖四下一寸以赤度之凡炎以上部五穴亦足治其氣若能炎百會風府胃管及五藏腧則益佳視病之寬急耳諸穴出灸經不可具載之次乃炎風巿百壯在兩髀外可平倚垂手直掩髀上當中指頭大筋上捻之自覺好也次炎三里二百壯以病人手橫掩下并四指名曰一夫指至膝頭骨下指中節是其穴附脛骨外邊捻之凹凹然也次炙上廉一百壯又炎三里下一夫次炎下廉一百壯又在上廉下一夫次炎絶骨二百壯在外踝上三寸餘指端取踝骨上際屈指頭四寸便是與下廉頗相對分間二穴也此下一十八穴并是要穴餘伏兔犢鼻穴凡炎此壯數不必頓畢三日中報灸合盡又方孔公孽二斤石斛五兩酒二斗浸服之附方斗門方治卒風毒腫氣急痛以柳白皮一斤銼以酒煮令熱帛裹尉腫上冷再煮易之甚妙也聖惠方治走注風毒疼痛用小芥子末和雞子白調傅之經驗後方治風毒骨髓疼痛芍藥二分虎骨一兩炙為末夾絹袋貯酒三升漬五日每服二合日三服食醫心鏡除一切風濕痹四肢拘攣蒼耳子三兩搗末以水一升半煎取七合去滓呷之又治筋脉拘攣久風濕痹下氣除骨中邪氣利腸胃消水腫久服輕身益氣力薏苡人一升搗為散每服以水二升煮兩匙末作粥空腹食又主補虛去風濕痹醍醐二大兩暖酒一杯和醍醐一匙飲之經驗方治諸處皮裏面痛何首烏末薑汁調成膏痛處以帛子裏之用火炙鞋底尉之妙孫真人方主腳氣及上氣取鯽魚一赤長者作膾食一兩頓差千金翼治腳氣衝心白礬二兩以水一斗五升煎三五沸浸洗腳良廣利方治腳氣衝煩悶亂不識人大豆一升水三升濃煮取汁頓服半升如未定可更服半升即定蘇恭云凡患腳氣每旦任意飽食午後少食日晚不食如饑可食豉粥若暝不消欲致霍亂者即以高良薑二兩打碎以水三升煮取一升頓服盡即消待極飢乃食一飽薄粥其藥唯極飲之良若卒無高良薑母薑一兩代之以清酒一升煮令極熟利滓食之雖不及高良薑亦大效矣唐本注云腳氣煮葒草濃汁漬之多差簡要濟衆治腳氣連腿腫滿久不差方黑附子一兩去皮臍生用搗為散生薑汁調如膏塗傅腫上藥乾再調塗之腫消為度治服散卒發動困篤方第二十二凡服五石護命更生及鍾乳寒食之散失將和節度皆致發動其病無所不為若發起倉卒不以漸而至者皆是散勢也宜及時救解之若四肢身外有諸一切痛違常者皆即冷水洗數百遍熱有所衝水漬布巾隨以搨之又水漬冷石以尉之行飲暖酒逍遙起行若心腹內有諸一切疾痛違常煩悶惛恍者急解之取冷熱取溫酒飲一二升漸漸稍進覺小寬更進冷食其心痛者最急若肉冷口已噤但折齒下熱酒差若腹內有結堅熱癖使衆疾者急下之栀子十四枚豉五合水二升煮取一升頓服之熱甚已發瘡者加黃芩二兩癖食猶不消惡食畏冷者更下好大黃末半升芒消半升甘草二兩半夏黃芩芫花各一分搗為散藏密器中欲服以水八升先煮大棗二十枚使爛取四升去棗乃內藥五方寸匕攪和著火上三上三下畢分三服旦一服便利者亦可停若不快更一服下後即作酒粥食二升次作水飧進之不可不即食胃中空虛得熱入便煞人矣得下後應長將備急大黃葶藶豉各一合杏人巴豆三十枚搗蜜丸如胡豆大旦服二枚利者減之痞者加之解散湯方丸散酒甚多大要在於將冷及數自下惟取通利四體欲常勞動又不可失食致飢及餿飯臭魚肉兼不可熱飲食厚衣向火冒暑遠行亦不宜過風冷大都每使於體粗堪任為好若已病發不得不强自澆耳所將藥每以解毒而冷者為宜服散覺病去停住後二十日三十日便自服常若留結不消猶致煩熱皆是失度則宜依法防治此法乃多為貴樂人用而賤苦者服之更少發動當以得寒勞故也恐脫在危急故略載此數條以備匆卒餘具大方中附方聖惠方治乳石發動壅熱心悶吐血以生刺薊搗取汁每服三合入蜜少許攪勻服之食療云若丹石熱發菰根和鯽魚煮作羹食之三兩頓即便差耳治卒上氣咳嗽方第二十三治卒上氣鳴息便欲絶方搗韭絞汁飲一升許立愈又方細切桑根白皮三升生薑三兩吳茱萸半升水七升酒五升煮三沸去滓盡服之一升入口則氣下千金不傳方又方茱萸二升生薑三兩以水七升煮取二升分為三服又方麻黃四兩桂甘草各二兩杏人五十枚熬之搗為散溫湯服方寸七日三又方末人參服方寸七日五六氣嗽不問多少時者服之便差方陳橘皮桂心杏人去尖皮熬三物等分搗蜜丸每服飯後須茶湯下二十丸忌生葱史侍郎傳治卒厥逆上氣又兩心脅下痛滿淹淹欲絶方溫湯令灼灼爾以漬兩足及兩手數易之也此謂奔豚病從卒驚怖憂追得之氣下縱縱衝心胸臍間築築發動有時不治煞人諸方用藥皆多又必須煞豚唯有一湯但可辦耳甘草二兩人參二兩桂心二兩茱萸一升生薑一斤半夏一升以水一斗煮取三升分三服此藥宜預蓄得病便急合之又方麻黃二兩杏人一兩熬令黃搗散酒服方寸七數服之差治卒乏氣氣不復報肩息方乾薑三兩㕮咀以酒一升漬之每服三合日三服又方度手拇指折度心下灸三壯差又方麻黃三兩先煎去沫甘草二兩以水三升煮取一升半分三服差後欲令不發者取此二物并熬杏人五十枚蜜丸服如桐子大四五丸日三服差又方麻黃二兩桂甘草各一兩杏人四十枚以水六升煮取二升分三服此三方并各小投杯湯有氣疹者亦可以藥搗作散長將服之多冷者加乾薑三兩多痰者加半夏三兩治大走馬及奔趁喘乏便飲冷水因得上氣發熱方用竹葉三斤橘皮三兩以水一斗煮取三升去滓分為三服三日一劑良治大熱行極及食熱餅竟飲冷水過多衝咽不即消仍以發氣呼吸喘息方大黃乾薑巴豆等分末服半錢七若得吐下即愈若猶覺停滯在心胸膈中不利者瓜蒂二分杜衡三分人參一分搗篩以湯服一錢七日二三服效治肺痿咳嗽吐涎沫心中溫溫烟燥而不渴者生薑五兩人參二兩甘草二兩大棗十一枝水三升煮取一升半分為再服又方甘草二兩以水三升煮取一升半分再服又方生天門冬搗取汁一斗酒一斗飴一升紫苑四合銅器於湯上煎可丸服如杏子大一丸日可三服又方甘草二兩乾薑三兩棗十二枚水三升煮取一升半分為再服卒得寒冷上氣方乾蘇葉三兩陳橘皮四兩酒四升煮取一升半分為再服治卒得咳嗽方用釜月下土一分豉七分搗為丸梧子大服十四丸又方烏雞一頭治如食法以好酒漬之半日出雞服酒一云苦酒一斗煮白雞取三升分三服食雞肉莫與鹽食則良又方從大椎下第五節下六節上空間炎一處隨年并治上氣又方炎兩乳下黑白肉際各百壯即愈亦治上氣炎胸前對乳一處須隨年壯也又方桃人三升去皮搗著器中密封頭蒸之一炊傾出曝乾絹袋貯以內二斗酒中六七日可飲四五合稍增至一升喫之又方飴糖六兩乾薑六兩末之豉二兩先以水一升煮豉三沸去滓內飴糖消內乾薑分為三服又方以飴糖雜生薑屑蒸三斗米下食如彈子丸日夜十度服又方猪腎二枚細切乾薑三兩末水七升煮二升稍稍服覆取汗又方炙烏心食之佳又方生薑汁百部汁和同合煎服二合又方百部根四兩以酒一斗漬再宿火暖服一升日再服又方椒二百粒搗末之杏人二百枚熬之棗百枚去核合搗令極熟稍稍合如棗許大則服之又方生薑三兩搗取汁乾薑屑三兩杏人一升去皮熬合搗為丸服三丸日五六服又方芫花一升水三升煮取一升去滓以棗十四枚煎令汁盡一日一食之三日訖又方熬搗葶藶一兩乾棗三枚水三升先煮棗取一升去棗內葶藶煎取五合大人分三服小兒則分為四服又華他五嗽丸炙皂莢乾薑桂等分搗蜜丸如桐子服三丸日三又方錯取松屑一分桂二分皂莢二兩炙去皮子搗蜜丸如桐子大服十五丸小兒五丸日一二服又方屋上白蜆殼搗末酒服方寸匕又方末浮散石服亦蜜丸又方猪𦚟一具薄切以苦酒煮食令盡不過二服又方芫花二兩水二升煮四沸去滓內白糖一斤服如棗大勿食鹹酸亦治久咳嗽者治久咳嗽上氣十年二十年諸藥治不差方猪𦚟三具棗百枚酒三升漬數日服三二合加至四五合服之不久差又方生龜一隻著坎中就溺之令沒龜死漬之三日出燒末以醉酒一升和屑如乾飯頓服之須臾大吐嗽囊出則差小兒可服半升又方生龜三治如食法去腸以水五升煮取三升以漬麯釀秫米四升如常法熟飲二升令盡此則永斷又方蝙蝠除頭燒令焦末飲服之附方孫真人方治咳嗽皂莢燒研碎二錢匕豉湯下之十全博救方治咳嗽天南星一個大者炮令裂為末每服一大錢水一盞生薑三片煎至五分溫服空心日午臨卧時各一服篋中方治咳嗽含膏丸曹州葶藶子一兩紙襯熬令黑知母貝母各一兩三物同搗篩以棗肉半兩别銷沙糖一兩半同入藥中和為丸大如彈丸每服以新綿裹一丸含之徐徐咽津甚者不過三丸今醫亦多用崔知悌療久嗽熏法每旦取款冬花如雞子許少蜜拌花使潤內一升鐵鐺中又用一瓦碗鑽一孔孔內安一小竹筒筆管亦得其筒稍長作碗鐺相合及撞筒處皆麵泥之勿令漏氣鐺下著炭少時款冬烟自從筒出則口含筒吸取煙咽之如胸中少悶須舉頭即將指頭捻筒頭勿使漏烟氣吸烟使盡止凡如是五日一為之待至六日則飽食羊肉餺飥一頓永差勝金方治久嗽暴嗽勞嗽金粟丸葉子雌黃一兩研細用紙筋泥固濟小合子一箇令乾勿令泥厚將藥入合子內水調赤石脂封合子口更以泥封之候乾坐合子於地上上面以末入窖瓦坯子彈子大擁合子令作一大子上用炭十斤簇定頂上著火一尉斗籠起令火從上漸熾候火消三分去一看瓦坯通亦别去火候冷開合子取藥當如鏡面光明紅色入乳鉢內細研湯浸氷餅心為丸如粟米大每服三丸五丸甘草水服服後睡良久妙崔元亮海上方療嗽單驗方取好梨去核搗取汁一茶碗著椒四十粒煎一沸去滓即內黑餳一大兩消訖細細含咽立定孟詵云卒咳嗽以梨一顆刺作五十孔每孔內以椒一粒以麵裹於熱火灰中煨令熟出停冷去椒食之又方梨一顆去核內酥蜜麵裹燒令熟食之又方取梨肉內酥中煎停冷食之又方搗梨汁一升酥一兩蜜一兩地黃汁一升緩火煎細細含咽凡治嗽皆須待冷喘息定後方食熱食之反傷矣冷嗽更極不可救如此者可作羊肉湯餅飽食之便卧少時千金方治小兒大人逆上氣杏人三升去皮尖炒令黃杵如膏蜜一升分為三分內杏人杵令得所更內一分杵如膏又內一分杵熟止先食含之咽汁楊氏産乳療上氣急滿坐卧不得方鱉甲一大兩炙令黃細搗為散取燈心一握水二升煎取五合食前服一錢匕食後蜜水服一錢七劉禹錫傳信方李亞治一切嗽及上氣者用乾薑須是臺州至好者皂莢炮去皮子取肥大無孔者桂心紫色辛辣者削去皮三物並别搗下篩了各稱等分多少任意和合後更搗篩一遍煉白蜜和搜又搗一二十杵每飲服三丸丸稍加大如梧子不限食之先後嗽發即服日三五服噤食葱油鹹腥熱麵其效如神劉在淮南與李同幕府李每與人藥而不出方或譏其吝李乃情話曰凡人患嗽多進冷藥若見此方用藥熱燥即不肯服故但出藥多效試之信之簡要濟衆治肺氣喘嗽馬兜零二兩只用裏面子去却殼酥半兩入碗內拌和勻慢火炒乾甘草一兩炙二味為末每服一錢水一盞煎六分溫呷或以藥末含咽津亦得治痰嗽喘急不定桔梗一兩半搗羅為散用童子小便半升煎取四合去滓溫服楊文蔚治痰嗽利胸膈方栝樓肥實大者割開子淨洗捶破刮皮細切焙乾半夏四十九個湯洗十遍槌破焙搗羅為末用洗栝樓熟水并瓤同熬成膏研細為丸如梧子大生薑湯下二十丸深師方療久咳逆上氣體腫短氣脹滿晝夜倚壁不得卧常作水雞聲者白前湯主之白前二兩紫苑半夏洗各三兩大戟七合切四物以水一斗漬一宿明日煮取三升分三服禁食羊肉餳大佳梅師方治久患㗇呷咳嗽喉中作聲不得眠取白前搗為末溫酒調二錢七服又方治上氣咳嗽呷呀息氣喉中作聲唾黏以藍實葉水浸良久搗絞取汁一升空腹頓服須臾以杏人研取汁煮粥食之一兩日將息依前法更服吐痰盡方差兵部手集治小兒大人咳逆短氣胸中吸吸咳出涕唾嗽出臭膿涕粘淡竹瀝一合日三五服大人一升聖惠方治傷中筋脉急上氣咳嗽用棗二十枚去核以酥四兩微火煎入棗肉中滴盡酥常含一枚微微咽之經驗後方定喘化涎猪蹄甲四十九個淨洗控乾每個指甲內半夏白礬各一字入罐子內封閉勿令烟出火煅通赤去火細研入麝香一錢匕人有上喘咳用糯米飲下小兒半錢至妙靈苑方治咳嗽上氣喘急嗽血吐血人參好者搗為末每服三錢七雞子清調之五更初服便睡去枕仰卧只一服愈年深者再服忌腥鹹鮓醬麵等并勿過醉飽將息佳席延嘗治虛中有熱咳嗽膿血口舌咽乾又不可服凉藥好黃耆四兩甘草一兩為末每服三錢如茶點羹粥中亦可服杜壬方治上焦有熱口舌咽中生瘡嗽有膿血桔梗一兩甘草二兩右為末每服二錢水一盞煎六分去滓溫服食後細呷之亦治肺壅經驗方治咳嗽甚者或有吐血新鮮桑根白皮一斤米泔浸三宿淨刮上黃皮銼細入糯米四兩焙乾一處搗為末與服米飲調下一兩錢斗門方治肺破出血忽嗽血不止者用海犀膏一大片於火上炙令焦黃色後以酥塗之又炙再塗令通透可碾為末用湯化三大錢匕放令服之即血止水膠是也大驗食醫心鏡主上氣咳嗽胸膈痞滿氣喘桃人三兩去皮尖以水一升研取汁和粳米二合煮粥食之又治一切肺病咳嗽膿血不止好酥五斤熔三遍停取凝當出醍醐咫一合差又王積年上氣咳嗽多痰喘促唾膿血以蘿卜子一合研煎湯食上服之治卒身面腫滿方第二十四治卒腫滿身面皆洪大方大鯉一頭醇酒三升煮之令酒乾盡乃食之勿用醋及鹽豉他物雜也不過三兩服差又方炎足內踝下白肉三壯差又方大豆一斗熟煮漉飲汁及食豆不過數度必愈小豆尤佳又方取雞子黃白相和塗腫處乾復塗之又方杏葉銼煮令濃及熱漬之亦可服之又方車下李核中人十枚研令熟粳米三合研以水四升煮作粥令得二升服之三作加核也又方大豆一升以水五升煮二升去豆內酒八升更煮九升分三四服腫差後渴愼不可多飲又方黃牛溺頓服三升即覺減未消更服之又方章陸根一斤刮去皮薄切之煮令爛去滓內羊肉一斤下葱豉鹽如食法隨意令之腫差後亦宜作此亦可常搗章陸與米中半蒸作餅子食之又方猪腎一枚分為七臠甘遂一分以粉之火炙令熟一日一食至四五當覺腹脅鳴小便利不爾更進盡熱到去皮食之須盡為佳不爾再之勿食鹽又方切章陸二升以酒三升漬三宿服五合至一升日三服之凡此滿或是虛氣或是風冷氣或是水飲氣此方皆治之治腫入腹苦滿急害飲食方大戟烏翅末各二兩搗篩蜜和丸丸如桐子大旦服二丸當下漸退更取令消乃止之又方葶藶子十兩椒目三兩苓三兩吳茱萸二兩搗蜜和丸如桐子服十丸日三服又方鯉魚一頭重五斤者以水二斗煮取斗半去魚澤漆五兩茯苓三兩桑根小皮切三升澤瀉五兩又煮取四升分四服服之小便當利漸消也又方皂莢剝炙令黃銼三升酒一斗漬石器煮令沸服一升日三服盡更作若腫偏有所起處者以水和灰以塗之燥復更塗又方赤豆麻子合搗以傅腫上又方水煮巴豆以布沾以拭之姚云巴豆三十枚合皮㕮咀水五升煮取二升日五拭腫上隨手即減勿近目及隂療身體暴腫如吹者若但是腫者銼葱煮令爛以漬之日二四度又方兔絲子一升酒五升漬二三宿服一升日三服差若腫從腳起稍上進者入腹則煞人治之方小豆一斛煮令極爛得四五斗汁溫以漬膝己下日二為之數日消盡若已入腹者不復漬但煮小豆食之莫雜吃飯及魚鹽又專飲小豆汁無小豆大豆亦可用如此之病十死一生急救之又方削橢或桐木煮取汁以漬之并飲少許加小豆妙又方生猪肝一具細切頓食之勿與鹽乃可用苦酒妙又方煮豉汁飲以滓傅腳附方備急方療身體暴腫滿榆皮搗屑隨多少雜米作粥食小便利楊氏産乳療通體遍身腫小便不利猪苓五兩搗篩煎水三合調服方寸七加至二七食醫心鏡主氣喘促浮腫小便澀杏人一兩去尖皮熬研和米煮粥極熟空心吃二合葛仙翁肘後備急方卷之三
