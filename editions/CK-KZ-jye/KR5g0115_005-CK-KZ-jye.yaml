seq: 5
front:
  text: 是秦之宫人關東賊至秦王出降驚走入山飢無所食洎欲餓死有一老公教我喫松柏葉實初時苦澁後稍便喫遂不復飢冬不寒夏不熱此女是秦人至成帝時三百餘載也重刊道藏輯要
  hash: sha256:fe5ab3017777940f7a0d616743952b6cc02ed689ba45ced16e4d6ebc0bf0fc84
  markers:
  - {type: head, offset: 74, content: '葛仙翁肘後備急方¶<md:KR5g0115_HFL_004-051b>¶¶¶¶¶¶¶¶¶¶¶<md:KR5g0115_HFL_005-001a>', id: KR5g0115_CK-KZ-jye_005-h1, level: 1}
body:
  text: 隱居効方治羊疽瘡有蟲癢附子八分藜蘆二分末傅之蟲自然出葛氏療奶發諸癰疽發背及乳方比灸其上百壯又方熬粢粉令黑雞子白和之塗縛上以貼癰小穿練上作小口泄毒氣燥易之神祕又方釜底上搗以雞子中黃和塗之加少豉彌良又方搗黃檗末篩雞子白和厚塗之乾復易差又方燒鹿角搗末以苦酒和塗之佳又方於石上水磨鹿角取濁汁塗癰上乾復易隨手消又方末半夏雞子白和塗之水磨傅並良又方神効水磨出小品又方醋和茱萸若搗薑或小蒜傅之並良一切惡毒腫蔓菁根一大握無以龍葵根代之乳頭香一兩光明者黃連一兩宣州者杏仁四十九枚去尖用柳木取三四錢白色者各細剉搗三二百杵團作餅子厚三四分可腫處大小貼之乾復易立散別貼膏藥治瘡處佳葛氏療癰發數十處方取牛矢燒搗末以雞子白和塗之乾復易神効又方用鹿角桂雞屎別搗燒合和雞子白和塗乾復上又癰已有膿當使壞方取白雞兩翅羽肢各一枚燒服之卽穿姚同又方吞薏苡子一枚勿多又方以苦酒和雀矢塗癰頭上如小豆葛氏若已結癰使聚不更長方小豆末塗若雞子白和尤佳卽差又方芫花末膠汁和貼上燥復易化爲水若潰後膿血不止急痛取生白楸葉十重貼上布帛寬縛之乳腫桂心甘草各二分烏頭一分炮搗爲末和苦酒塗紙覆之膿化爲水則神効葛氏婦女乳癰妬腫削柳根皮熟搗火温帛囊貯熨之冷更易大良又方取研米槌煮令沸絮中覆乳以熨上當用二枚牙熨之數十迴止姚云神効乳癰方大黃菵草伏龍肝竈下黃土也生薑各二分先以三物搗篩又合生薑搗以醋和塗乳痛則止極驗劉涓子不用生薑用生薑四分分等余比見用鯽魚立驗此方小品佳姚氏乳癰大黃鼠糞濕者黃連各一分二物爲末鼠矢更搗以黍米粥清和傅乳四邊痛卽止愈無黍米用粳米並得又方牛馬矢傅並佳此並消去小品妬方黃芩白歛芍藥分等末篩漿服一錢匕日五服若右乳結者將左乳汁服左乳結者將右乳汁服散消根姚同此方必愈姚方搗生地黃傅之熱則易小豆亦佳又云二三百眾療不差但堅紫色者用前柳根皮法云熬令温熨腫一宿愈凡乳汁不得泄內結名妬乳乃急於癰徐玉療乳中瘰癧起痛方大黃黃連各三兩水五升煮取一升二合分三服得下卽愈葛氏卒毒腫起急痛方蕪菁根大者削去上皮熟搗苦酒和如泥煑三沸急攪之出傅腫帛裹上日再三易用子亦良又方燒牛矢末苦酒和傅上乾復易又方水和石灰封上又苦酒磨升麻若青木香或紫檀以磨傅上良又方取水中萍子草熟搗以傅上又已入腹者麝香熏陸香青木香雞舌香各一兩以水四升煑取二升分爲再服若惡核腫結不肯散者呉茱萸小蒜分等合搗傅之丹蒜亦得又方搗鯽魚以傅之若風腫多癢按之隨手起或隱疹方但令痛以手摩捋抑按日數度自消又方以苦酒磨桂若獨活數傅之良身體頭面忽有暴腫處如吹方巴豆三十枚連皮碎水五升煑取三升去滓綿沾以拭腫上趁手消勿近口皮肉卒腫起狹長赤痛名䐔鹿角五兩白歛一兩牡蠣四兩附子一兩搗篩和苦酒塗帛上燥復易小品癰結腫堅如石或如大核色不變或作石癰不消鹿角八兩燒作灰白歛二兩麤理黃色磨石一斤燒令赤三物搗作末以苦酒和泥厚塗癰上燥更塗取消止內服連翹湯下之姚方云燒石令極赤內五升苦酒中復燒又內苦酒中令減半止搗石和藥先用所餘苦酒不足添上用姚方若發腫至堅而有根者名曰石癰當上灸百壯石子當碎出不出者可益壯癰疽瘤石癰結筋瘰癧皆不可就針角針角者少有不及禍者也又癰未潰方菵草末和雞子白塗紙令厚貼上燥復易得痛自差癰腫振焮不可忍方大黃搗篩以苦酒和貼腫上燥易不過三卽差減不復作膿自消除甚神驗也癰腫未成膿取牛耳垢封之卽愈若惡肉不盡者食肉藥食去以膏塗之則愈食肉方取白炭灰荻灰等分煎令如膏此不宜預作十日則歇并可與去黑子此大毒若用効驗本方用法凡癰腫用栝蔞根赤小豆皆當內苦酒中五宿出熬之畢搗爲散以苦酒和塗紙上貼腫驗隱居効方消癰腫白歛二分藜蘆一分爲末酒和如泥貼上日三大良疽瘡骨出黃連牡蠣各二分爲末先鹽酒洗後傅葛氏忽得熛疽著手足肩累累如米豆刮汁出急療之熬蕪菁熟搗裹以展轉其上日夜勿止若發疽於十指端及色赤黑甚難療宜按大方非單方所及若骨疽積年一捏一汁出不差熬末膠飴勃瘡上乃破生鯉魚以搨之如炊頃刮視有小蟲出更洗傅藥蟲盡則便止差姚方云熛疽者肉中忽生一黤子如豆粟劇者如梅李大或赤或黑或白或青其黶有核核有深根應心小久四面悉腫疱黯黕紫黑色能爛壞筋骨毒入臟腑煞人南方人名爲搨著毒著厚肉處皆割之亦燒鐵令赤烙赤三上令焦如炭亦灸黯炮上百壯爲佳早春酸摹葉薄其四面防其長也飲葵根汁犀角汁升麻汁折其熱內外療依丹毒法也劉涓子療癰疽發壞出膿血生肉黃耆膏黃耆芍藥大黃當歸芎藭獨活白芷薤白各一兩生地黃三兩九物切猪膏二升半煎三上三下膏成絞去滓傅充瘡中摩左右日三又丹癰疽始發浸淫進長并少小丹㩉方升麻黃連大黃芎藭各二兩黃芩芒消各三兩當歸甘草炙羚羊角各一兩九物㕮咀水一斗三升煑取五升去滓還內鐺中芒消上杖攪令成膏適冷熱貼帛搨腫上數度便隨手消散王練甘林所秘方愼不可近陰又熛瘡浸淫多汁日就浸大胡粉散胡粉熬甘草炙䕡茹黃連各二分四物搗散篩以粉瘡日三極驗諸疽瘡膏方蠟亂髮礬石松脂各一兩猪膏四兩五物先下髮髮消下礬石礬石消下松脂松脂消下蠟蠟消下猪膏塗瘡上赤龍皮湯洗諸敗爛瘡方槲樹皮切三升以水一斗煑取五升春夏冷用秋冬温用洗乳瘡及諸敗瘡洗了則傅膏發背上初欲𤻞便服此大黃湯大黃甘草炙黃芩各二兩升麻二兩栀子一百枚五物以水九升煑取三升半服得快下數行便止不下則更服療發背及婦人發乳及腸癰木占斯散木占斯厚朴炙甘草炙細辛栝樓防風乾薑人參桔梗敗醬各一兩十物搗爲散酒服方寸匕晝七夜四以多爲善病在上常吐在下膿血此謂腸癰之屬其癰腫卽不痛長服療諸疽痔若瘡已潰便早愈發背無有不療不覺腫去時長服去敗醬多療婦人發乳諸產癥瘕益良并劉涓子方劉涓子療癰消膿木占斯散方木占斯桂心人參細辛敗醬乾薑厚朴炙甘草炙防風桔梗各一兩十物爲散服方寸匕入咽覺流入瘡中若癰疽灸不發壞者可服之瘡末壞去敗醬此藥或時有癰令成水者癰腫瘰癧核不消白薟薄方白薟黃連大黃黃芩菵草赤石脂吴茱萸芍藥各四分八物搗篩以雞子白和如泥塗故帛上薄之開小口乾卽易之差發背欲死者取冬瓜截去頭合瘡上瓜當爛截去更合之瓜未盡瘡已歛小矣卽用膏養之又方伏龍肝末之以酒調厚傅其瘡口乾卽易不日平復又方取梧桐子葉鏊上煿成灰絹羅蜜調傅之乾卽易之癰腫雜効方療熱腫以家芥子并柏葉搗傅之無不愈大驗得山芥更妙又搗小芥子末醋和作餅子貼腫及瘰癧數看消卽止恐損肉此療馬附骨良又方燒人糞作灰頭醋和如泥塗腫處乾數易大驗又方取黃色雄黃雌黃色石燒熱令赤以大醋沃之更燒醋沃其石卽軟如泥刮取塗腫若乾醋和此大祕要耳灸腫令消法取獨顆蒜橫截厚一分安腫頭上炷如梧桐子大灸蒜上百壯不覺消數數灸唯多爲善勿令大熱但覺痛卽擎起蒜蒜燋更換用新者不用灸損皮肉如有體乾不須灸余嘗小腹下患大腫灸卽差每用之則可大効也又方生參頭上核又磁石末和醋傅之又方甘草塗此蕉子不中食又方雞腸草傅又方白薟末傅並良又熱腫癤烿膠數塗一日十數度卽差療小兒癤子尤良每用神効一切毒腫疼痛不可忍者搜麵團腫頭如錢大滿中安椒以麫餅子蓋頭上灸令徹痛卽立止又方搗萆麻人傅之立差手腳心風毒腫生椒末鹽末等分以醋和傅立差癰疽生臭惡肉者以白䕡茹散傅之看肉盡便停但傅諸膏藥若不生肉傅黃耆散䕡茹黃耆止一切惡肉仍不盡者可以七頭赤皮䕡茹爲散用半錢匕和白䕡茹散三錢七以傅之此姚方差惡脉病身中忽有赤絡脉起如蚓狀此由春冬惡風入絡脉之中其血瘀所作宜服之五香連翹鑱去血傅丹參膏積日乃差余度山嶺卽患常服五香湯傅小豆得消以下並姚方惡核病者肉中忽有核如梅李小者如豆粒皮中慘痛左右走身中壯熱𤻎惡寒是也此病卒然而起有毒入腹殺人南方多有此患宜服五香連翹湯以小豆傅之立消若餘核亦得傅丹參膏惡肉病者身中忽有肉如赤小豆粒突出便長如牛馬乳亦如雞冠狀亦宜服漏蘆湯外可以燒鐵烙之日三烙令稍燋以升麻膏傅之氣痛之病身中忽有一處如打撲之狀不可堪耐而左右走身中發作有時痛靜時便覺其處冷如霜雪所加此皆由冬温至春暴寒傷之宜先服五香連翹數劑又以白酒煑楊柳皮暖熨之有赤點點處宜鑱去血也五香連翹湯療惡肉惡脉惡核瘰癧風結腫氣痛木香沉香雞舌香各二兩麝香半兩薰陸一兩夜干紫葛升麻獨活寄生甘草炙連翹各二兩大黃三兩淡竹瀝三升十三物以水九升煑減半內竹𤃉取三升分三服大良漏蘆湯療癰疽丹𤺋毒腫惡肉漏蘆白蘞黃芩白薇枳實炙升麻甘草炙芍藥麻黃去節各二兩大黃三兩十物以水一斗煑取三升若無藥用大黃下之佳其丹毒須針鑱去血丹參膏療惡肉惡核瘰癧風結諸脉腫丹參蒴藋各二兩秦膠獨活烏頭白及牛膝菊花防風各一兩菵草葉躑躅花蜀椒各半兩十二物切以苦酒二升漬之一宿猪膏四斤俱煎之令酒竭勿過燋去滓以塗諸疾上日五度塗故布上貼之此膏亦可服得大行卽須少少服小品同升麻膏療丹毒腫熱瘡升麻白蘞漏蘆芒消各二兩黃芩枳實連翹蛇銜各三兩栀子二十枚蒴藋根四兩十物切舂令細納器中以水三升漬半日以猪脂五升煎令水竭去滓傅之日五度若急合卽水煎極驗方葛氏療卒毒腫起急痛柳白皮酒煑令熱熨上痛止附方勝金方治發腦發背及癰疽熱癤惡瘡等臘月兔頭細剉入瓶內宻封惟久愈佳塗帛上厚封之熱痛傅之如冰頻換差千金方治發背癰腫已潰未潰方香豉三升少與水和熟搗成泥可腫處作餅子厚三分已上有孔勿覆孔上布豉餅以艾烈其上灸之使温温而熱勿令破肉如熱痛卽急易之患當減快得分穩一日二度灸之如先有瘡孔中汁出卽差外臺秘要療惡寒嗇嗇似欲發背或已生瘡腫癮𤺋起方消石三兩以暖水一升和令消待冷取故青布揲三重可似赤處方圓濕布搨之熱卽換頻易立差集驗方治發背以蝸牛一百箇活者以一升淨瓶入蝸牛用新汲水一盞浸瓶中封系自晩至明取出蝸牛放之其水如涎將眞蛤粉不以多少旋調傅以雞翎掃之瘡上日可十餘度其熱痛止瘡便愈崔元亮海上方治發背秘法李北海云此方神授極奇秘以甘草三大兩生搗別篩末大麥麵九兩於大盤中相和攪令匀取上等好酥少許別捻入藥令匀百沸水搜如餅子劑方圓大於瘡一分熱傅腫上以油片及故紙隔令通風冷則換之已成膿水自出未成腫便內消當患腫著藥時常須喫黃耆粥甚妙又一法甘草一大兩微炙搗碎水一大升浸之器上橫一小刀子置露中經宿平明以物攪令沫出吹沫服之但是瘡腫發背皆可服甚効梅師方治諸癰疽發背或發乳房初起微赤不急治之卽死速消方擣苧根傅于之數易聖惠方治附骨疽及魚眼瘡用狗頭骨燒烟薰之張文仲方治石癰堅如石不作膿者生章陸根搗擦之燥卽易取軟爲度子母秘錄治癰疽痔瘻瘡及小兒丹水煑棘根汁洗之又方末蠐螬傅之小品方治疽初作以赤小豆末醋和傅之亦消博濟方治一切癰腫未破疼痛令內消以生地黃杵如泥隨腫大小攤於布上糝木香末於中又再攤地黃一重貼於腫上不過三五度日華子云消腫毒水調决明子末塗食療治癰腫栝樓根苦酒中熬燥搗篩之苦酒和塗紙上攤貼服金石人宜用楊文蔚方治癰未潰栝樓根赤小豆等分爲末醋調塗千金方治諸惡腫失治有膿燒棘針作灰水服之經宿頭出又方治癰瘡中冷瘡口不合用鼠皮一枚燒爲灰細研封瘡口上孫眞人云主癰發數處取牛糞燒作灰以雞子白和傅之乾卽易孫眞人食忌主一切熱毒腫章陸根和鹽少許傅之日再易集驗方治腫柳枝如腳指大長三尺二十枚水煑令極熱以故布裹腫處取湯熱洗之卽差又方治癰一切腫未成膿拔毒牡蠣白者爲細末水調塗乾更塗又方治毒熱足腫疼欲脫酒煑苦參以漬之外臺秘要治癰腫伏龍肝以蒜和作泥塗用布上貼之如乾則再易又方凡腫已潰未潰者以白膠一片水漬令軟納納然腫之大小貼當頭上開孔若已潰還合者膿當被膠急撮之膿皆出盡未有膿者腫當自消矣又方燒鯉魚作灰酢和塗之一切腫上以差爲度又療熱毒病攻手足腫疼痛欲脫方取蒼耳汁以漬之又方水煑馬糞汁以漬之肘後方治毒攻手足腫疼痛欲斷猪蹄一具合䓗煑去滓內少許鹽以漬之經驗後方治一切癰腫無頭以葵菜子一粒新汲水吞下須臾卽破如要兩處破服兩粒要破處逐粒加之驗又方治諸癰不消已成膿懼針不得破令速决取白雞翅下第一毛兩邊各一莖燒灰研水調服之又梅師方取雀屎塗頭上卽易破雄雀屎佳堅者爲雄謹按雄黃治瘡瘍尚矣周禮瘍醫凡療瘍以五毒攻之鄭康成注云今醫方有五毒之藥作之合黃堥置石膽丹砂雄黃礜石磁石其中燒之三日三夜其烟上著以雞羽掃取之以注創惡肉破骨則盡出故翰林學士楊億嘗筆記直史館楊嵎年少時有瘍生於頰連齒輔車外腫若覆甌內潰出膿血不輟吐之痛楚難忍療之百方彌年不差人語之依鄭法合燒藥成注之創中少頃朽骨連兩牙潰出遂愈後更安寧信古方攻病之速也黃堥若今市中所貨有蓋瓦合也近世合丹藥猶用黃瓦䰛亦名堥事出於古也堥音武梅師方治產後不自乳見畜積乳汁結作癰取蒲公草擣傅腫上日三四度易之俗呼爲蒲公英語訛爲僕公罌是也水煑汁服亦得又方治妬乳乳癰取丁香搗末水調方寸匕服又方治乳頭裂破搗丁香末傅之千金方治妬乳梁上塵醋和塗之亦治陰腫靈苑方治乳痛癰初發腫痛結硬欲破膿令一服差以北來眞樺皮無灰酒服方寸匕就之卧及覺已差聖惠方主婦人乳癰不消右用白麵半斤炒令黃色用醋煑爲糊塗於乳上卽消產寶治乳及癰腫雞屎末服方寸匕須臾三服愈梅師方亦治乳頭破裂方簡要濟眾治婦人乳癰汁不出內結成膿腫名妬乳方露蜂房燒灰研每服二錢水一中盞煎至六分去滓温服又方治吹妳獨勝散白丁香半兩搗羅爲散每服一錢匕温酒調下無時服子母秘錄療吹奶惡寒壯熱猪肪脂以冷水浸搨之熱卽易立效楊炎南行方治吹奶疼痛不可忍用穿山甲炙黃木通各一兩自然銅半兩生用三味搗羅爲散每服二錢温酒調下不計時候食醫心鏡云治吹奶不癢不痛腫硬如石以青橘皮一兩湯浸去穰焙爲末非時温酒下二錢匕葛氏大人小兒卒得惡瘡不可名識者燒竹葉和雞子中黃塗差又方取蛇床子合黃連二兩末粉瘡上用者猪脂和塗差又方燒蛇皮末以猪膏和塗之又方煑柳葉若皮洗之亦可內少鹽此又療面上瘡又方臘月猪膏一升亂髮如雞子大生鯽魚一頭令煎令消盡又內雄黃苦參末二兩大附子一枚末絞令凝以傅諸瘡無不差胡洽療瘑疽疥大効瘡中突出惡肉者末鳥梅屑傳之又末硫黃傳上燥著唾和塗之惡瘡連痂癢痛搗扁豆封痂落卽差近方小品療瘑癬疥惡瘡方水銀礬石蛇床子黃連各二兩四物搗篩以臘月猪膏七合并下水銀攪萬度不見水銀膏成傅瘡并小兒頭瘡良龔慶宣加䕡茹一兩療諸瘡神驗無比姚療瘑疥雄黃一兩黃連二兩松脂二兩髮灰如彈丸四物熔猪膏與松脂合熱搗以薄瘡上則大良又療惡瘡粉方水銀黃連胡粉熬令黃各二兩下篩粉瘡瘡無汁者唾和之小兒身中惡瘡取笋汁自澡洗以笋殻作散傅之効人體生惡瘡似火自爛胡粉熬黑黃檗黃連分等下篩粉之也卒得惡瘡蒼耳桃皮作屑內瘡中佳頭中惡瘡胡粉水銀白松脂各二兩臘月猪膏四兩合松脂煎以水銀胡粉合研以塗上日再胡洽云療小兒頭面瘡又一方加黃連二兩亦療得秃瘡惡瘡雄黃膏方雄黃雌黃並末水銀各一兩松脂二兩猪脂半斤亂髮如雞子大以上合煎去滓內水銀傅瘡日再効方惡瘡食肉雄黃散雄黃六分䕡茹礬石各二分末瘡中日二療瘡方最去面上粉㓨方黃連八分糯米赤小豆各五分吴茱萸一分胡粉水銀各六分搗黃連等下篩先於掌中研水銀使極細和藥使相入以生麻油總稀稠得所洗瘡拭乾傅之但是瘡卽療神驗不傳甘家松脂膏療熱瘡尤嗍膿不痂無瘢方松脂白膠香薰陸香各一兩當歸蠟各一兩半甘草一兩並切猪脂羊腎脂各半合許生地黃汁亦半合以松脂等末內脂膏地黃汁中微火煎令黃下臘絞去滓塗布貼瘡極有驗甘家秘不能傳此是半劑地黃膏療一切瘡已潰者及炙貼之無痂生肉去膿神祕方地黃汁一升松脂二兩薰陸香一兩羊腎脂及牛酥各如雞子大先於地黃汁煎松脂及香令消卽內羊脂酥并更用蠟半雞子大一時相和緩火煎水盡膏成去滓塗帛貼瘡日一二易加故緋一片亂髮一雞子許大療年深者十餘日卽差生肉祕法婦人頰上瘡差後每年又發甘家祕方塗之永差黃礬石二兩燒令汁盡胡粉一兩水銀一兩半搗篩礬石胡粉更篩先以片許猪脂於瓷器內熟研水銀令消盡更加猪脂并礬石胡粉和使粘稠洗面瘡以塗上又别熬胡粉令黃塗膏訖則薄此粉數日卽差甘家用大驗療瘑瘡但是腰脚以下名爲瘑此皆有蟲食之蟲死卽差此方立驗醋泔澱一椀大麻子一盞白沙鹽末各一抄和掩以傅瘡乾更傅先温泔淨洗拭乾傅一二度卽差孔如針穴皆蟲食大驗効方惡瘡三十年不愈者大黃黃芩黃連各一兩爲散洗瘡淨以粉之日三無不差又黃檗分等亦佳葛氏療白禿方殺猪卽取肚破去屎及熱以反搨頭上須臾蟲出著肚若不盡更作取令無蟲卽休又方末藜蘆以臘月猪膏和塗之五月漏蘆草燒作灰膏和使塗之皆先用鹽湯洗乃傅又方羊蹄草根獨根者勿見風日及婦女雞犬以三年醋研和如泥生布拭瘡令去以傅之姚方以羊肉如作脯法炙令香及熱以榻上不過三四日差又方先以皂莢湯熱洗拭乾以少油麻塗再三卽差附方千金方治遍身風癢生瘡疥以蒺藜子苗煑湯洗之立差千金翼方同又方茵陳蒿不計多少煑濃汁洗之立差千金翼方瘡癬初生或始痛癢以薑黃傅之妙又方嚼鹽塗之妙又方漏瘤瘡濕癬癢浸淫日瘙癢不可忍搔之黃水出差後復發取羊蹄根去土細切搗以大醋和淨洗傅上一時間以冷水洗之日一傅差若爲末傅之妙外臺祕要治癬瘡方取蟾蜍燒灰末以猪脂和傅之又方治乾癬積年生痂搔之黃水出每逢陰雨卽痒用斑猫半兩微炒爲末蜜調傅之又治疥方搗羊蹄根和猪脂塗上或著鹽少許佳斗門方治疥癬用藜蘆細搗爲末以生油調傅之王氏博濟治疥癬滿身作瘡不可治者何首烏艾等分以水煎令濃於盆內洗之甚能解痛生肌肉簡要濟眾治癬瘡久不差羊蹄根搗絞取汁用調膩粉少許如膏塗傅癬上二五遍卽差如乾卽猪脂調和傅之鬼遺方治疥癬松膠香研細約酌入少輕粉衮令匀凡疥癬上先用油塗了擦末一日便乾頑者三兩度聖惠方治癬濕癢用楮葉半斤細切搗爛傅癬上楊氏產乳療瘡疥燒竹葉爲末以雞子白和之塗上不過三四次立差十全方治疥瘡巴豆十粒火炮過黃色去皮膜右順手研如麵入酥少許膩粉少許同研匀爪破以竹篦子點藥不得落眼裏及外腎上如熏炙著外腎以黃丹塗甚妙經驗方治五般瘡癬以韭根炒存性旋搗末以猪脂油調傅之三度差千金方療漆瘡用湯潰芒硝令濃塗之乾卽易之譚氏治漆瘡漢椒湯洗之卽愈千金翼治漆瘡羊乳傅之集驗方治漆瘡取蓮葉乾者一斤水一斗煑取五升洗瘡上日再差斗門方治漆咬用韭葉研傅之食醫心鏡同千金方主大人小兒風瘙癮𤺋心迷悶方巴豆二兩槌破以水七升煑取三升以帛染拭之外臺秘要塗風𤺋取枳實以醋漬令濕火炙令熱適寒温用熨上卽消斗門方治癮𤺋楝皮濃煎浴之梅師方治一切𤺋以水煑枳殻爲煎塗之乾卽又塗之又方以水煑芒硝塗之又治風癮𤺋方以水煑蜂房取二升入芒硝傅上日五度卽差聖惠方治風瘙癮𤺋遍身癢成瘡用蠶沙一升水二斗煑取一斗二升去滓温熱得所以洗之宜避風千金翼療丹癮𤺋方酪和鹽熱煑以摩之手下消又主大人小兒風𤺋萸一升酒五升煑取一升帛染拭之初虞世治皮膚風熱遍身生癮𤺋牛蒡子浮萍等分以薄荷湯調下二錢日二服經驗後方治肺毒瘡如大風疾綠雲散以桑葉好者淨洗過熟蒸一宿後日乾爲末水調二錢七肘後方治卒得浸淫瘡轉有汁多起心早治之續身周匝則殺人以雞冠血傅之差又方療大人小兒卒得月蝕方於月望夕取兔屎及內蝦蟆腹中合燒爲灰末以傅瘡上差集驗方療月蝕瘡虎頭骨二兩搗碎同猪脂一升熬成膏黃取塗瘡上聖惠方治反花瘡用馬齒莧一斤燒作灰細研猪脂調傅之又方治諸瘡胬肉如螘出數寸用硫黃一兩細研胬肉上薄塗之卽便縮鬼遺方治一切瘡肉出以烏梅燒爲灰研末傅上惡肉立盡極妙簡要濟眾方傅瘡藥黃藥子四兩爲末以冷水調傅瘡上乾卽旋傅之兵部手集治服丹石人有熱瘡疼不可忍方用紙環圍腫處中心塡硝石令滿匙抄水淋之覺其不熱疼卽止治頭瘡及諸熱瘡先用醋少許和水淨洗去痂再用温水洗裛乾百草霜細研入膩粉少許生油調塗立愈治惡瘡唐人記其事云江左嘗有商人左膊上有瘡如人面亦無它苦商人戲滴酒口中其面亦赤色以物食之亦能食食多則寬膊內肉脹起或不食之則一臂痺有善醫者教其歷試諸藥金石草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒毁其口灌之數日成痂遂愈然不知何疾也謹按本經主金瘡此豈金瘡之類歟癩病方初覺皮膚不仁或淫淫苦癢如蟲行或眼前見物如垂絲或癮𤺋赤黑此卽急療蠻夷酒佳善療白癩苦參五斤酒三斗漬飲勿絶并取皮根末服効驗又方艾千莖濃煑以汁漬麯作酒常飲使醺醺姚同姚方大蝮蛇一枚切勿令傷以酒漬之大者一斗小者五升以糠火温令下尋取蛇一寸許以臘月猪膏和傅瘡差亦療鼠瘻諸惡瘡苦參二斤露蜂房二兩麴二斤水三斗漬藥二宿去滓黍米二升釀熟稍飲日三一方加蝟皮更佳附方聖惠方治大風癩疾骨肉疽敗百節疼酸眉鬢墮落身體習習癢痛以馬先蒿細剉炒爲未每空心及晩食前温酒調下二錢匕又方治大風疾令眉鬢再生用側柏葉九蒸九曝搗羅爲末煉蜜和丸如梧桐子大日三服夜一服熟水下五丸十丸百日卽生又方治大風頭面髭髮脫落以桑柴灰熱湯淋取汁洗面以大豆水研取漿解澤灰味彌佳次用熟水入菉豆一斗皮取淨不過十度良二日一沐頭一日一洗面又方治白癩用馬鞭草不限多少爲末每服食前用荆芥薄荷湯調下一錢匕食療治癩可取白蜜一斤生薑二斤搗取汁先稱同鐺令知斤兩卽下蜜於鐺中消之又秤五斤兩下薑汁於蜜中微火煎令薑汁盡秤蜜斤兩在卽休藥已成矣患三十年癩者平旦服棗許大一丸一日三服酒飲任下忌生冷醋滑臭物功用甚多活人眾矣不能一一具之外臺祕要治惡風疾松脂煉投冷水中二十次蜜丸服二兩飢卽服之日三鼻柱斷離者三百日差斷鹽及房室抱朴子云趙瞿病癩厯年醫不差家乃賫粮棄送於山穴中瞿自怨不幸悲歎涕泣經月有仙人經穴見之哀之具問其詳瞿知其異人也叩頭自陳乞命於是仙人取囊中藥賜之教其服百余日瘡愈顏色悅肌膚潤仙人再過視之瞿謝活命之恩乞遺其方仙人曰此是松脂彼中極多汝可煉服之長服身轉輕力百倍登危涉險終日不困年百歲齒不墮髮不白夜臥常見有光大如鏡感應神仙傳云崔言者職隸左親騎軍一旦得疾雙眼昏咫尺不辨人物眉髮自落鼻梁崩倒肌膚有瘡如癬皆謂惡疾勢不可救因爲洋州駱谷子歸寨使遇一道流自谷中出不言名姓授其方曰皂角刺一二斤爲灰蒸久曬研爲末食上濃煎大黃湯調一錢匕服一旬鬢髮再生肌膚悅潤愈眼目倍常明得此方後卻入山不知所之朝野僉載云商州有人患大風家人惡之山中爲起茅屋有烏蛇墜酒罌中病人不知飲酒漸差罌底尚有蛇骨方知其由也用道謹按李肇國史補云李舟之弟患風或說蛇酒治風乃求黑蛇生置甕中醖以麴蘖數日蛇聲不絶及熟香氣酷烈引滿而飲之斯須悉化爲水唯毛髮存焉僉載之說恐不可輕用姚云凡有腫皆有相主患者宜檢本方多發頭兩邊累累有核姚方鼠瘻腫核痛未成膿方以柏葉傅著腫上熬鹽著葉上熨令熱氣下卽消葛氏卒得鼠瘻有瘰癧未發瘡而速熱者速療方搗烏雞足若車前草傅之若已有核膿血出者以熱牛屎塗之日三又方取白鮮皮煑服一升當吐鼠子又方取猫狸一物料理作羹如食法空心進之鼠子死出又當生吞其功彌効又方取鼠中者一枚亂髮如雞子大以三歲臘月猪脂煎之令鼠骨肉及髮消盡半塗之半酒服鼠從瘡中出姚云秘不傳之法劉涓子鼠瘻方以龜殻甘草炙桂心雄黃乾薑狸骨炙六物分等搗下蜜和內瘡中無不差先灸作瘡後與藥良又方柞木皮五升以酒一斗合煎熟出皮煎汁令得二升服之盡有宿肉出愈又瘻瘡坐肉膏楝樹白皮鼠肉當歸各二兩薤白三兩生地黃五兩臘月猪脂三升煎膏成傅之孔上令生肉葛氏若瘡多而孔小是蟻瘻方燒鱣鯉甲猪膏和傅又方燒蜘蛛二七枚傅良又瘻方煎桃葉枝作煎淨洗瘡了內孔中大驗方葛氏若著口裏東行楝根細剉水煑取清汁含之數吐勿嚥肉瘻方槐白皮搗丸綿裹內下部中傅効鼠瘻方石南生地黃雌黃茯苓黃連各二兩爲散傅瘡上日再又方礬石三分燒斑猫一分炙去頭足搗下用醋和服半匕須臾瘻蟲從小便中出刪繁方附方肘後方治風瘻露蜂房一枚炙令黃赤色爲末每用一錢臘月猪脂匀調傅瘡上千金方治鼠瘻以雞子一枚米下熬半日取出黃熬令黑先拭瘡上汁令乾以藥內瘡孔中三度卽差千金翼治蟻瘻取鯪鯉甲二七枚末猪膏和傅之聖惠方治螻蛄瘻用槲葉燒灰細研以泔別浸槲葉取洗瘡拭之內少許灰於瘡中又方治一切瘻煉成松脂末填瘡孔令滿日三四度用之葛氏男子陰卒腫痛方灸足大指第二節下橫文理正中央五壯佳姚云足大指本三壯又方桃核中仁熬末酒服如彈丸姚云不過三又方竈中黃土末以雞子黃和傅之蛇床子末和雞子黃傅之亦良又方搗蕪菁根若馬鞭草傅並良姚同又方雞翮六枚燒并蛇床子末分等合服少隨卵左右傅卵佳姚方無蛇床子小兒陰疝發時腫痛依仙翁前灸法隨左右灸差隨痛如㓨方但服生夜干汁取下亦可服丸藥下之云作走馬湯亦在尸注中有陰丸卒縮入腹急痛欲死名陰疝狼毒四兩防風二兩附子三兩燒蜜丸服三丸如桐子大日夜三度陰莖中卒痛不可忍雄黃礬石各二兩甘草一尺水五升煑取二升漬姚云療大如斗者葛氏男子陰瘡損爛煑黃檗洗之又白蜜塗之又方黃連黃檗分等末之煑取肥猪肉汁漬瘡訖粉之姚方蜜煎甘草末塗之比者見有陰頭腫項下瘡欲斷者猪肉汁漬依姚方卽神効陰蝕欲盡者蝦蟇兔矢分等末勃瘡上陰癢汁出嚼生大豆黃塗之亦療尿灰瘡姚療陰癢生瘡嚼胡麻塗之葛療陰囊下濕癢皮剝烏梅十四枚錢四十文三指撮鹽苦酒一升於銅器內總漬九日日洗之又煑槐皮若黃檗汁及香葉汁並良療人陰生瘡膿出臼方高昌白礬一小兩搗細麻人等分研煉猪脂一合於瓷器中和攪如膏然後取槐白皮切作湯以洗瘡上拭令乾卽取膏塗上然後以楸葉帖上不過三又陰瘡有二種一者作臼膿出曰陰蝕瘡二者但亦作瘡名爲熱瘡若是熱卽取黃檗一兩黃芩一兩切作湯洗之仍取黃連黃檗作末傅之女子陰瘡末硫黃傅上姚同又燒杏仁搗塗之又方末雄黃礬石各二分麝香半分搗傅姚同若陰中痛礬石二分熬大黃一分甘草半分末綿裹如棗以導之取差若有息肉突出以苦酒三升漬烏喙五枚三日以洗之日夜三四度若苦癢搔之痛悶取猪肝炙熱內陰中當有蟲著肝小兒秃方取白頭翁根搗傅一宿或作瘡二十日愈灸頽但灸其上又灸莖上又灸白小腹脉上及灸脚大指三中灸一壯又灸小指頭隨頽左右著灸姚氏方楊柳枝如足大指大長三尺二十枚水煑令極熱以故紙及氈掩腫處取熱柳枝更取拄之如此取得差止又卵頽熟搗桃仁傅之亦療婦人陰腫燥卽易之小品牡丹散療頽偏大氣脹方牡丹防風桂心豉熬鐵精分等合搗下服方寸七小兒一刀圭二十日愈大良嬰兒以乳汁和如大豆與之不用藥法療頽必差方令病人自把糯米餅子一枚并皂莢刺一百箇就百姓間坐社處先將皂莢刺分合社人社官三老已下各付一針卽出餅子示人從頭至尾皆言從社官已下乞針捶社人問云捶何物病人云捶人魁周匝總遍訖針并插盡卽時餅却到家收掌於一處餅乾頽不覺自散永差極神効附方千金方有人陰冷漸漸冷氣入陰囊腫滿恐死日夜疼痛悶不得眠取生椒擇之令淨以布帛裹著丸囊令厚半寸須臾熱氣大通日再易之取消差又外臺祕要方煑大薊根汁服之立差梅師方治卒外腎偏腫疼痛大黃末和醋塗之乾卽易之又方桂心末和水調方寸匕塗之又方治卒外腎偏疼皂莢和皮爲末水調傅之良初虞世方治水㿗偏大上下不定疼痛牡蠣不限多少鹽泥固濟炭三斤煅令火盡冷取二兩乾薑一兩炮右爲細末用冷水調稀稠得所塗病處小便利卽愈經驗方治丈夫本藏氣傷膀胱連小腸等氣金鈴子一百箇温湯浸過去皮巴豆二百箇槌微破麩二升同於銅鍋內炒金鈴子赤熟爲度放冷取出去核爲末每服三錢非時熱酒醋湯調并得其麩巴豆不用也外臺祕要治膀胱氣急宜下氣蕪荑搗和食鹽末二物等分以綿裹如棗大內下部或下水惡汁并下氣佳又治陰下濕呉茱萸一升水三升煑三沸去滓洗癢差又治陰頭生瘡以蜜煎甘草塗之差
