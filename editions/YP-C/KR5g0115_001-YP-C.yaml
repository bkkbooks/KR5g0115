body:
  text: 治卒中沙虱毒方治卒服藥過劑煩悶方治卒中諸藥毒救解方治食中諸毒方治防避飲食諸毒方治卒飲酒大醉諸病方卷之八治百病備急丸散膏諸要方治牛馬六畜水穀疫癘諸病方重刊道藏輯要葛仙翁肘後備急方卷之一救卒中惡死方第一救卒死或先病痛或常居寢臥奄忽而絶皆是中死救之方一方取葱黃心㓨其鼻男左女右入七八寸若使目中血出佳扁鵲法同是後吹耳條中葛當言此云吹鼻故别爲一法又方令二人以衣壅口吹其兩耳極則易又可以筒吹之並捧其肩上側身遠之莫臨死人上又方以䓗葉㓨耳耳中鼻中血出者莫怪無血難治有血是候時當捧兩手忽放之須臾死人自當舉手撈人言痛乃止男㓨左鼻女㓨右鼻中令入七八寸餘大效亦治自縊死與此扁鵲方同又方以綿漬好酒中須臾置死人鼻中手按令汁入鼻中并持其手足莫令驚又方視其上唇裏弦弦者有白如黍米大以針決去之又方以小便灌其面數迴卽能語此扁鵲方法又方取皂莢如大豆吹其兩鼻中嚏則氣通矣又方灸其唇下宛宛中承漿穴十壯大效矣又方割雄雞頸取血以塗其面乾復塗并以灰營死人一周又方以管吹下部令數人互吹之氣通則活又方破白犬以搨心上無白犬白雞亦佳又方取雄鴨就死人口上斷其頭以熱血瀝口中并以竹筒吹其下部極則易人氣通下卽活又方取牛馬糞尚濕者絞取汁灌其口中令入喉若口已禁者以物强發之若不可强者乃扣齒下若無新者以人溺解乾者絞取汁此扁鵲云又方以繩圍其死人肘腕男左女右畢伸繩從背上大槌度以下又從此灸橫行各半繩此法三灸各三卽起又方令爪其病人人中取醒不者捲其手炙下文頭隨年又方灸鼻人中三壯也又方灸兩足大指爪甲聚毛中七壯此華他法一云三七壯又方灸臍中百壯也扁鵲法又云斷㹠尾取血飲之并縛㹠以枕之死人須臾活又云半夏末如大豆吹鼻中又方搗女貞屑重一錢匕開口內喉中以水苦酒立活按此前救卒死四方并後尸蹷事并是魏大夫傳中正一眞人所說扁鵲受長桑公子法尋此傳出世在葛後二十許年無容知見當是斯法久已在世故或言楚王或言趙王兼立語次第亦參差故也又張仲景諸要方搗薤汁以灌鼻中又方割丹雄雞冠血管吹內鼻中又方以雞冠及血塗面上灰圍四邊立起又方猪脂如雞子大苦酒一升煮沸以灌喉中又方大豆二七枚以雞子白并酒和盡以吞之救卒死而壯熱者礬石半斤水一斗半煮消以漬脚令沒踝救卒死而目閉者騎牛臨面搗薤汁灌之耳中吹皂莢鼻中立效救卒死而張目及舌者灸手足兩爪後十四壯了飲以五毒諸膏散有巴豆者救卒死而四支不收矢便者馬矢一升水三斗煮取二斗以洗之又取牛洞一升温酒灌口中洞者稀糞也灸心下一寸臍上三寸臍下四寸各一百壯差若救小兒卒死而吐利不知是何病者馬矢一丸絞取汁以吞之無濕者水煮取汁又有備急三物丸散及裴公膏并在後備急藥條中救卒死尤良亦可臨時合用之凡卒死中惡及尸蹷皆天地及人身自然陰陽之氣忽有乖離否隔上下不通偏竭所致故雖涉死境猶可治而生緣氣未都竭也當爾之時兼有鬼神於其間故亦可以符術而獲濟者附方扁鵲云中惡與卒死鬼擊亦相類已死者爲治皆參用此方搗菖蒲生根絞汁灌之立差尸厥之病卒死脉猶動聽其耳中如微語聲股間暖是也亦此方治之孫眞人治卒死方以皂角末吹鼻中救卒死尸蹷方第二尸蹷之病卒死而脈猶動聽其耳中循循如嘯聲而股間暖是也耳中雖然嘯聲而脉動者故當以尸蹷救之方以管吹其左耳中極三度復吹右耳三度活又方搗乾菖蒲以一棗核大著其舌下又方灸鼻人中七壯又灸陰囊下去下部一寸百壯若婦人灸兩乳中間又云爪刺人中良久又針人中至齒立起此亦全是魏大夫傳中扁鵲法卽趙太子之患又張仲景云尸一蹷脉動而無氣氣閉不通故靜然而死也以菖蒲屑內鼻兩孔中吹之令人以桂屑著舌下又云扁鵲法治楚王效又方剔左角髮方二寸燒末以酒灌令入喉立起也又方以繩圍其臂腕男左女右繩從大椎上度下行脊上灸繩頭五十壯活此是扁鵲秘法又方熨其兩脇下取竈中墨如彈丸漿水和飲之須臾三四以管吹耳中令三四人更互吹之又小管吹鼻孔梁上塵如豆著中吹之令入差又方白馬尾二七莖白馬前脚目一枚合燒之以苦酒丸如小豆開口吞二丸須臾服一丸又方針百會當鼻中入髮際五寸針入三分補之針足大指甲下肉側去甲三分又針足中指甲上各三分大指之內去端韭葉又針手少陰銳骨之端各一分又方炙膻中穴二十八壯救卒客忤死方第三客忤者中惡之類也多於道門門外得之令人心腹絞痛脹滿氣衝心胸不卽治亦殺人救之方灸鼻人中三十壯令切鼻柱下也以水漬粳米取汁一二升飲之口已禁者以物强發之又方搗墨水和服一錢匕又方以銅器若瓦器貯熱湯器著腹上轉冷者撤去衣器親肉大冷者易以熱湯取愈則止又方以三重衣著腹上銅器著衣上稍稍少許茅於器中燒之茅盡益之勿頓多也取愈乃止又方以繩橫度其人口以度其臍去四面各一處灸各三壯令四火俱起差又方橫度口中折之令上頭著心下灸下頭五壯又方眞丹方寸匕蜜三合和服口噤者折齒下之扁鵲治忤有救卒符并服鹽湯法恐非庸世所能故不載而此病卽今人所謂中惡者與卒死鬼擊亦相類爲治皆參取而用之已死者搗生菖蒲根絞取汁含之立差卒忤停尸不能言者桔梗燒二枚末之服又方末細辛桂分等內口中又方雞冠血和眞朱丸如小豆內口中與三四枚差若卒口噤不開者末生附子置管中吹內舌下卽差矣又方人血和眞朱如梧桐子大二丸折齒納喉中令下華佗卒中惡短氣欲死灸足兩母指上甲後聚毛中各十四壯卽愈未差又灸十四壯前救卒死方三七壯已有其法又張仲景諸要方麻黃四兩杏人七十枚甘草一兩以水八升煮取三升分令咽之通治諸感忤又方韭根一把烏梅二十箇茱萸半斤以水一斗煮之以病人櫛內中三沸櫛浮者生沉者死煮得三升與飲之又方桂一兩生薑三兩梔子十四枚豉五合搗以酒三升攪微煮之味出去滓頓服取差飛尸走馬湯巴豆二枚杏人二枚合綿纏椎令碎著熱湯二合中指捻令汁出便與飲之炊間頓下飲差小量之通治諸飛尸鬼擊又有諸丸散並在備急藥中客者客也忤者犯也謂客氣犯人也此蓋惡氣治之多愈雖是氣來鬼鬼毒厲之氣忽逢觸之其衰歇故不能如自然惡氣治之入身而侵克藏府經絡差後猶宜更爲治以消其餘勢不爾亟終爲患令有時輒發附方外臺秘要治卒客忤停尸不能言細辛桂心等分內口中又方燒桔梗二兩末米飲服仍吞麝香如大豆許佳廣利方治卒中客忤垂死麝香一錢重研和醋二合服之卽差治卒得鬼擊方第四鬼擊之病得之無漸卒著如人力刺狀胸脅腹內絞急切痛不可抑按或卽吐血或鼻中出血或下血一名鬼排治之方灸鼻下人中一壯立愈不差可加數壯又方升麻獨活牡桂分等末酒服方寸匕立愈又方灸臍下一寸二壯又方灸臍上一寸七壯及兩踵白肉際取差又方熟艾如鴨子大三枚水五升煮取二升頓服之又方鹽一升水二升和攪飲之并以冷水噀之勿令卽得吐須臾吐卽差又方以粉一撮著水中攪飲之又方以淳酒吹內兩鼻中又方斷白犬一頭取熱犬血一升飲之又方割鷄冠血以𤃉口中令一嚥仍破此雞以搨心下冷乃棄之於道邊得烏鷄彌佳妙又方牛子矢一升酒三升煮服之大牛亦可用之又方刀鞘三寸燒末水飲之又方燒鼠矢末服如黍米不能飲之以少水知內口中又有諸丸散並在備急藥條中今巫實見人忽有被鬼神所擺拂者或犯其行伍或遇相觸突或身神散弱或愆負所貽輕者因而獲免重者多見死亡猶如燕簡輩事非爲虛也必應死亦不可要自不得不救爾附方古今錄驗療妖魅猫鬼病人不肯言鬼方鹿角屑搗散以水服方寸匕卽言實也治卒魘寐不寤方第五卧忽不寤勿以火照火照之殺人但痛嚙其踵及足拇指甲際而多唾其面卽活又治之方末皂角管吹兩鼻中卽起三四日猶可吹又以毛㓨鼻孔中男左女右展轉進之又方以蘆管吹兩耳并取病人髮二七莖作繩納鼻孔中割雄雞冠取血以管吹入咽喉中大效又方末竈下黃土管吹入鼻中末雄黃并桂吹鼻中並佳又方取井底泥塗目畢令人垂頭於井中呼其姓名卽便起也又方取韭搗以汁吹鼻孔冬月可掘取根取汁灌於口中又方以鹽湯飲之多少約在意又方以其人置地利刀畫地從肩起男左女右令周面以刀鋒刻病人鼻令入一分急持勿動其人當鬼神語求哀乃問阿誰何故來當自乞去乃以指滅向所畫地當肩頭數寸令得去不可不具詰問之也又方以瓦甑覆病人面上使人疾打破甑則寤又方以牛蹄或馬蹄臨魘人上亦可治卒死青牛尤佳又方搗雄黃細篩管吹納兩鼻中桂亦佳又方菖蒲末吹兩鼻中又末內舌下又方以甑帶左索縛其肘後男左女右用餘稍急絞之又以麻縛腳乃詰問其故約勅解之令一人坐頭守一人於戸內呼病人姓名坐人應曰諾在便蘇卒魘不覺灸足下大指聚毛中二十一壯人喜魘及惡夢者取火死灰著履中合枕又方帶雄黃男左女右又方灸兩足大指上聚毛中灸二十壯又方用眞麝香一子於頭邊又方以虎頭枕尤佳辟魘寐方取雄黃如棗核繫左腋下令人終身不魘寐又方眞赤罽方一赤以枕之又方作犀角枕佳以青木香內枕中并帶又方治卒魘寐久書此符於紙燒令惡以少水和之內死人口中懸鑑死者耳前打之喚死者名不過半日卽活魘卧寐不寤者皆魂魄外游爲邪所執錄欲還未得所忌火照火照遂不復入而有燈光中魘者是本由明出但不反身中故耳附方千金方治鬼魘不悟皂莢末刀圭起死人治卒中五尸方第六五尸者飛尸遁尸風尸沉尸尸注也今所載方兼治之其狀腹痛脹急不得氣息上衝心胸旁攻兩脇或磥塊涌起或攣引腰脊兼治之方灸乳後三寸十四壯男左女右不止更加壯數差又方灸心下三寸六十壯又方灸乳下一寸隨病左右多其壯數卽差又方以四指尖其痛處下灸指下際數壯令人痛上爪其鼻人中又爪其心下一寸多其壯取差又方破鷄子白頓吞之口閉者內喉中搖頓令下立差又方破鷄子白頓吞七枚不可再服又方理當陸根熬以囊貯更番熨之冷復易雖有五尸之名其例皆相似而有小異者飛尸者游走皮膚洞穿藏府每發刺痛變作無常也遁尸者附骨入肉攻鑿血脉每發不可得近見尸喪聞哀哭便作也風尸者淫躍四肢不知痛之所在每發昏恍得風雪便作也沉尸者纏結藏府衝心脇每發絞切遇寒令便作也尸注者舉身沉重精神錯雜常覺惛廢每節氣改變輒致大惡此一條別有治後熨也凡五尸卽身中尸鬼接引也共爲病害經術甚有消滅之方而非世徒能用今復撰其經要以救其敝方雄黃一兩大蒜一兩令相和似彈丸許內二合熱酒中服之須臾差未差更作已有𤻞者常畜此藥也又方乾薑桂分等末之鹽孔指撮熬令青末合水服之卽差又方搗蒺藜子蜜丸服如胡豆二丸日三又方粳米二升水六升煮一沸服之又方猪肪八合銅器煎小沸投苦酒八合相和頓服卽差又方掘地作小坎水滿中熟攪取汁服之又方取屋上四角茅內銅器中以三赤布覆腹著器布上燒茅令熱隨痛追逐蹠下癢卽差若瓦屋削取四角柱燒之亦得極大神良者也又方桂一赤薑一兩巴豆三枚合搗末苦酒和如泥以傅尸處燥卽差又方烏臼根剉二升煮令濃去滓煎汁凡五升則入水一兩服五合至一升良又方忍冬莖葉剉數斛煮令濃取汁煎之服如雞子一枚日二三服佳也又方燒亂髮熬杏人等分搗膏和丸之酒服桐子大三丸日五六服又方龍骨三分藜蘆二分巴豆一分搗和井花水服如麻子大如法丸又方漆葉暴乾搗末酒服之又方鼉肝一具熟煮切食之令盡亦用蒜齏又方斷鼈頭燒末水服可分爲三度當如肉者不盡後發更作又方雄黃一分梔子十五枚芍藥一兩水三升煮取一升半分再服又方梔子二七枚燒末服又方乾薑附子各一兩桂二分巴豆三十枚去心并生用搗篩蜜和搗萬杵服二丸如小豆大此藥無所不治又飛尸入腹㓨痛死方凡犀角射罔五注丸並是好藥别在大方中治卒有物在皮中如蝦蟆宿昔下入腹中如杯不動搖掣痛不可堪過數日卽煞人方巴豆十四枚龍膽一兩半夏土瓜子各一兩桂一斤半合搗碎以兩布囊貯蒸熱更番以熨之亦可煮飲少少服之此本在雜治中病名曰陰尸得者多死治尸注鬼注方第七尸注鬼注病者葛云卽是五尸之中尸注又挾諸鬼邪爲害也其病變動乃有三十六種至九十九種大略使人寒熱淋𤃉怳怳默默不的知其所苦而無處不惡累年積月漸就頓滯以至於死死後復傳之旁人乃至滅門覺知此候者便宜急治之方取桑樹白皮曝乾燒爲灰得二斗許著甑中蒸令氣浹便下以釜中湯三四斗淋之又淋凡三度極濃止澄清取二斗以漬赤小豆二斗一宿曝乾乾復漬灰汁盡止乃濕蒸令熟以羊肉若鹿肉作羹進此豆飯初食一升至二升取飽滿微者三四斗愈極者七八斗病去時體中自覺疼癢淫淫或若根本不拔重爲之神驗也又方桃人五十枚破研以水煮取四升一服盡當吐吐病不盡三兩日更作若不吐非注又方杜蘅一兩莖一兩人參半兩許瓠子二七枚松蘿六銖赤小豆二七枚搗末散平旦温服方寸匕晩當吐百種物若不盡後更服之也又方獺肝一具陰乾搗末水服方寸匕日三一具未差更作姚云神良又方朱砂雄黃各一兩鬼臼罔草各半兩巴豆四十枚去心皮蜈蚣兩枚搗蜜和丸服如小豆不得下服二丸亦長將行之姚氏燒髮灰熬杏人紫色分等搗如脂猪脂和酒服梧桐子大日三服差又有華陀狸骨散龍牙散羊脂丸諸大藥等并在大方中及成帝所受淮南丸并療疰易滅門女子小兒多注車注船心悶亂頭痛吐有此疹者宜辟方車前子車下李根皮石長生徐長卿各數兩分等粗搗作方囊貯半合繫衣帶及頭若注船下暴慘以和此共帶之又臨入船刻取此船自燒作屑以水服之附方子母秘錄治尸注燒亂髮如雞子大爲末水服之差食醫心鏡主傳尸鬼氣咳嗽痃癖注氣血氣不通日漸羸瘦方桃仁一兩去皮尖杵碎以水一升半煮汁著米煮粥空心食之治卒心痛方第八治卒心痛桃白皮煮汁宜空腹服之又方桂末若乾薑末二藥並可單用温酒服方寸匕須臾六七服差又方驢矢絞取汁五六合及熱頓服立定又方東引桃枝一把切以酒一升煎取半升頓服大效又方生油半合温服差又方黃連八兩以水七升煮取一升五合去滓温服五合每日三服又方當戸以坐若男子病者令婦人以一杯水以飲之若婦人病者令男子以一杯水以飲之得新汲水尤佳又以蜜一分水二分飲之益良也又方敗布裏鹽如彈丸燒令赤末以酒一盞服之又方煮三沸湯一升以鹽一合攪飲之若無火作湯亦可用水又方閉氣忍之數十度并以手大指按心下宛宛中取愈又方白艾成熟者三升以水三升煮取一升去滓頓服之若爲客氣所中者當吐之蟲物又方苦酒一杯鷄子一枚著中合攪飲之好酒亦可用又方取竈下熱灰篩去炭分以布囊貯令灼灼爾便更番以熨痛上冷更熬熱又方蒸大豆若煮之以囊貯更番熨痛處冷復易之又方切生薑若乾薑半升以水二升煮取一升去滓頓服又方灸手中央長指端三壯又方好桂削去皮搗篩温酒服三方寸匕不差者須臾可六七服無桂者末乾薑佳又方橫度病人口折之以度心厭下灸度頭三壯又方盡地作五行字撮中央土以水一升攪飲之也又方吳茱萸二升生薑四兩豉一升酒六升煮三升半分三服又方人參桂心梔子擘甘草炙黃芩各一兩水六升煮取二升分三服奇效又方桃人七枚去皮尖熟研水合頓服良亦可治三十年患又方附子二兩炮乾薑一兩搗蜜丸服四丸如梧子大日三又方吳茱萸一兩半乾薑准上桂心一兩白术二兩人參橘皮椒去閉口及子汗甘草炙黃苓當歸桔梗各一兩附子一兩半炮搗篩蜜和爲丸如梧子大日三稍加至十丸十五丸酒飲下飯前食後任意效驗又方桂心八兩水四升煮取一升分三服又方苦參三兩苦酒升半煮取八合分再服亦可用水無煮者生亦可用又方龍膽四兩酒三升煮取一升半頓服又方吳茱萸五合桂一兩酒二升半煎取一升分二服效又方吳茱萸二升生薑四兩豉一升酒六升煮取二升半分爲三服又方白雞一頭治之如食法水三升煮取二升去雞煎汁取六合內苦酒六合入眞珠一錢復煎取六合內末麝香如大豆二枚頓服之又方桂心當歸各一兩梔子十四枚搗爲散酒服方寸匕日三五服亦治久心病發作有時節者也又方桂心二兩烏頭一兩搗篩蜜和爲丸一服如梧子大三丸漸加之暴得心腹痛如刺方苦參龍膽各二兩升麻梔子各三兩苦酒五升煮取二升分二服當大吐乃差治心疝發作有時激痛難忍方眞射罔吳茱萸分等搗末蜜和丸如麻子服二丸日三服勿吃熱食又方灸心鳩尾下一寸名巨闕及左右一寸并百壯又與物度頸及度脊如之令正相對也凡灸六處治久患常痛不能飲食頭中疼重方烏頭六分椒六分乾薑四分搗末蜜丸酒飲服如大豆四丸稍加之又方半夏五分細辛五分乾薑二分人參三分附子一分搗末苦酒和丸如梧子大酒服五丸日三服治心下牽急懊痛方桂三兩生薑三兩枳實五枚水五升煮取三升分三服亦可加术二兩膠飴半斤治心肺傷動冷痛方桂心二兩猪腎二枚水八升煮取二升分三服入方附子二兩乾薑一兩蜜丸服四丸如梧子大日三服治心痺心痛方蜀椒一兩熬令黃末之以狗心血丸之如梧子服五丸日五服治心下堅痛大如碗邊如旋柈名爲氣分飲水所結方枳實七枚炙术三兩水一斗煮取三升分爲三服當稍軟也若心下百結積來去痛者方吳茱萸末一升眞射罔如彈丸一枚合搗以雞子白和丸丸如小豆大服二丸卽差治心痛多唾似有蟲方取六畜心生切作十四臠刀縱橫各割之以眞丹一兩粉肉割中旦悉吞之入雄黃射香佳饑而心痛者名曰飢疝龍膽附子黃連分等搗篩服一錢匕日三度服之附方藥性論主心痛中惡或連腰臍者鹽如雞子大青布裹燒赤內酒中頓服當吐惡物拾遺序延胡索止心痛末之酒服聖惠方治久心痛時發不定多吐清水不下飲食以雄黃二兩好醋二升慢火煎成膏用乾蒸餅丸如梧桐子大每服七丸薑湯下又方治九種心痛妨悶用桂心一分爲末以酒一大盞煎至半盞去滓稍熱服立效又方治寒疝心痛四肢逆冷全不飲食用桂心二兩爲散不計時候熱酒調下一錢匕外臺秘要治卒心痛乾薑爲末水飲調下一錢又方治心痛當歸爲末酒服方寸匕又必效治蜎心痛熊膽如大豆和水服大效又方取鰻鱺魚淡炙令熟與患人食一二枚永差飽食彌佳經驗方治四十年心痛不差黍米淘汁温服隨多少經驗後方治心痛薑黃一兩桂穰三兩爲末醋湯下一錢匕簡要濟眾治九種心痛及腹脇積聚滯氣筒子乾漆二兩搗碎炒煙出細研醋煮麵糊和丸如梧桐子大每服五丸至七丸熱酒下醋湯亦得無時服姚和眾治卒心痛郁李人三七枚爛嚼以新汲水下之飲温湯尤妙須臾痛止却煎薄鹽湯熱呷之兵部手集治心痛不可忍十年五年者隨手效以小蒜釅醋煮頓服之取飽不用著鹽治卒腹痛方第九治卒腹痛方書舌上作風字又畫紙上作兩蜈蚣相交吞之又方搗桂末服三寸匕苦酒人參上好乾薑亦佳又方粳米二升以水六升煮二七沸飲之又方食鹽一大把多飲水送之忽當吐卽差又方掘土作小坎水滿坎中熟攪取汁飲之又方令人騎其腹溺臍中又方米粉一升水二升和飲又方使病人伏卧一人跨上兩手抄舉其腹令病人自縱重輕舉抄之令去床三尺許便放之如此二七度止拈取其脊骨皮深取痛引之從龜尾至頂乃止未愈更爲之又方令卧枕高一尺許拄膝使腹皮踧氣入胸令人抓其臍上三寸便愈能乾嚥吞氣數十遍者彌佳此方亦治心痛此卽伏氣治卒得諸疝小腹及陰中相引痛如絞自汗出欲死方搗沙參末篩服方寸匕立差此本在雜治中謂之寒疝亦名陰疝此治不差可服諸利丸下之作走馬湯亦佳治寒疝腹痛飲食下唯不覺其流行方椒二合乾薑四兩水四升煮取二升去滓內飴一斤又煎取半分再服數數服之又方半夏一升桂八兩生薑一升水六升煮取二升分爲二服治寒疝來去每發絞痛方吳茱萸三兩生薑四兩豉二合酒四升煮取二升分爲二服又方附子一枚椒二百粒乾薑半兩半夏十枚大棗三十枚粳米一升水七升煮米熟去滓一服一升令盡又方肉桂一斤呉茱萸半升水五升煮取一升半分再服又方牡蠣甘草桂各二兩水五升煮取一升半再服又方宿烏雞一頭治如食法生地黃七斤合細剉之著甑蔽中蒸銅器承須取汁清旦服至日晡令盡其間當下諸寒癖訖作白粥漸食之久疝者下三劑附方博濟方治冷熱氣不和不思飲食或腹痛㽲刺山梔子川烏頭等分生搗爲末以酒糊丸如梧桐子大每服十五丸炒生薑湯下如小腸氣痛炒茴香葱酒任下二十丸經驗方治元藏氣發久冷腹痛虛瀉應急大效玉粉丹生硫黃五兩青鹽一兩以上衮細研以蒸餅爲丸如菉豆大每服五丸熱酒空心服以食壓之子母秘錄治小腹疼青黑或亦不能喘苦參一兩醋一升半煎八合分二服聖惠方治寒疝小腹及陰中相引痛自汗出以丹參一兩杵爲散每服熱酒調下二錢匕佳治心腹俱痛方第十治心腹俱脹痛短氣欲死或已絶方取梔子十四枚豉七合以水二升先煮豉取一升二合絞去滓內梔子更煎取八合又絞去滓服半升不愈者盡服之又方浣小衣飲其汁一二升卽愈又方桂二兩切以水一升二合煮取八合去滓頓服無桂者著乾薑亦佳又方烏梅二七枚以水五升煮一沸內大錢二七枚煮得二升半强人可頓服羸人可分爲再服當下便愈又方茱萸二兩生薑四兩豉三合酒四升煮取二升分爲三服卽差又方乾薑一兩巴豆二兩搗蜜丸一服如小豆二丸當吐下差治心腹相連常脹痛方狼毒二兩附子半兩搗篩蜜丸如梧子大日一服一丸二日二丸三日後服三丸再一丸至六日再三丸自一至三以常服卽差又方吳茱萸一合乾薑四分附子細辛人參各二分搗篩蜜丸如梧子大服五丸日三服凡心腹痛若非中惡霍亂則是皆宿結冷熱所爲今此方可採以救急差後要作諸大治以消其根源也附方梅師方治心腹脹堅痛悶不安雖未吐下欲死以鹽五合水一升煎令消頓服自吐下食出卽定不吐更服孫眞人方治心腹俱痛以布裹椒薄注上火熨令椒汗出良十全方心脾痛以高良薑細剉炒杵末米飲調下一錢匕立止治卒心腹煩滿方第十一治卒心腹煩滿又胷脇痛欲死方以熱湯令灼灼爾漬手足復易秘方又方青布方寸鹿角三分亂髮灰二錢匕以水二升煮令得一升五合去滓盡服之又方剉薏苡根濃煮取汁服三升又方取比輪錢二十枚水五升煮取三沸日三服又方搗韮菜汁服一二升水煮乾薑亦佳又方卽用前心痛支子豉湯法差又方黃芩一兩杏仁二十枚牡蠣一兩水三升煮取一升頓服治厥逆煩滿常欲嘔方小草桂細辛乾薑椒各二兩附子二兩炮搗蜜和丸服如桐子大四丸治卒吐逆方灸乳下一寸七壯卽愈又方灸兩手大拇指內邊爪後第一紋頭各一壯又灸兩手中央長指爪下一壯愈此本雜治中其病亦是痰壅霍亂之例兼宜依霍亂條法治之人卒在此上條患者亦少皆因他病兼之耳或從傷寒未復或從霍亂吐下後虛燥或是勞損服諸補藥痞滿或觸寒熱邪氣或食飲協毒或服藥失度并宜各循其本源爲治不得專用此法也附方千金方治心腹脹短氣以草豆蔻一兩去皮爲末以木瓜生薑湯下半錢斗門方治男子女人久患氣脹心悶飲食不得因食不調冷熱相擊致令心腹脹滿方厚朴火上炙令乾又蘸薑汁炙直待焦黑爲度搗篩如麵以陳米飲調下二錢匕日三服良亦治反胃止瀉甚妙經驗方治食氣遍身黃腫氣喘食不得心胸滿悶不蛀皂角去皮子塗好醋炙令焦爲末一錢匕巴豆七枚去油膜二件以淡醋及研好墨爲丸如麻子大每服三丸食後陳橘皮湯下日三服隔一日增一丸以利爲度如常服消酒
